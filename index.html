<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>AI手机桌面</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- 状态栏 -->
    <div class="status-bar glass">
      <div class="status-time">00:00</div>
      <div class="status-icons">
        <span id="battery-level">100%</span>
      </div>
    </div>

    <!-- 桌面容器 -->
    <div class="desktop" id="desktop">
      <!-- 第一个桌面页面 -->
      <div class="desktop-page active" id="page-1" data-page="1">
        <!-- 小组件和图标会动态插入这里 -->
      </div>

      <!-- 第二个桌面页面 -->
      <div class="desktop-page next" id="page-2" data-page="2">
        <!-- 小组件和图标会动态插入这里 -->
      </div>
    </div>

    <!-- 页面指示器 -->
    <div class="page-indicator">
      <div class="page-dot active" data-page="1"></div>
      <div class="page-dot" data-page="2"></div>
    </div>

    <!-- Dock栏 -->
    <div class="dock">
      <div class="dock-icon" data-app="chat">
        <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%23FFB3C6' width='100' height='100' rx='20'/%3E%3Ctext x='50' y='65' font-size='40' text-anchor='middle' fill='white' font-family='sans-serif'%3E消息%3C/text%3E%3C/svg%3E" alt="消息">
      </div>
      <div class="dock-icon" data-app="moments">
        <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%23FFB3C6' width='100' height='100' rx='20'/%3E%3Ctext x='50' y='65' font-size='35' text-anchor='middle' fill='white' font-family='sans-serif'%3E朋友圈%3C/text%3E%3C/svg%3E" alt="朋友圈">
      </div>
      <div class="dock-icon" data-app="characters">
        <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%23FFB3C6' width='100' height='100' rx='20'/%3E%3Ctext x='50' y='65' font-size='35' text-anchor='middle' fill='white' font-family='sans-serif'%3E角色%3C/text%3E%3C/svg%3E" alt="角色">
      </div>
      <div class="dock-icon" data-app="settings">
        <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%23FFB3C6' width='100' height='100' rx='20'/%3E%3Ctext x='50' y='65' font-size='40' text-anchor='middle' fill='white' font-family='sans-serif'%3E设置%3C/text%3E%3C/svg%3E" alt="设置">
      </div>
    </div>
  </div>

  <script type="module">
    import storage from './core/storage.js';
    import themeManager from './core/theme.js';
    import ui from './core/ui.js';

    // 应用配置
    const APPS = [
      { id: 'chat', name: '消息', module: './apps/chat.js' },
      { id: 'moments', name: '朋友圈', module: './apps/moments.js' },
      { id: 'characters', name: '角色管理', module: './apps/characters.js' },
      { id: 'worldbook', name: '世界书', module: './apps/worldbook.js' },
      { id: 'games', name: '小游戏', module: './apps/games.js' },
      { id: 'shop', name: '商店', module: './apps/shop.js' },
      { id: 'wallet', name: '钱包', module: './apps/wallet.js' },
      { id: 'memo', name: '备忘录', module: './apps/memo.js' },
      { id: 'anniversary', name: '纪念日', module: './apps/anniversary.js' },
      { id: 'settings', name: '设置', module: './apps/settings.js' }
    ];

    // 桌面管理器
    class Desktop {
      constructor() {
        this.currentPage = 1;
        this.isEditMode = false;
        this.isDragging = false;
        this.dragTarget = null;
        this.dragStartPos = { x: 0, y: 0 };
        this.dragOffset = { x: 0, y: 0 };
        this.touchStartTime = 0;
        this.widgets = [];
        this.icons = [];
      }

      async init() {
        // 初始化存储和主题
        await storage.init();
        themeManager.init();

        // 加载桌面布局
        this.loadLayout();

        // 创建默认小组件
        this.createDefaultWidgets();

        // 创建应用图标
        this.createAppIcons();

        // 绑定事件
        this.bindEvents();

        // 启动状态栏更新
        this.updateStatusBar();
        setInterval(() => this.updateStatusBar(), 1000);

        // 更新小组件内容
        this.updateWidgets();
        setInterval(() => this.updateWidgets(), 60000);
      }

      // 加载桌面布局
      loadLayout() {
        const layout = storage.getDesktopLayout();
        this.widgets = layout.widgets || [];
        this.icons = layout.icons || [];
      }

      // 保存桌面布局
      saveLayout() {
        storage.saveDesktopLayout({
          widgets: this.widgets,
          icons: this.icons
        });
      }

      // 创建默认小组件
      createDefaultWidgets() {
        const settings = storage.getSettings();

        // 如果没有保存的小组件，创建默认的
        if (this.widgets.length === 0) {
          if (settings.desktopWidgets.time !== false) {
            this.widgets.push({
              id: 'widget-time',
              type: 'time',
              size: '2x1',
              page: 1,
              x: 20,
              y: 80
            });
          }

          if (settings.desktopWidgets.weather !== false) {
            this.widgets.push({
              id: 'widget-weather',
              type: 'weather',
              size: '2x1',
              page: 1,
              x: 20,
              y: 260
            });
          }

          if (settings.desktopWidgets.anniversary !== false) {
            this.widgets.push({
              id: 'widget-anniversary',
              type: 'anniversary',
              size: '1x1',
              page: 1,
              x: 20,
              y: 440
            });
          }
        }

        // 渲染小组件
        this.widgets.forEach(widget => this.renderWidget(widget));
      }

      // 渲染小组件
      renderWidget(widget) {
        const page = document.getElementById(`page-${widget.page}`);
        if (!page) return;

        const widgetEl = document.createElement('div');
        widgetEl.className = `widget widget-${widget.size}`;
        widgetEl.id = widget.id;
        widgetEl.style.left = `${widget.x}px`;
        widgetEl.style.top = `${widget.y}px`;
        widgetEl.dataset.type = widget.type;
        widgetEl.dataset.page = widget.page;

        // 根据类型渲染内容
        if (widget.type === 'time') {
          widgetEl.classList.add('widget-time');
          widgetEl.innerHTML = `
            <div class="widget-time-hour">00:00</div>
            <div class="widget-time-date">加载中</div>
          `;
        } else if (widget.type === 'weather') {
          widgetEl.classList.add('widget-weather');
          widgetEl.innerHTML = `
            <div class="widget-weather-temp">--°</div>
            <div class="widget-weather-info">加载中</div>
          `;
        } else if (widget.type === 'anniversary') {
          widgetEl.classList.add('widget-anniversary');
          widgetEl.innerHTML = `
            <div class="widget-anniversary-title">纪念日</div>
            <div class="widget-anniversary-days">--</div>
          `;
        } else if (widget.type === 'custom') {
          widgetEl.classList.add('widget-custom');
          if (widget.image) {
            widgetEl.innerHTML = `<img class="widget-custom-image" src="${widget.image}" alt="">`;
          } else if (widget.text) {
            widgetEl.innerHTML = `<div class="widget-custom-text">${widget.text}</div>`;
          }
        }

        page.appendChild(widgetEl);
        this.bindDragEvents(widgetEl, true);
      }

      // 创建应用图标
      createAppIcons() {
        // 如果没有保存的图标位置，创建默认布局
        if (this.icons.length === 0) {
          APPS.forEach((app, index) => {
            const page = Math.floor(index / 8) + 1;
            const posInPage = index % 8;
            const col = posInPage % 4;
            const row = Math.floor(posInPage / 4);

            this.icons.push({
              id: `icon-${app.id}`,
              appId: app.id,
              name: app.name,
              page,
              x: 20 + col * 88,
              y: 600 + row * 100
            });
          });
        }

        // 渲染图标
        this.icons.forEach(icon => this.renderIcon(icon));
      }

      // 渲染图标
      renderIcon(icon) {
        const page = document.getElementById(`page-${icon.page}`);
        if (!page) return;

        const iconEl = document.createElement('div');
        iconEl.className = 'app-icon';
        iconEl.id = icon.id;
        iconEl.style.left = `${icon.x}px`;
        iconEl.style.top = `${icon.y}px`;
        iconEl.dataset.appId = icon.appId;
        iconEl.dataset.page = icon.page;

        const app = APPS.find(a => a.id === icon.appId);
        const imageUrl = `data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%23FFB3C6' width='100' height='100' rx='20'/%3E%3Ctext x='50' y='60' font-size='30' text-anchor='middle' fill='white' font-family='sans-serif'%3E${icon.name}%3C/text%3E%3C/svg%3E`;

        iconEl.innerHTML = `
          <div class="app-icon-image">
            <img src="${imageUrl}" alt="${icon.name}">
          </div>
          <div class="app-icon-label">${icon.name}</div>
        `;

        page.appendChild(iconEl);
        this.bindDragEvents(iconEl, false);

        // 点击事件
        iconEl.addEventListener('click', (e) => {
          if (!this.isEditMode && !this.isDragging) {
            this.openApp(icon.appId);
          }
        });
      }

      // 绑定拖动事件
      bindDragEvents(element, isWidget) {
        let longPressTimer = null;

        const handleTouchStart = (e) => {
          if (this.isDragging) return;

          this.touchStartTime = Date.now();
          const touch = e.touches[0];
          this.dragStartPos = { x: touch.clientX, y: touch.clientY };

          // 长按进入编辑模式
          longPressTimer = setTimeout(() => {
            this.enterEditMode();
            this.startDrag(element, touch, isWidget);
          }, 500);
        };

        const handleTouchMove = (e) => {
          const touch = e.touches[0];
          const moved = Math.abs(touch.clientX - this.dragStartPos.x) + 
                       Math.abs(touch.clientY - this.dragStartPos.y);

          if (moved > 10) {
            clearTimeout(longPressTimer);
          }

          if (this.isDragging && this.dragTarget === element) {
            e.preventDefault();
            this.updateDragPosition(touch);
          }
        };

        const handleTouchEnd = (e) => {
          clearTimeout(longPressTimer);

          if (this.isDragging && this.dragTarget === element) {
            this.endDrag();
          }
        };

        element.addEventListener('touchstart', handleTouchStart, { passive: true });
        element.addEventListener('touchmove', handleTouchMove, { passive: false });
        element.addEventListener('touchend', handleTouchEnd);
      }

      // 进入编辑模式
      enterEditMode() {
        if (this.isEditMode) return;
        this.isEditMode = true;
        document.body.classList.add('edit-mode');
      }

      // 退出编辑模式
      exitEditMode() {
        this.isEditMode = false;
        document.body.classList.remove('edit-mode');
        this.saveLayout();
      }

      // 开始拖动
      startDrag(element, touch, isWidget) {
        this.isDragging = true;
        this.dragTarget = element;

        const rect = element.getBoundingClientRect();
        this.dragOffset = {
          x: touch.clientX - rect.left,
          y: touch.clientY - rect.top
        };

        element.classList.add('dragging');
      }

      // 更新拖动位置
      updateDragPosition(touch) {
        if (!this.dragTarget) return;

        const x = touch.clientX - this.dragOffset.x;
        const y = touch.clientY - this.dragOffset.y;

        // 限制在屏幕范围内
        const maxX = window.innerWidth - this.dragTarget.offsetWidth;
        const maxY = window.innerHeight - 80 - this.dragTarget.offsetHeight;

        const boundedX = Math.max(0, Math.min(x, maxX));
        const boundedY = Math.max(44, Math.min(y, maxY));

        this.dragTarget.style.left = `${boundedX}px`;
        this.dragTarget.style.top = `${boundedY}px`;
      }

      // 结束拖动
      endDrag() {
        if (!this.dragTarget) return;

        this.dragTarget.classList.remove('dragging');

        // 更新数据
        const id = this.dragTarget.id;
        const x = parseInt(this.dragTarget.style.left);
        const y = parseInt(this.dragTarget.style.top);

        if (this.dragTarget.classList.contains('widget')) {
          const widget = this.widgets.find(w => w.id === id);
          if (widget) {
            widget.x = x;
            widget.y = y;
          }
        } else if (this.dragTarget.classList.contains('app-icon')) {
          const icon = this.icons.find(i => i.id === id);
          if (icon) {
            icon.x = x;
            icon.y = y;
          }
        }

        this.dragTarget = null;
        this.isDragging = false;

        // 延迟退出编辑模式
        setTimeout(() => this.exitEditMode(), 1000);
      }

      // 绑定事件
      bindEvents() {
        const desktop = document.getElementById('desktop');
        let startX = 0;
        let startTime = 0;

        desktop.addEventListener('touchstart', (e) => {
          if (this.isEditMode || this.isDragging) return;
          startX = e.touches[0].clientX;
          startTime = Date.now();
        });

        desktop.addEventListener('touchend', (e) => {
          if (this.isEditMode || this.isDragging) return;

          const endX = e.changedTouches[0].clientX;
          const diff = startX - endX;
          const time = Date.now() - startTime;

          if (Math.abs(diff) > 50 && time < 300) {
            if (diff > 0 && this.currentPage < 2) {
              this.switchPage(this.currentPage + 1);
            } else if (diff < 0 && this.currentPage > 1) {
              this.switchPage(this.currentPage - 1);
            }
          }
        });

        // Dock点击事件
        document.querySelectorAll('.dock-icon').forEach(icon => {
          icon.addEventListener('click', () => {
            const appId = icon.dataset.app;
            this.openApp(appId);
          });
        });
      }

      // 切换页面
      switchPage(pageNum) {
        this.currentPage = pageNum;

        document.querySelectorAll('.desktop-page').forEach((page, index) => {
          page.classList.remove('active', 'prev', 'next');
          if (index + 1 === pageNum) {
            page.classList.add('active');
          } else if (index + 1 < pageNum) {
            page.classList.add('prev');
          } else {
            page.classList.add('next');
          }
        });

        document.querySelectorAll('.page-dot').forEach((dot, index) => {
          dot.classList.toggle('active', index + 1 === pageNum);
        });
      }

      // 更新状态栏
      updateStatusBar() {
        const now = new Date();
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        document.querySelector('.status-time').textContent = `${hours}:${minutes}`;
      }

      // 更新小组件内容
      async updateWidgets() {
        const now = new Date();

        // 更新时间小组件
        document.querySelectorAll('.widget-time').forEach(widget => {
          const hours = String(now.getHours()).padStart(2, '0');
          const minutes = String(now.getMinutes()).padStart(2, '0');
          const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
          const dateStr = `${now.getMonth() + 1}月${now.getDate()}日 ${weekdays[now.getDay()]}`;

          widget.querySelector('.widget-time-hour').textContent = `${hours}:${minutes}`;
          widget.querySelector('.widget-time-date').textContent = dateStr;
        });

        // 更新天气小组件
        this.updateWeather();

        // 更新纪念日小组件
        this.updateAnniversary();
      }

      // 更新天气
      async updateWeather() {
        const settings = storage.getSettings();
        const city = settings.weatherCity || '温州';

        try {
          // 使用一个简单的免费天气接口（IP定位）
          const response = await fetch('https://wttr.in/?format=j1');
          const data = await response.json();

          const temp = data.current_condition[0].temp_C;
          const desc = data.current_condition[0].weatherDesc[0].value;

          document.querySelectorAll('.widget-weather').forEach(widget => {
            widget.querySelector('.widget-weather-temp').textContent = `${temp}°`;
            widget.querySelector('.widget-weather-info').textContent = `${city} · ${desc}`;
          });
        } catch (error) {
          console.error('天气获取失败:', error);
        }
      }

      // 更新纪念日
      updateAnniversary() {
        // 后续在anniversary.js中实现
        document.querySelectorAll('.widget-anniversary').forEach(widget => {
          widget.querySelector('.widget-anniversary-days').textContent = '--';
        });
      }

      // 打开应用
      async openApp(appId) {
        const app = APPS.find(a => a.id === appId);
        if (!app) return;

        try {
          const module = await import(app.module);
          if (module.default && module.default.open) {
            module.default.open();
          }
        } catch (error) {
          console.error(`应用 ${appId} 加载失败:`, error);
          ui.showToast(`应用加载失败: ${app.name}`, 'error');
        }
      }
    }

    // 启动应用
    const desktop = new Desktop();
    desktop.init();

    // 暴露到全局供其他模块使用
    window.desktop = desktop;
    window.APPS = APPS;
  </script>
</body>
</html>
