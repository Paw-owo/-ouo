<!-- index.html -->
<!-- imports:
  from './core/storage.js': initDB, getData, setData, getDB, getAllDB, generateId, getNow
  from './core/theme.js': loadTheme
  from './core/ui.js': createIcon, showToast
  dynamic imports: ready apps modules by APPS[].module, each module should expose mount(containerEl) and optional unmount()
-->
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#FAF8F5">
  <meta name="format-detection" content="telephone=no">
  <title>小手机</title>
  <link rel="stylesheet" href="./style.css">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon-192.png">

  <style>
    .phone-desktop {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background: var(--bg-primary);
      color: var(--text-primary);
    }

    .phone-desktop.has-wallpaper {
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .desktop-soft-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background: color-mix(in srgb, var(--bg-primary) 72%, transparent);
    }

    .desktop-soft-layer::after {
      content: "";
      position: absolute;
      inset: 0;
      background: color-mix(in srgb, var(--bg-card) 10%, transparent);
      pointer-events: none;
    }

    .status-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 6;
      height: calc(34px + env(safe-area-inset-top));
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: env(safe-area-inset-top) 24px 6px;
      color: var(--text-primary);
      font-size: 13px;
      font-weight: 600;
      line-height: 1;
      pointer-events: none;
    }

    .status-right {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: var(--text-primary);
    }

    .signal-bars {
      display: inline-flex;
      align-items: flex-end;
      gap: 2px;
      height: 12px;
    }

    .signal-bars span {
      width: 3px;
      border-radius: 99px;
      background: currentColor;
      opacity: 0.82;
    }

    .signal-bars span:nth-child(1) {
      height: 4px;
    }

    .signal-bars span:nth-child(2) {
      height: 7px;
    }

    .signal-bars span:nth-child(3) {
      height: 10px;
    }

    .battery-mark {
      width: 24px;
      height: 12px;
      display: inline-flex;
      align-items: center;
      padding: 2px;
      border-radius: 5px;
      background: color-mix(in srgb, currentColor 14%, transparent);
    }

    .battery-mark::before {
      content: "";
      width: 15px;
      height: 8px;
      border-radius: 3px;
      background: currentColor;
      opacity: 0.82;
    }

    .desktop-pages {
      position: fixed;
      inset: 0 0 calc(104px + env(safe-area-inset-bottom)) 0;
      z-index: 1;
      display: flex;
      overflow-x: auto;
      overflow-y: hidden;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-x;
    }

    .desktop-pages.editing {
      scroll-snap-type: none;
    }

    .desktop-page {
      position: relative;
      flex: 0 0 100%;
      width: 100%;
      height: 100%;
      scroll-snap-align: start;
      overflow: hidden;
    }

    .desktop-free-layer {
      position: absolute;
      inset: calc(40px + env(safe-area-inset-top)) 0 0;
      overflow: hidden;
    }

    .desktop-icon {
      position: absolute;
      z-index: 3;
      width: 72px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--spacing-sm);
      color: var(--text-primary);
      touch-action: none;
      transition: var(--motion);
    }

    .desktop-icon.is-dragging,
    .desktop-widget.is-dragging {
      z-index: 20;
      opacity: 0.94;
      transform: scale(1.04);
      transition: none;
    }

    .desktop-icon.editing,
    .desktop-widget.editing {
      animation: icon-wiggle 180ms ease-in-out infinite;
    }

    .desktop-icon-art svg {
      width: 28px;
      height: 28px;
    }

    .desktop-icon-image {
      width: 100%;
      height: 100%;
      border-radius: 18px;
      object-fit: cover;
    }

    .desktop-icon-name {
      width: 82px;
      color: var(--text-primary);
      font-size: 12px;
      line-height: 1.25;
      text-align: center;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-shadow: 0 1px 10px color-mix(in srgb, var(--bg-primary) 78%, transparent);
    }

    .desktop-widget {
      position: absolute;
      z-index: 2;
      touch-action: none;
      transition: var(--motion);
    }

    .desktop-widget.hidden {
      display: none;
    }

    .widget-card {
      min-width: 142px;
      padding: 12px 14px;
      border-radius: 24px;
      background: var(--surface-soft);
      box-shadow: var(--shadow-sm);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      color: var(--text-primary);
    }

    .widget-card.compact {
      min-width: 132px;
    }

    .widget-card.wide {
      width: min(76vw, 320px);
      min-width: 240px;
    }

    .widget-label {
      color: var(--text-secondary);
      font-size: 12px;
      line-height: 1.3;
    }

    .widget-value {
      margin-top: 4px;
      color: var(--text-primary);
      font-size: 15px;
      font-weight: 600;
      line-height: 1.35;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .time-widget-main {
      font-size: clamp(48px, 15vw, 72px);
      font-weight: 600;
      line-height: 1;
      letter-spacing: -0.05em;
      color: var(--text-primary);
    }

    .time-widget-sub {
      margin-top: 8px;
      color: var(--text-secondary);
      font-size: var(--font-size-small);
      line-height: 1.4;
      white-space: nowrap;
    }

    .focus-widget-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .focus-title {
      color: var(--text-primary);
      font-size: var(--font-size-title);
      font-weight: 600;
      line-height: 1.35;
    }

    .focus-text {
      margin-top: 2px;
      color: var(--text-secondary);
      font-size: var(--font-size-small);
      line-height: 1.45;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .focus-mark {
      width: 38px;
      height: 38px;
      flex: 0 0 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      background: var(--accent-light);
      color: var(--accent-dark);
    }

    .page-dots {
      position: fixed;
      left: 0;
      right: 0;
      bottom: calc(98px + env(safe-area-inset-bottom));
      z-index: 4;
      pointer-events: none;
    }

    .dock .desktop-icon {
      position: relative;
      left: auto !important;
      top: auto !important;
      width: 64px;
      animation: none;
      touch-action: manipulation;
    }

    .dock .desktop-icon-name {
      display: none;
    }

    .dock .desktop-icon-art {
      width: 58px;
      height: 58px;
      border-radius: 20px;
    }

    .dock .desktop-delete-dot {
      display: none !important;
    }

    .desktop-hidden-hint {
      position: absolute;
      left: 20px;
      right: 20px;
      bottom: 18px;
      z-index: 2;
      padding: 12px 14px;
      border-radius: 20px;
      background: var(--surface-soft);
      color: var(--text-secondary);
      box-shadow: var(--shadow-sm);
      font-size: var(--font-size-small);
      line-height: 1.5;
      text-align: center;
      pointer-events: none;
    }

    #app-layer {
      position: fixed;
      inset: 0;
      z-index: 30;
      pointer-events: none;
    }

    #app-layer.has-app {
      pointer-events: auto;
    }

    .placeholder-app {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg-primary);
    }

    .placeholder-body {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: calc(76px + env(safe-area-inset-top)) 24px calc(42px + env(safe-area-inset-bottom));
    }

    .placeholder-card {
      width: min(100%, 420px);
      padding: 26px;
      border-radius: 28px;
      background: var(--bg-card);
      box-shadow: var(--shadow-md);
      text-align: left;
    }

    .placeholder-icon {
      width: 58px;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 18px;
      border-radius: 22px;
      background: var(--accent-light);
      color: var(--accent-dark);
    }

    .placeholder-title {
      margin: 0;
      color: var(--text-primary);
      font-size: 22px;
      font-weight: 600;
      line-height: 1.3;
      letter-spacing: -0.01em;
    }

    .placeholder-text {
      margin: 10px 0 0;
      color: var(--text-secondary);
      font-size: var(--font-size-base);
      line-height: 1.7;
    }

    .desktop-loading {
      position: fixed;
      inset: 0;
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-primary);
      color: var(--text-secondary);
      transition: var(--motion);
    }

    .desktop-loading.hide {
      opacity: 0;
      pointer-events: none;
    }

    .loading-card {
      min-width: 156px;
      padding: 20px;
      border-radius: 26px;
      background: var(--bg-card);
      box-shadow: var(--shadow-sm);
      text-align: center;
    }

    .loading-mark {
      width: 36px;
      height: 36px;
      margin: 0 auto 12px;
      border-radius: 14px;
      background: var(--accent-light);
      animation: soft-pulse 1400ms ease-in-out infinite;
    }

    .loading-text {
      color: var(--text-secondary);
      font-size: var(--font-size-small);
    }

    .guide-steps {
      display: flex;
      gap: 6px;
      margin: 0 0 18px;
    }

    .guide-step-dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: var(--text-hint);
      transition: var(--motion);
    }

    .guide-step-dot.active {
      width: 18px;
      background: var(--accent);
    }

    .guide-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
    }
  </style>
</head>

<body>
  <main id="desktop" class="phone-desktop">
    <div class="desktop-soft-layer"></div>

    <div class="status-bar" aria-hidden="true">
      <div id="status-time">--:--</div>
      <div class="status-right">
        <span class="signal-bars"><span></span><span></span><span></span></span>
        <span>5G</span>
        <span class="battery-mark"></span>
      </div>
    </div>

    <section id="desktop-pages" class="desktop-pages" aria-label="桌面页面">
      <div class="desktop-page" data-page="0">
        <div class="desktop-free-layer" data-layer="0"></div>
      </div>
      <div class="desktop-page" data-page="1">
        <div class="desktop-free-layer" data-layer="1"></div>
      </div>
    </section>

    <div class="page-dots" aria-hidden="true">
      <span class="page-dot active" data-dot="0"></span>
      <span class="page-dot" data-dot="1"></span>
    </div>

    <nav id="dock" class="dock" aria-label="固定栏"></nav>
  </main>

  <section id="app-layer" aria-live="polite"></section>

  <div id="desktop-loading" class="desktop-loading">
    <div class="loading-card">
      <div class="loading-mark"></div>
      <div class="loading-text">正在打开小手机</div>
    </div>
  </div>

  <script type="module">
    import { initDB, getData, setData, getDB, getAllDB, generateId, getNow } from './core/storage.js';
    import { loadTheme } from './core/theme.js';
    import { createIcon, showToast } from './core/ui.js';

    const APPS = [
      { id: 'chat', name: '聊天', module: './apps/chat.js', icon: 'heart', dock: true, page: 0, ready: false },
      { id: 'moments', name: '朋友圈', module: './apps/moments.js', icon: 'camera', dock: true, page: 0, ready: false },
      { id: 'settings', name: '设置', module: './apps/settings.js', icon: 'settings', dock: true, page: 0, ready: true },
      { id: 'gallery', name: '相册', module: '', icon: 'image', dock: true, page: 0, ready: false },

      { id: 'characters', name: '角色', module: './apps/characters.js', icon: 'smile', dock: false, page: 0, ready: false },
      { id: 'worldbook', name: '世界书', module: './apps/worldbook.js', icon: 'memory', dock: false, page: 0, ready: false },
      { id: 'wallet', name: '钱包', module: './apps/wallet.js', icon: 'transfer', dock: false, page: 0, ready: false },
      { id: 'shop', name: '商店', module: './apps/shop.js', icon: 'star', dock: false, page: 0, ready: false },
      { id: 'memo', name: '备忘录', module: './apps/memo.js', icon: 'edit', dock: false, page: 0, ready: false },
      { id: 'anniversary', name: '纪念日', module: './apps/anniversary.js', icon: 'check', dock: false, page: 0, ready: false },
      { id: 'games', name: '游戏', module: './apps/games.js', icon: 'play', dock: false, page: 0, ready: false }
    ];

    const WIDGETS = [
      { id: 'time', name: '时间', page: 0, x: 20, y: 18 },
      { id: 'weather', name: '天气', page: 0, x: 20, y: 168 },
      { id: 'anniversary', name: '纪念日', page: 0, x: 208, y: 168 },
      { id: 'focus', name: '提示', page: 0, x: 20, y: 246 }
    ];

    const DEFAULT_SETTINGS = {
      defaultApiEndpointId: '',
      defaultModel: '',
      ttsGlobal: {
        provider: 'openai',
        apiKey: '',
        endpoint: ''
      },
      mcpServers: [],
      bubbleMode: 'bubble',
      fontSize: 15,
      user: {
        name: '',
        avatar: ''
      },
      widgets: {
        time: true,
        weather: true,
        anniversary: true
      },
      apiEndpoints: []
    };

    const desktopEl = document.getElementById('desktop');
    const pagesEl = document.getElementById('desktop-pages');
    const appLayerEl = document.getElementById('app-layer');
    const dockEl = document.getElementById('dock');
    const loadingEl = document.getElementById('desktop-loading');
    const statusTimeEl = document.getElementById('status-time');

    let currentAppModule = null;
    let currentAppId = '';
    let currentPage = 0;
    let editing = false;
    let longPressTimer = null;
    let dragState = null;
    let clockTimer = null;
    let weatherTimer = null;

    window.AppEvents = {
      emit(event, data) {
        window.dispatchEvent(new CustomEvent(event, { detail: data }));
      },
      on(event, fn) {
        window.addEventListener(event, (e) => fn(e.detail));
      }
    };

    window.closeCurrentApp = closeCurrentApp;
    window.refreshDesktopBadges = refreshBadges;

    boot();

    async function boot() {
      try {
        await initDB();
        loadTheme();
        ensureDefaultSettings();
        await applyWallpaper();
        ensureFirstOpenSeed();
        renderDesktop();
        bindDesktopEvents();
        initWidgets();
        refreshBadges();
        setupAppEvents();
        showInstallTipIfNeeded();
        showOnboardingIfNeeded();
      } catch (error) {
        showToast('启动失败，请刷新页面');
        console.error(error);
      } finally {
        window.setTimeout(() => {
          loadingEl.classList.add('hide');
          window.setTimeout(() => loadingEl.remove(), 240);
        }, 260);
      }
    }

    function ensureDefaultSettings() {
      const saved = getData('app_settings') || {};
      const nextSettings = {
        ...DEFAULT_SETTINGS,
        ...saved,
        ttsGlobal: {
          ...DEFAULT_SETTINGS.ttsGlobal,
          ...(saved.ttsGlobal || {})
        },
        user: {
          ...DEFAULT_SETTINGS.user,
          ...(saved.user || {})
        },
        widgets: {
          ...DEFAULT_SETTINGS.widgets,
          ...(saved.widgets || {})
        },
        mcpServers: Array.isArray(saved.mcpServers) ? saved.mcpServers : [],
        apiEndpoints: Array.isArray(saved.apiEndpoints) ? saved.apiEndpoints : []
      };

      setData('app_settings', nextSettings);
      return nextSettings;
    }

    function ensureFirstOpenSeed() {
      if (getData('app_first_open_seed')) return;

      setData('app_first_open_seed', {
        id: generateId(),
        createdAt: getNow()
      });
    }

    async function applyWallpaper() {
      let wallpaper = '';

      try {
        const record = await getDB('blobs', 'app_wallpaper');
        wallpaper = record?.value || record?.data || '';
      } catch (_) {
        wallpaper = '';
      }

      if (!wallpaper) {
        const legacyWallpaper = getData('app_wallpaper');
        wallpaper = typeof legacyWallpaper === 'string' ? legacyWallpaper : '';
      }

      if (wallpaper) {
        desktopEl.classList.add('has-wallpaper');
        desktopEl.style.backgroundImage = `url("${wallpaper}")`;
      } else {
        desktopEl.classList.remove('has-wallpaper');
        desktopEl.style.backgroundImage = '';
      }
    }

    function renderDesktop() {
      document.querySelectorAll('.desktop-free-layer').forEach((layer) => {
        layer.innerHTML = '';
      });
      dockEl.innerHTML = '';

      renderWidgets();
      renderIcons();
      updatePageDots();
    }

    function renderWidgets() {
      const settings = ensureDefaultSettings();
      const positions = getWidgetPositions();

      WIDGETS.forEach((widget) => {
        if (widget.id === 'time' && settings.widgets?.time === false) return;
        if (widget.id === 'weather' && settings.widgets?.weather === false) return;
        if (widget.id === 'anniversary' && settings.widgets?.anniversary === false) return;

        const savedPosition = positions[widget.id] || {};
        const page = normalizePage(savedPosition.page ?? widget.page);
        const layer = getLayer(page);
        const widgetEl = createWidget(widget.id);
        layer.appendChild(widgetEl);
        placeFreeItem(widgetEl, savedPosition.x ?? widget.x, savedPosition.y ?? widget.y);
      });
    }

    function renderIcons() {
      const positions = getIconPositions();
      const hiddenIcons = getHiddenIcons();

      APPS.filter((app) => app.dock).forEach((app) => {
        dockEl.appendChild(createDesktopIcon(app));
      });

      const normalApps = APPS.filter((app) => !app.dock && !hiddenIcons.includes(app.id));

      normalApps.forEach((app, index) => {
        const savedPosition = positions[app.id] || {};
        const defaultPosition = getDefaultIconPosition(index);
        const page = normalizePage(savedPosition.page ?? app.page ?? 0);
        const layer = getLayer(page);
        const iconEl = createDesktopIcon(app);
        layer.appendChild(iconEl);
        placeFreeItem(iconEl, savedPosition.x ?? defaultPosition.x, savedPosition.y ?? defaultPosition.y);
      });

      if (hiddenIcons.length) {
        const layer = getLayer(1);
        const hint = document.createElement('div');
        hint.className = 'desktop-hidden-hint';
        hint.textContent = '有隐藏的桌面图标，可稍后在设置里恢复';
        layer.appendChild(hint);
      }
    }

    function createWidget(id) {
      const widgetEl = document.createElement('section');
      widgetEl.className = 'desktop-widget';
      widgetEl.dataset.type = 'widget';
      widgetEl.dataset.widgetId = id;
      widgetEl.setAttribute('aria-label', `${getWidgetName(id)}小组件`);

      if (id === 'time') {
        widgetEl.innerHTML = `
          <div class="time-widget-main" data-clock-large>--:--</div>
          <div class="time-widget-sub" data-date-line>正在准备桌面</div>
        `;
      }

      if (id === 'weather') {
        widgetEl.innerHTML = `
          <div class="widget-card compact">
            <div class="widget-label">天气</div>
            <div class="widget-value" data-weather-value>自动获取中</div>
          </div>
        `;
      }

      if (id === 'anniversary') {
        widgetEl.innerHTML = `
          <div class="widget-card compact">
            <div class="widget-label">纪念日</div>
            <div class="widget-value" data-anniversary-value>暂无提醒</div>
          </div>
        `;
      }

      if (id === 'focus') {
        const card = document.createElement('div');
        card.className = 'widget-card wide';
        card.innerHTML = `
          <div class="focus-widget-inner">
            <div>
              <div class="focus-title" data-focus-title>今天也要好好休息</div>
              <div class="focus-text" data-focus-text>打开聊天，看看谁在想你</div>
            </div>
            <div class="focus-mark" data-focus-mark></div>
          </div>
        `;
        card.querySelector('[data-focus-mark]').appendChild(createIcon('star', 22));
        widgetEl.appendChild(card);
      }

      bindFreeDrag(widgetEl);
      return widgetEl;
    }

    function createDesktopIcon(app) {
      const customIcons = getCustomIcons();
      const custom = customIcons[app.id] || {};
      const iconEl = document.createElement('button');
      const artEl = document.createElement('span');
      const nameEl = document.createElement('span');
      const deleteEl = document.createElement('span');
      const badgeEl = document.createElement('span');

      iconEl.type = 'button';
      iconEl.className = 'desktop-icon';
      iconEl.dataset.type = 'icon';
      iconEl.dataset.appId = app.id;
      iconEl.setAttribute('aria-label', custom.name || app.name);

      artEl.className = 'desktop-icon-art';

      if (custom.image) {
        const image = document.createElement('img');
        image.className = 'desktop-icon-image';
        image.alt = '';
        image.src = custom.image;
        artEl.appendChild(image);
      } else {
        artEl.appendChild(createIcon(app.icon, 28));
      }

      nameEl.className = 'desktop-icon-name';
      nameEl.textContent = custom.name || app.name;

      deleteEl.className = 'desktop-delete-dot';
      deleteEl.setAttribute('aria-hidden', 'true');
      deleteEl.appendChild(createIcon('close', 12));

      badgeEl.className = 'badge hidden';
      badgeEl.dataset.badge = app.id;

      iconEl.append(artEl, nameEl, deleteEl, badgeEl);

      deleteEl.addEventListener('click', (event) => {
        event.preventDefault();
        event.stopPropagation();

        if (!editing || app.dock) return;

        const hiddenIcons = getHiddenIcons();
        hiddenIcons.push(app.id);
        setData('app_hidden_icons', [...new Set(hiddenIcons)]);

        const positions = getIconPositions();
        delete positions[app.id];
        setData('app_icon_positions', positions);

        renderDesktop();
        showToast('已隐藏，可在设置中恢复');
      });

      iconEl.addEventListener('click', (event) => {
        if (editing) {
          event.preventDefault();
          event.stopPropagation();
          return;
        }

        openApp(app.id);
      });

      if (!app.dock) {
        bindFreeDrag(iconEl);
      }

      return iconEl;
    }

    function bindFreeDrag(element) {
      element.addEventListener('pointerdown', (event) => {
        if (event.target.closest('.desktop-delete-dot')) return;

        clearLongPressTimer();

        longPressTimer = window.setTimeout(() => {
          enterEditing();
          startFreeDrag(event, element);
        }, 500);

        const cancel = () => {
          clearLongPressTimer();
          window.removeEventListener('pointerup', cancel);
          window.removeEventListener('pointercancel', cancel);
        };

        window.addEventListener('pointerup', cancel, { once: true });
        window.addEventListener('pointercancel', cancel, { once: true });

        if (editing) {
          clearLongPressTimer();
          startFreeDrag(event, element);
        }
      });
    }

    function startFreeDrag(event, element) {
      event.preventDefault();
      event.stopPropagation();

      const rect = element.getBoundingClientRect();
      const layer = element.closest('.desktop-free-layer');
      const layerRect = layer.getBoundingClientRect();

      element.classList.add('is-dragging');
      element.setPointerCapture?.(event.pointerId);

      dragState = {
        element,
        pointerId: event.pointerId,
        type: element.dataset.type,
        id: element.dataset.type === 'widget' ? element.dataset.widgetId : element.dataset.appId,
        page: currentPage,
        offsetX: event.clientX - rect.left,
        offsetY: event.clientY - rect.top,
        layerRect
      };

      element.addEventListener('pointermove', handleFreeDragMove);
      element.addEventListener('pointerup', handleFreeDragEnd, { once: true });
      element.addEventListener('pointercancel', handleFreeDragEnd, { once: true });
    }

    function handleFreeDragMove(event) {
      if (!dragState) return;

      if (event.clientX < 28 && currentPage > 0) {
        scrollToPage(0);
        moveDragElementToPage(0);
      }

      if (event.clientX > window.innerWidth - 28 && currentPage < 1) {
        scrollToPage(1);
        moveDragElementToPage(1);
      }

      const layer = getLayer(dragState.page);
      const layerRect = layer.getBoundingClientRect();
      const nextX = event.clientX - layerRect.left - dragState.offsetX;
      const nextY = event.clientY - layerRect.top - dragState.offsetY;

      placeFreeItem(
        dragState.element,
        clamp(nextX, 0, Math.max(0, layerRect.width - dragState.element.offsetWidth)),
        clamp(nextY, 0, Math.max(0, layerRect.height - dragState.element.offsetHeight))
      );
    }

    function handleFreeDragEnd() {
      if (!dragState) return;

      const { element, type, id, page } = dragState;
      element.releasePointerCapture?.(dragState.pointerId);
      element.classList.remove('is-dragging');
      element.removeEventListener('pointermove', handleFreeDragMove);

      const x = parseFloat(element.style.left) || 0;
      const y = parseFloat(element.style.top) || 0;

      if (type === 'widget') {
        const positions = getWidgetPositions();
        positions[id] = { page, x, y };
        setData('app_widget_positions', positions);
      } else {
        const positions = getIconPositions();
        positions[id] = { page, x, y };
        setData('app_icon_positions', positions);
      }

      dragState = null;
    }

    function moveDragElementToPage(page) {
      if (!dragState) return;

      const nextPage = normalizePage(page);
      const layer = getLayer(nextPage);

      if (dragState.element.parentElement !== layer) {
        layer.appendChild(dragState.element);
      }

      dragState.page = nextPage;
    }

    function placeFreeItem(element, x, y) {
      element.style.left = `${Math.round(Number(x) || 0)}px`;
      element.style.top = `${Math.round(Number(y) || 0)}px`;
    }

    function enterEditing() {
      if (editing) return;

      editing = true;
      pagesEl.classList.add('editing');
      updateEditingClass();
      showToast('可以自由整理桌面了');
    }

    function exitEditing() {
      if (!editing || dragState) return;

      editing = false;
      pagesEl.classList.remove('editing');
      updateEditingClass();
    }

    function updateEditingClass() {
      document.querySelectorAll('.desktop-icon, .desktop-widget').forEach((element) => {
        const isDock = element.closest('.dock');
        element.classList.toggle('editing', editing && !isDock);
      });
    }

    function clearLongPressTimer() {
      if (longPressTimer) {
        window.clearTimeout(longPressTimer);
        longPressTimer = null;
      }
    }

    function bindDesktopEvents() {
      pagesEl.addEventListener('scroll', () => {
        const nextPage = Math.round(pagesEl.scrollLeft / Math.max(1, pagesEl.clientWidth));
        if (nextPage !== currentPage) {
          currentPage = normalizePage(nextPage);
          updatePageDots();
        }
      }, { passive: true });

      desktopEl.addEventListener('click', (event) => {
        if (!editing) return;
        if (event.target.closest('.desktop-icon, .desktop-widget')) return;
        exitEditing();
      });

      window.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') {
          if (currentAppId) closeCurrentApp();
          else exitEditing();
        }
      });
    }

    function scrollToPage(page) {
      currentPage = normalizePage(page);
      pagesEl.scrollTo({
        left: pagesEl.clientWidth * currentPage,
        behavior: 'smooth'
      });
      updatePageDots();
    }

    function updatePageDots() {
      document.querySelectorAll('.page-dot').forEach((dot) => {
        dot.classList.toggle('active', Number(dot.dataset.dot) === currentPage);
      });
    }

    async function openApp(appId) {
      const app = APPS.find((item) => item.id === appId);
      if (!app) return;

      exitEditing();
      await closeCurrentApp();

      appLayerEl.innerHTML = '';
      appLayerEl.classList.add('has-app');
      currentAppId = appId;

      if (!app.ready || !app.module) {
        mountPlaceholderApp(app);
        return;
      }

      try {
        const module = await import(app.module);
        currentAppModule = module;

        if (typeof module.mount === 'function') {
          await module.mount(appLayerEl);
          return;
        }

        mountPlaceholderApp(app);
      } catch (error) {
        console.warn(`[desktop] ${app.module} 未就绪`, error);
        mountPlaceholderApp(app);
      }
    }

    async function closeCurrentApp() {
      if (currentAppModule && typeof currentAppModule.unmount === 'function') {
        try {
          await currentAppModule.unmount();
        } catch (error) {
          console.warn('[desktop] app unmount failed', error);
        }
      }

      currentAppModule = null;
      currentAppId = '';
      appLayerEl.innerHTML = '';
      appLayerEl.classList.remove('has-app');
      refreshBadges();
    }

    function mountPlaceholderApp(app) {
      const screen = document.createElement('section');
      screen.className = 'placeholder-app';

      const nav = document.createElement('div');
      nav.className = 'nav-bar';

      const backButton = document.createElement('button');
      backButton.type = 'button';
      backButton.className = 'icon-button';
      backButton.setAttribute('aria-label', '返回');
      backButton.appendChild(createIcon('back', 24));
      backButton.addEventListener('click', closeCurrentApp);

      const title = document.createElement('div');
      title.className = 'nav-title';
      title.textContent = app.name;

      nav.append(backButton, title);

      const body = document.createElement('div');
      body.className = 'placeholder-body';

      const card = document.createElement('div');
      card.className = 'placeholder-card';

      const iconWrap = document.createElement('div');
      iconWrap.className = 'placeholder-icon';
      iconWrap.appendChild(createIcon(app.icon, 28));

      const heading = document.createElement('h1');
      heading.className = 'placeholder-title';
      heading.textContent = app.name;

      const text = document.createElement('p');
      text.className = 'placeholder-text';
      text.textContent = app.module
        ? '这个应用入口已经准备好，写到对应文件后会自动接入完整功能。'
        : '这里会作为相册入口，用来集中查看你保存的图片和回忆。';

      card.append(iconWrap, heading, text);
      body.appendChild(card);
      screen.append(nav, body);
      appLayerEl.appendChild(screen);
    }

    function initWidgets() {
      updateClock();
      clockTimer = window.setInterval(updateClock, 1000);

      updateWeather();
      updateAnniversary();
      updateFocusCard();

      weatherTimer = window.setInterval(updateWeather, 30 * 60 * 1000);

      document.addEventListener('visibilitychange', () => {
        if (!document.hidden) {
          updateClock();
          updateWeather();
          updateAnniversary();
          updateFocusCard();
          refreshBadges();
        }
      });
    }

    function updateClock() {
      const now = new Date();
      const time = new Intl.DateTimeFormat('zh-CN', {
        hour: '2-digit',
        minute: '2-digit',
        hour12: false
      }).format(now);

      const date = new Intl.DateTimeFormat('zh-CN', {
        month: 'long',
        day: 'numeric',
        weekday: 'long'
      }).format(now);

      statusTimeEl.textContent = time;

      document.querySelectorAll('[data-clock-large]').forEach((element) => {
        element.textContent = time;
      });

      document.querySelectorAll('[data-date-line]').forEach((element) => {
        element.textContent = date;
      });

      updateFocusCard();
    }

    function updateFocusCard() {
      const hour = new Date().getHours();
      const hiddenCount = getHiddenIcons().length;
      const unreadCounts = getData('chat_unread_counts') || {};
      const chatUnread = Object.values(unreadCounts).reduce((sum, value) => sum + normalizeCount(value), 0);

      let title = '今天也很适合聊天';
      if (hour < 5) title = '夜深了，慢一点';
      else if (hour < 11) title = '早上好';
      else if (hour >= 18) title = '晚上好';

      let text = '打开聊天，看看谁在想你';
      const weatherText = document.querySelector('[data-weather-value]')?.textContent || '';
      const anniversaryText = document.querySelector('[data-anniversary-value]')?.textContent || '';

      if (chatUnread > 0) {
        text = `有 ${chatUnread} 条聊天消息等你查看`;
      } else if (hiddenCount > 0) {
        text = `有 ${hiddenCount} 个图标被隐藏，可在设置里恢复`;
      } else if (weatherText && weatherText !== '自动获取中' && weatherText !== '稍后再看') {
        text = weatherText;
      } else if (anniversaryText && anniversaryText !== '暂无提醒') {
        text = anniversaryText;
      }

      document.querySelectorAll('[data-focus-title]').forEach((element) => {
        element.textContent = title;
      });

      document.querySelectorAll('[data-focus-text]').forEach((element) => {
        element.textContent = text;
      });
    }

    async function updateWeather() {
      const settings = ensureDefaultSettings();
      if (settings.widgets?.weather === false) return;

      const cache = getData('weather_cache');
      const now = Date.now();

      if (cache?.data?.text && cache?.timestamp && now - cache.timestamp < 30 * 60 * 1000) {
        setWeatherText(cache.data.text);
        return;
      }

      if (cache?.text && cache?.timestamp && now - cache.timestamp < 30 * 60 * 1000) {
        setWeatherText(cache.text);
        return;
      }

      try {
        const response = await fetch('https://wttr.in/?format=j1', {
          method: 'GET',
          cache: 'no-store'
        });

        if (!response.ok) return;

        const data = await response.json();
        const current = data.current_condition?.[0] || {};
        const area = data.nearest_area?.[0] || {};
        const city = area.areaName?.[0]?.value || area.region?.[0]?.value || '当前位置';
        const temp = current.temp_C ? `${current.temp_C}℃` : '';
        const desc = current.lang_zh?.[0]?.value || current.weatherDesc?.[0]?.value || '';
        const text = [city, temp, desc].filter(Boolean).join(' · ');

        if (text) {
          setWeatherText(text);
          setData('weather_cache', {
            data: { city, temp, desc, text },
            timestamp: now
          });
        }
      } catch (_) {
        if (!cache?.data?.text && !cache?.text) {
          setWeatherText('稍后再看');
        }
      }
    }

    function setWeatherText(text) {
      document.querySelectorAll('[data-weather-value]').forEach((element) => {
        element.textContent = text;
      });
      updateFocusCard();
    }

    async function updateAnniversary() {
      const settings = ensureDefaultSettings();
      if (settings.widgets?.anniversary === false) return;

      let next = null;
      const anniversaryApp = APPS.find((app) => app.id === 'anniversary');

      if (anniversaryApp?.ready && anniversaryApp.module) {
        try {
          const module = await import(anniversaryApp.module);
          if (typeof module.getNextAnniversary === 'function') {
            next = await module.getNextAnniversary();
          }
        } catch (_) {
          next = null;
        }
      }

      if (!next) next = getNextAnniversaryFallback();

      if (!next) {
        setAnniversaryText('暂无提醒');
        return;
      }

      const days = Number(next.days);
      if (days === 0) setAnniversaryText(`${next.name} · 就是今天`);
      else if (days > 0) setAnniversaryText(`${next.name} · 还有 ${days} 天`);
      else setAnniversaryText(`${next.name} · 已过 ${Math.abs(days)} 天`);
    }

    function setAnniversaryText(text) {
      document.querySelectorAll('[data-anniversary-value]').forEach((element) => {
        element.textContent = text;
      });
      updateFocusCard();
    }

    function getNextAnniversaryFallback() {
      const list = getData('anniversaries');
      if (!Array.isArray(list) || !list.length) return null;

      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const items = list
        .filter((item) => item?.name && item?.date)
        .map((item) => {
          const target = new Date(item.date);
          target.setHours(0, 0, 0, 0);
          const days = Math.ceil((target.getTime() - today.getTime()) / 86400000);
          return { name: item.name, days };
        })
        .sort((a, b) => Math.abs(a.days) - Math.abs(b.days));

      return items[0] || null;
    }

    function setupAppEvents() {
      window.AppEvents.on('badge:moments', (count) => {
        setBadge('moments', normalizeCount(count));
      });

      window.AppEvents.on('badge:chat', async (payload) => {
        if (payload && typeof payload === 'object' && Number.isFinite(Number(payload.count))) {
          const unreadCounts = getData('chat_unread_counts') || {};
          unreadCounts[payload.characterId || 'chat'] = normalizeCount(payload.count);
          setData('chat_unread_counts', unreadCounts);
        }

        await refreshBadges();
      });

      window.AppEvents.on('desktop:refresh', async () => {
        await applyWallpaper();
        renderDesktop();
        initWidgets();
        refreshBadges();
      });
    }

    async function refreshBadges() {
      await Promise.all([
        refreshMomentsBadge(),
        refreshChatBadge()
      ]);
      updateFocusCard();
    }

    async function refreshMomentsBadge() {
      try {
        const moments = await getAllDB('moments');
        const count = moments.filter((item) => item && item.isRead === false).length;
        setBadge('moments', count);
      } catch (_) {
        setBadge('moments', 0);
      }
    }

    async function refreshChatBadge() {
      const unreadCounts = getData('chat_unread_counts') || {};
      const total = Object.values(unreadCounts).reduce((sum, value) => {
        return sum + normalizeCount(value);
      }, 0);

      setBadge('chat', total);
    }

    function setBadge(appId, count) {
      document.querySelectorAll(`[data-badge="${appId}"]`).forEach((badge) => {
        const value = normalizeCount(count);

        if (value <= 0) {
          badge.classList.add('hidden');
          badge.textContent = '';
          return;
        }

        badge.classList.remove('hidden');
        badge.textContent = value > 99 ? '99+' : String(value);
      });
    }

    function showInstallTipIfNeeded() {
      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
      const isStandalone = window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches;
      const closed = getData('app_install_tip_closed') === true;

      if (!isIOS || isStandalone || closed) return;

      const tip = document.createElement('div');
      tip.className = 'install-tip';

      const text = document.createElement('p');
      text.textContent = '添加到主屏幕可减少数据丢失风险。点击 Safari 分享按钮，再选择添加到主屏幕。';

      const closeButton = document.createElement('button');
      closeButton.type = 'button';
      closeButton.className = 'icon-button';
      closeButton.setAttribute('aria-label', '关闭');
      closeButton.appendChild(createIcon('close', 20));
      closeButton.addEventListener('click', () => {
        setData('app_install_tip_closed', true);
        tip.remove();
      });

      tip.append(text, closeButton);
      document.body.appendChild(tip);
    }

    function showOnboardingIfNeeded() {
      if (getData('app_onboarding_done') === true) return;

      const steps = [
        {
          title: '欢迎来到小手机',
          text: '这里是你的纯静态 AI 手机桌面。聊天、角色、朋友圈、备忘录和小游戏都会慢慢装进来。'
        },
        {
          title: '先去设置',
          text: '使用 AI 前，需要在设置里填写 API 地址、Key 和模型。所有数据只保存在你的浏览器里。'
        },
        {
          title: '创建第一个角色',
          text: '接着去角色应用创建一个 AI 角色，写好人设后就可以开始聊天。'
        }
      ];

      let index = 0;

      const overlay = document.createElement('div');
      overlay.className = 'guide-overlay';

      const card = document.createElement('div');
      card.className = 'guide-card';

      const dots = document.createElement('div');
      dots.className = 'guide-steps';

      const title = document.createElement('h2');
      title.className = 'guide-title';

      const text = document.createElement('p');
      text.className = 'guide-text';

      const actions = document.createElement('div');
      actions.className = 'guide-actions';

      const skipButton = document.createElement('button');
      skipButton.type = 'button';
      skipButton.className = 'btn-ghost';
      skipButton.textContent = '跳过';

      const nextButton = document.createElement('button');
      nextButton.type = 'button';
      nextButton.className = 'btn-primary';

      steps.forEach((_, stepIndex) => {
        const dot = document.createElement('span');
        dot.className = 'guide-step-dot';
        dot.dataset.step = String(stepIndex);
        dots.appendChild(dot);
      });

      function renderStep() {
        const step = steps[index];
        title.textContent = step.title;
        text.textContent = step.text;
        nextButton.textContent = index === steps.length - 1 ? '开始使用' : '下一步';

        dots.querySelectorAll('.guide-step-dot').forEach((dot) => {
          dot.classList.toggle('active', Number(dot.dataset.step) === index);
        });
      }

      function closeGuide() {
        setData('app_onboarding_done', true);
        overlay.remove();
      }

      skipButton.addEventListener('click', closeGuide);
      nextButton.addEventListener('click', () => {
        if (index >= steps.length - 1) {
          closeGuide();
          return;
        }

        index += 1;
        renderStep();
      });

      actions.append(skipButton, nextButton);
      card.append(dots, title, text, actions);
      overlay.appendChild(card);
      document.body.appendChild(overlay);
      renderStep();
    }

    function getDefaultIconPosition(index) {
      const column = index % 4;
      const row = Math.floor(index / 4);
      return {
        x: 24 + column * 86,
        y: 330 + row * 92
      };
    }

    function getCustomIcons() {
      const icons = getData('app_icons');
      return icons && typeof icons === 'object' ? icons : {};
    }

    function getHiddenIcons() {
      const hidden = getData('app_hidden_icons');
      return Array.isArray(hidden) ? hidden : [];
    }

    function getIconPositions() {
      const positions = getData('app_icon_positions');
      return positions && typeof positions === 'object' ? positions : {};
    }

    function getWidgetPositions() {
      const positions = getData('app_widget_positions');
      return positions && typeof positions === 'object' ? positions : {};
    }

    function getLayer(page) {
      return document.querySelector(`[data-layer="${normalizePage(page)}"]`);
    }

    function getWidgetName(id) {
      const widget = WIDGETS.find((item) => item.id === id);
      return widget?.name || '桌面';
    }

    function normalizePage(page) {
      return page === 1 ? 1 : 0;
    }

    function normalizeCount(value) {
      const number = Number(value);
      return Number.isFinite(number) && number > 0 ? Math.floor(number) : 0;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    window.addEventListener('beforeunload', () => {
      if (clockTimer) window.clearInterval(clockTimer);
      if (weatherTimer) window.clearInterval(weatherTimer);
    });
  </script>
