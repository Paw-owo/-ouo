<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>AI手机桌面</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- 状态栏 -->
    <div class="status-bar">
      <div class="status-time">12:36</div>
      <div class="status-icons">
        <span>5G</span>
        <span id="battery-level">70%</span>
      </div>
    </div>

    <!-- 桌面容器 -->
    <div class="desktop" id="desktop">
      <!-- 第一个桌面页面 -->
      <div class="desktop-page active" id="page-1" data-page="1"></div>

      <!-- 第二个桌面页面 -->
      <div class="desktop-page next" id="page-2" data-page="2"></div>
    </div>

    <!-- 页面指示器 -->
    <div class="page-indicator">
      <div class="page-dot active" data-page="1"></div>
      <div class="page-dot" data-page="2"></div>
    </div>

    <!-- Dock栏 -->
    <div class="dock">
      <div class="dock-icon" data-app="chat">

          <path d="M34 34 L34 36 M32 36 Q34 38 36 36" stroke="#FFB8C8" stroke-width="1.5" fill="none" stroke-linecap="round"/>

          <path d="M26 42 L34 48 L42 42" stroke="#FFB8C8" stroke-width="1.5" fill="none"/>

      </div>
      <div class="dock-icon" data-app="moments">

  </div>

        case 'games':

    // 桌面管理器
    class Desktop {
      constructor() {
        this.currentPage = 1;
        this.isEditMode = false;
        this.isDragging = false;
        this.dragTarget = null;
        this.dragStartPos = { x: 0, y: 0 };
        this.dragOffset = { x: 0, y: 0 };
        this.longPressTimer = null;
        this.widgets = [];
        this.icons = [];
      }

      async init() {
        await storage.init();
        themeManager.init();

        this.loadLayout();
        this.createDefaultWidgets();
        this.createAppIcons();
        this.bindEvents();
        
        this.updateStatusBar();
        setInterval(() => this.updateStatusBar(), 1000);
        
        this.updateWidgets();
        setInterval(() => this.updateWidgets(), 60000);
      }

      loadLayout() {
        const layout = storage.getDesktopLayout();
        this.widgets = layout.widgets || [];
        this.icons = layout.icons || [];
      }

      saveLayout() {
        storage.saveDesktopLayout({
          widgets: this.widgets,
          icons: this.icons
        });
      }

      createDefaultWidgets() {
        const settings = storage.getSettings();

        if (this.widgets.length === 0) {
          if (settings.desktopWidgets.time !== false) {
            this.widgets.push({
              id: 'widget-time',
              type: 'time',
              size: '2x1',
              page: 1,
              x: 20,
              y: 80
            });
          }

          if (settings.desktopWidgets.weather !== false) {
            this.widgets.push({
              id: 'widget-weather',
              type: 'weather',
              size: '2x1',
              page: 1,
              x: 20,
              y: 260
            });
          }

          if (settings.desktopWidgets.anniversary !== false) {
            this.widgets.push({
              id: 'widget-anniversary',
              type: 'anniversary',
              size: '1x1',
              page: 1,
              x: 210,
              y: 440
            });
          }
        }

        this.widgets.forEach(widget => this.renderWidget(widget));
      }

      renderWidget(widget) {
        const page = document.getElementById(`page-${widget.page}`);
        if (!page) return;

                 const widgetEl = document.createElement('div');
        widgetEl.className = `widget widget-${widget.size}`;
        widgetEl.id = widget.id;
        widgetEl.style.left = `${widget.x}px`;
        widgetEl.style.top = `${widget.y}px`;
        widgetEl.dataset.type = widget.type;
        widgetEl.dataset.page = widget.page;

        if (widget.type === 'time') {
          widgetEl.classList.add('widget-time');
          widgetEl.innerHTML = `
            <div class="widget-time-hour">00:00</div>
            <div class="widget-time-date">加载中</div>
          `;
        } else if (widget.type === 'weather') {
          widgetEl.classList.add('widget-weather');
          widgetEl.innerHTML = `
            <div class="widget-weather-temp">--°</div>
            <div class="widget-weather-info">加载中</div>
          `;
        } else if (widget.type === 'anniversary') {
          widgetEl.classList.add('widget-anniversary');
          widgetEl.innerHTML = `
            <div class="widget-anniversary-title">纪念日</div>
            <div class="widget-anniversary-days">--</div>
          `;
        } else if (widget.type === 'custom') {
          widgetEl.classList.add('widget-custom');
          if (widget.image) {
            widgetEl.innerHTML = `<img class="widget-custom-image" src="${widget.image}" alt="">`;
          } else if (widget.text) {
            widgetEl.innerHTML = `<div class="widget-custom-text">${widget.text}</div>`;
          }
        }

        page.appendChild(widgetEl);
        this.bindDragEvents(widgetEl, true);
      }

      createAppIcons() {
        if (this.icons.length === 0) {
          APPS.forEach((app, index) => {
            const page = index < 6 ? 1 : 2;
            const posInPage = index < 6 ? index : index - 6;
            
            let x, y;
            if (page === 1) {
              const positions = [
                { x: 30, y: 450 },
                { x: 130, y: 480 },
                { x: 230, y: 460 },
                { x: 290, y: 520 },
                { x: 50, y: 560 },
                { x: 180, y: 590 }
              ];
              x = positions[posInPage].x;
              y = positions[posInPage].y;
            } else {
              const positions = [
                { x: 40, y: 100 },
                { x: 160, y: 120 },
                { x: 280, y: 100 },
                { x: 70, y: 200 }
              ];
              x = positions[posInPage]?.x || 40;
              y = positions[posInPage]?.y || 300;
            }

            this.icons.push({
              id: `icon-${app.id}`,
              appId: app.id,
              name: app.name,
              page,
              x,
              y
            });
          });
        }

        this.icons.forEach(icon => this.renderIcon(icon));
      }

      renderIcon(icon) {
        const page = document.getElementById(`page-${icon.page}`);
        if (!page) return;

        const app = APPS.find(a => a.id === icon.appId);
        if (!app) return;

        const iconEl = document.createElement('div');
        iconEl.className = 'app-icon';
        iconEl.id = icon.id;
        iconEl.style.left = `${icon.x}px`;
        iconEl.style.top = `${icon.y}px`;
        iconEl.dataset.appId = icon.appId;
        iconEl.dataset.page = icon.page;

        const iconImage = document.createElement('div');
        iconImage.className = 'app-icon-image';
        iconImage.appendChild(createAppIcon(app.id, app.color));

        const iconLabel = document.createElement('div');
        iconLabel.className = 'app-icon-label';
        iconLabel.textContent = icon.name;

        iconEl.appendChild(iconImage);
        iconEl.appendChild(iconLabel);

        page.appendChild(iconEl);
        this.bindDragEvents(iconEl, false);

        iconEl.addEventListener('click', (e) => {
          if (!this.isEditMode && !this.isDragging) {
            this.openApp(icon.appId);
          }
        });
      }

      bindDragEvents(element, isWidget) {
        const handleTouchStart = (e) => {
          if (this.isDragging) return;

          const touch = e.touches[0];
          this.dragStartPos = { 
            x: touch.clientX, 
            y: touch.clientY 
          };

          this.longPressTimer = setTimeout(() => {
            this.enterEditMode();
            this.startDrag(element, touch, isWidget);
          }, 500);
        };

        const handleTouchMove = (e) => {
          const touch = e.touches[0];
          const moved = Math.abs(touch.clientX - this.dragStartPos.x) + 
                       Math.abs(touch.clientY - this.dragStartPos.y);

          if (moved > 10) {
            clearTimeout(this.longPressTimer);
          }

          if (this.isDragging && this.dragTarget === element) {
            e.preventDefault();
            this.updateDragPosition(touch, isWidget);
          }
        };

        const handleTouchEnd = () => {
          clearTimeout(this.longPressTimer);

          if (this.isDragging && this.dragTarget === element) {
            this.endDrag(isWidget);
          }
        };

        element.addEventListener('touchstart', handleTouchStart, { passive: true });
        element.addEventListener('touchmove', handleTouchMove, { passive: false });
        element.addEventListener('touchend', handleTouchEnd);
      }

      enterEditMode() {
        if (this.isEditMode) return;
        this.isEditMode = true;
        document.body.classList.add('edit-mode');
      }

      exitEditMode() {
        if (!this.isEditMode) return;
        this.isEditMode = false;
        document.body.classList.remove('edit-mode');
        this.saveLayout();
      }

      startDrag(element, touch, isWidget) {
        this.isDragging = true;
        this.dragTarget = element;

        const rect = element.getBoundingClientRect();
        this.dragOffset = {
          x: touch.clientX - rect.left,
          y: touch.clientY - rect.top
        };

        element.classList.add('dragging');
      }

      updateDragPosition(touch, isWidget) {
        if (!this.dragTarget) return;

        let x = touch.clientX - this.dragOffset.x;
        let y = touch.clientY - this.dragOffset.y;

        const maxX = window.innerWidth - this.dragTarget.offsetWidth;
        const maxY = window.innerHeight - 88 - this.dragTarget.offsetHeight;

        x = Math.max(0, Math.min(x, maxX));
        y = Math.max(44, Math.min(y, maxY));

        if (isWidget) {
          const collision = this.checkWidgetCollision(x, y, this.dragTarget);
          if (collision) return;
        }

        this.dragTarget.style.left = `${x}px`;
        this.dragTarget.style.top = `${y}px`;
      }

      checkWidgetCollision(x, y, currentWidget) {
        const currentRect = {
          left: x,
          top: y,
          right: x + currentWidget.offsetWidth,
          bottom: y + currentWidget.offsetHeight
        };

        const widgets = document.querySelectorAll('.widget');
        for (let widget of widgets) {
          if (widget === currentWidget) continue;

          const rect = widget.getBoundingClientRect();
          const widgetRect = {
            left: rect.left,
            top: rect.top,
            right: rect.right,
            bottom: rect.bottom
          };

          if (!(currentRect.right < widgetRect.left ||
                currentRect.left > widgetRect.right ||
                currentRect.bottom < widgetRect.top ||
                currentRect.top > widgetRect.bottom)) {
            return true;
          }
        }

        return false;
      }

      endDrag(isWidget) {
        if (!this.dragTarget) return;

        this.dragTarget.classList.remove('dragging');

        const id = this.dragTarget.id;
        const x = parseInt(this.dragTarget.style.left);
        const y = parseInt(this.dragTarget.style.top);

        if (isWidget) {
          const widget = this.widgets.find(w => w.id === id);
          if (widget) {
            widget.x = x;
            widget.y = y;
          }
        } else {
          const icon = this.icons.find(i => i.id === id);
          if (icon) {
            icon.x = x;
            icon.y = y;
          }
        }

        this.dragTarget = null;
        this.isDragging = false;

        setTimeout(() => this.exitEditMode(), 2000);
      }

      bindEvents() {
        const desktop = document.getElementById('desktop');
        let startX = 0;
        let startTime = 0;

        desktop.addEventListener('touchstart', (e) => {
          if (this.isEditMode || this.isDragging) return;
          startX = e.touches[0].clientX;
          startTime = Date.now();
        }, { passive: true });

        desktop.addEventListener('touchend', (e) => {
          if (this.isEditMode || this.isDragging) return;

          const endX = e.changedTouches[0].clientX;
          const diff = startX - endX;
          const time = Date.now() - startTime;

          if (Math.abs(diff) > 50 && time < 300) {
            if (diff > 0 && this.currentPage < 2) {
              this.switchPage(this.currentPage + 1);
            } else if (diff < 0 && this.currentPage > 1) {
              this.switchPage(this.currentPage - 1);
            }
          }
        });

        document.querySelectorAll('.dock-icon').forEach(icon => {
          icon.addEventListener('click', () => {
            const appId = icon.dataset.app;
            this.openApp(appId);
          });
        });
      }

      switchPage(pageNum) {
        this.currentPage = pageNum;

        document.querySelectorAll('.desktop-page').forEach((page, index) => {
          page.classList.remove('active', 'prev', 'next');
          if (index + 1 === pageNum) {
            page.classList.add('active');
          } else if (index + 1 < pageNum) {
            page.classList.add('prev');
          } else {
            page.classList.add('next');
          }
        });

        document.querySelectorAll('.page-dot').forEach((dot, index) => {
          dot.classList.toggle('active', index + 1 === pageNum);
        });
      }

      updateStatusBar() {
        const now = new Date();
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        document.querySelector('.status-time').textContent = `${hours}:${minutes}`;
      }

      async updateWidgets() {
        const now = new Date();

        document.querySelectorAll('.widget-time').forEach(widget => {
          const hours = String(now.getHours()).padStart(2, '0');
          const minutes = String(now.getMinutes()).padStart(2, '0');
          const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
          const dateStr = `${now.getMonth() + 1}月${now.getDate()}日 ${weekdays[now.getDay()]}`;

          widget.querySelector('.widget-time-hour').textContent = `${hours}:${minutes}`;
          widget.querySelector('.widget-time-date').textContent = dateStr;
        });

        this.updateWeather();
        this.updateAnniversary();
      }

      async updateWeather() {
        const settings = storage.getSettings();
        const city = settings.weatherCity || '温州';

        try {
          const response = await fetch('https://wttr.in/?format=j1');
          const data = await response.json();

          const temp = data.current_condition[0].temp_C;
          const weatherDesc = {
            'Sunny': '晴',
            'Clear': '晴',
            'Partly cloudy': '多云',
            'Cloudy': '阴',
            'Overcast': '阴',
            'Mist': '雾',
            'Fog': '雾',
            'Light rain': '小雨',
            'Moderate rain': '中雨',
            'Heavy rain': '大雨'
          };
          const desc = weatherDesc[data.current_condition[0].weatherDesc[0].value] || '晴';

          document.querySelectorAll('.widget-weather').forEach(widget => {
            widget.querySelector('.widget-weather-temp').textContent = `${temp}°`;
            widget.querySelector('.widget-weather-info').textContent = `${city} · ${desc}`;
          });
        } catch (error) {
          console.error('天气获取失败:', error);
        }
      }

      updateAnniversary() {
        document.querySelectorAll('.widget-anniversary').forEach(widget => {
          widget.querySelector('.widget-anniversary-days').textContent = '--';
        });
      }

      async openApp(appId) {
        const app = APPS.find(a => a.id === appId);
        if (!app) return;

        try {
          const module = await import(app.module);
          if (module.default && module.default.open) {
            module.default.open();
          }
        } catch (error) {
          console.error(`应用 ${appId} 加载失败:`, error);
          ui.showToast(`应用加载失败: ${app.name}`, 'error');
        }
      }
    }

    const desktop = new Desktop();
    desktop.init();

    window.desktop = desktop;
    window.APPS = APPS;
  </script>
</body>
</html>
