<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>桌面</title>
<link rel="stylesheet" href="./style.css" />
<style>
  /* ===== 桌面框架专属样式（变量来自 style.css :root） ===== */
  html, body {
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    position: fixed;
    margin: 0;
    padding: 0;
    font-family: var(--font-main);
    color: var(--text-primary);
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }

  #wallpaper {
    position: fixed;
    inset: 0;
    background: var(--bg-primary);
    background-size: cover;
    background-position: center;
    transition: background-image 400ms ease;
    z-index: 0;
  }

  /* 状态栏 */
  #statusbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 44px;
    padding: 0 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
    z-index: 30;
    pointer-events: none;
  }
  #statusbar .right { display: flex; align-items: center; gap: 6px; }
  #statusbar svg { display: block; }

  /* 桌面滑动容器 */
  #desktop {
    position: fixed;
    inset: 0;
    z-index: 10;
    overflow: hidden;
  }
  #pages {
    position: absolute;
    top: 0; left: 0;
    height: 100%;
    display: flex;
    transition: transform 320ms cubic-bezier(.4,.0,.2,1);
    will-change: transform;
  }
  .page {
    position: relative;
    height: 100%;
    flex: 0 0 100vw;
    width: 100vw;
    background-size: cover;
    background-position: center;
  }

  /* 桌面项（图标 / 组件）自由定位 */
  .item {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    transition: transform 180ms ease, opacity 180ms ease;
    touch-action: none;
  }
  .item.dragging {
    transition: none;
    z-index: 100;
    transform: scale(1.08);
    opacity: 0.92;
  }

  /* 图标方块 */
  .icon-tile {
    width: 60px;
    height: 60px;
    border-radius: 16px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--accent-light);
    background-size: cover;
    background-position: center;
    box-shadow: var(--shadow-sm);
  }
  .icon-tile svg { width: 30px; height: 30px; stroke: var(--accent-dark); }
  .icon-label {
    font-size: 12px;
    color: #fff;
    text-shadow: 0 1px 3px rgba(0,0,0,0.35);
    max-width: 72px;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .icon-tile .badge {
    position: absolute;
    top: 2px; right: 2px;
    min-width: 18px;
    height: 18px;
    padding: 0 5px;
    border-radius: 9px;
    background: #FF4D4F;
    color: #fff;
    font-size: 11px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* 小组件 */
  .widget {
    border-radius: 22px;
    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(20px) saturate(160%);
    -webkit-backdrop-filter: blur(20px) saturate(160%);
    box-shadow: var(--shadow-md);
    padding: 16px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    overflow: hidden;
    color: var(--text-primary);
  }
  .widget.square { width: 150px; height: 150px; }
  .widget.rect { width: 318px; height: 150px; }

  .widget-clock .time { font-size: 46px; font-weight: 600; letter-spacing: 1px; line-height: 1; }
  .widget-clock .date { font-size: 14px; color: var(--text-secondary); margin-top: 8px; }

  .widget-weather .city { font-size: 14px; font-weight: 600; }
  .widget-weather .temp { font-size: 38px; font-weight: 600; margin-top: 4px; line-height: 1; }
  .widget-weather .desc { font-size: 13px; color: var(--text-secondary); margin-top: 6px; }

  .widget-anniv .label { font-size: 13px; color: var(--text-secondary); }
  .widget-anniv .name { font-size: 16px; font-weight: 600; margin-top: 4px; }
  .widget-anniv .days { font-size: 34px; font-weight: 600; margin-top: 8px; }
  .widget-anniv .days small { font-size: 14px; font-weight: 400; color: var(--text-secondary); margin-left: 4px; }

  /* 编辑模式抖动 */
  .editing .item:not(.dragging) { animation: wobble 0.4s infinite ease-in-out; }
  @keyframes wobble {
    0% { transform: rotate(-1.2deg); }
    50% { transform: rotate(1.2deg); }
    100% { transform: rotate(-1.2deg); }
  }

  /* 页面指示点 */
  #dots {
    position: fixed;
    bottom: 98px;
    left: 0; right: 0;
    display: flex;
    justify-content: center;
    gap: 8px;
    z-index: 20;
  }
  #dots .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: rgba(255,255,255,0.45);
    transition: all 200ms ease;
  }
  #dots .dot.active { background: #fff; width: 18px; border-radius: 4px; }

  /* Dock */
  #dock {
    position: fixed;
    bottom: 14px;
    left: 14px; right: 14px;
    height: 80px;
    border-radius: 28px;
    background: rgba(255,255,255,0.5);
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    box-shadow: var(--shadow-md);
    display: flex;
    align-items: center;
    justify-content: space-around;
    padding: 0 16px;
    z-index: 25;
  }
  #dock .dock-item { display: flex; flex-direction: column; align-items: center; }
  #dock .icon-tile { width: 56px; height: 56px; }

  /* 编辑完成按钮 */
  #doneBtn {
    position: fixed;
    top: 52px; right: 16px;
    z-index: 40;
    padding: 8px 18px;
    border-radius: 18px;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: var(--shadow-sm);
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
    display: none;
    transition: transform 150ms ease;
  }
  #doneBtn:active { transform: scale(0.96); }
  .editing #doneBtn { display: block; }

  /* App 容器 */
  #appLayer {
    position: fixed;
    inset: 0;
    z-index: 50;
    background: var(--bg-primary);
    transform: translateX(100%);
    transition: transform 300ms cubic-bezier(.4,.0,.2,1);
    overflow: hidden;
    visibility: hidden;
  }
  #appLayer.open { transform: translateX(0); visibility: visible; }
  #appContainer { width: 100%; height: 100%; overflow: hidden; }
</style>
</head>
<body>

<div id="wallpaper"></div>

<div id="statusbar">
  <span id="clockMini">9:41</span>
  <span class="right">
    <svg width="18" height="12" viewBox="0 0 18 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
      <path d="M1 11 L1 8 M5 11 L5 6 M9 11 L9 4 M13 11 L13 2"/>
    </svg>
    <svg width="22" height="12" viewBox="0 0 22 12" fill="none" stroke="currentColor" stroke-width="1.5">
      <rect x="1" y="2" width="17" height="8" rx="2.5"/>
      <rect x="3" y="4" width="12" height="4" rx="1" fill="currentColor" stroke="none"/>
      <path d="M20 4.5 L20 7.5" stroke-linecap="round"/>
    </svg>
  </span>
</div>

<div id="desktop">
  <div id="pages"></div>
</div>

<div id="dots"></div>
<div id="dock"></div>
<div id="doneBtn">完成</div>

<div id="appLayer"><div id="appContainer"></div></div>

<script type="module">
/* ============================================================
   桌面框架 index.html
   依赖：style.css 提供 CSS 变量；core/theme.js 初始化主题
   localStorage 键：
     kiro_desktop_layout  桌面布局 { items: { id: {type,page,x,y,...} } }
     kiro_wallpaper       全局壁纸 base64
     kiro_page_bg         每页背景 ["base64", ...]
     kiro_weather_city    天气城市，默认 温州
     kiro_widgets         小组件开关 {clock,weather,anniv}
     kiro_app_meta        各app图标/改名 { id:{name,icon} }
     kiro_anniversaries   纪念日数据（anniversary.js 写入）
     kiro_badges          未读角标 { appId: number }
   暴露 window.KiroDesktop 供 settings.js 调用
   ============================================================ */

import * as theme from './core/theme.js';
try {
  if (theme.initTheme) theme.initTheme();
  else if (theme.init) theme.init();
  else if (theme.applyTheme) theme.applyTheme();
  else if (theme.default && theme.default.init) theme.default.init();
} catch (e) { console.warn('theme init', e); }

/* ---------- 应用配置 ---------- */
const APPS = [
  { id: 'chat',        name: '消息',     module: './apps/chat.js' },
  { id: 'moments',     name: '朋友圈',   module: './apps/moments.js' },
  { id: 'characters',  name: '角色管理', module: './apps/characters.js' },
  { id: 'worldbook',   name: '世界书',   module: './apps/worldbook.js' },
  { id: 'games',       name: '小游戏',   module: './apps/games.js' },
  { id: 'shop',        name: '商店',     module: './apps/shop.js' },
  { id: 'wallet',      name: '钱包',     module: './apps/wallet.js' },
  { id: 'memo',        name: '备忘录',   module: './apps/memo.js' },
  { id: 'anniversary', name: '纪念日',   module: './apps/anniversary.js' },
  { id: 'settings',    name: '设置',     module: './apps/settings.js' },
];
const DOCK_IDS = ['chat', 'moments', 'characters', 'settings'];

/* 默认图标 SVG（细线，跟随文字色） */
const ICONS = {
  chat:'<path d="M21 11.5a8.38 8.38 0 0 1-9 8.4 8.5 8.5 0 0 1-3.8-.9L3 20l1.9-5.7A8.38 8.38 0 0 1 4 11.5a8.5 8.5 0 0 1 17 0z" fill="none"/>',
  moments:'<rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/>',
  characters:'<circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 3.5-6 8-6s8 2 8 6"/>',
  worldbook:'<path d="M4 5a2 2 0 0 1 2-2h11v16H6a2 2 0 0 0-2 2z"/><path d="M17 3v18"/>',
  games:'<rect x="2" y="7" width="20" height="11" rx="4"/><path d="M7 11v3M5.5 12.5h3"/><circle cx="16" cy="11.5" r="1"/><circle cx="18.5" cy="14" r="1"/>',
  shop:'<path d="M5 8h14l-1 12H6z"/><path d="M9 8a3 3 0 0 1 6 0"/>',
  wallet:'<rect x="3" y="6" width="18" height="13" rx="3"/><path d="M16 12h3"/><path d="M3 9h18"/>',
  memo:'<path d="M5 3h11l4 4v14H5z"/><path d="M9 9h6M9 13h6M9 17h4"/>',
  anniversary:'<rect x="3" y="5" width="18" height="16" rx="3"/><path d="M3 9h18M8 3v4M16 3v4"/><circle cx="12" cy="15" r="2.5"/>',
  settings:'<circle cx="12" cy="12" r="3.2"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5 5l2 2M17 17l2 2M19 5l-2 2M7 17l-2 2"/>',
};

/* ---------- 存储工具 ---------- */
function load(key, def) {
  try { const v = localStorage.getItem(key); return v == null ? def : JSON.parse(v); }
  catch { return def; }
}
function save(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

/* ---------- 默认布局 ---------- */
function defaultLayout() {
  const items = {};
  // 小组件
  items['widget-clock']   = { type:'widget', widget:'clock',   size:'rect',   page:0, x:20,  y:64 };
  items['widget-weather'] = { type:'widget', widget:'weather', size:'square', page:0, x:20,  y:230 };
  items['widget-anniv']   = { type:'widget', widget:'anniv',   size:'square', page:0, x:188, y:230 };
  // 桌面图标（非 dock）
  const desk = APPS.filter(a => !DOCK_IDS.includes(a.id));
  let col = 0, row = 0;
  const startY = 400, gapX = 88, gapY = 96, startX = 24;
  desk.forEach(a => {
    items[a.id] = { type:'app', page:0, x: startX + col*gapX, y: startY + row*gapY };
    col++; if (col >= 4) { col = 0; row++; }
  });
  return { items };
}

let layout = load('kiro_desktop_layout', null);
if (!layout || !layout.items) { layout = defaultLayout(); save('kiro_desktop_layout', layout); }
// 补全新增 app
APPS.forEach(a => {
  if (!DOCK_IDS.includes(a.id) && !layout.items[a.id]) {
    layout.items[a.id] = { type:'app', page:0, x:24, y:400 };
  }
});

let appMeta = load('kiro_app_meta', {});
let badges  = load('kiro_badges', {});
let widgetsOn = load('kiro_widgets', { clock:true, weather:true, anniv:true });

/* ---------- 渲染 ---------- */
const pagesEl = document.getElementById('pages');
const dotsEl  = document.getElementById('dots');
const dockEl  = document.getElementById('dock');

function pageCount() {
  let max = 0;
  Object.values(layout.items).forEach(it => { if (it.page > max) max = it.page; });
  return Math.max(2, max + 1);
}

function iconTileHTML(id) {
  const meta = appMeta[id] || {};
  const bg = meta.icon ? `style="background-image:url('${meta.icon}')"` : '';
  const inner = meta.icon ? '' :
    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">${ICONS[id]||''}</svg>`;
  const n = (badges[id] || 0);
  const badge = n > 0 ? `<span class="badge">${n>99?'99+':n}</span>` : '';
  return `<div class="icon-tile" ${bg}>${inner}${badge}</div>`;
}

function appName(id) {
  return (appMeta[id] && appMeta[id].name) || (APPS.find(a=>a.id===id)||{}).name || id;
}

function widgetHTML(it) {
  if (it.widget === 'clock') {
    return `<div class="widget-clock">
      <div class="time" data-clock>--:--</div>
      <div class="date" data-date>--</div></div>`;
  }
  if (it.widget === 'weather') {
    return `<div class="widget-weather">
      <div class="city" data-w-city>--</div>
      <div class="temp" data-w-temp>--°</div>
      <div class="desc" data-w-desc>加载中</div></div>`;
  }
  if (it.widget === 'anniv') {
    return `<div class="widget-anniv">
      <div class="label">纪念日</div>
      <div class="name" data-a-name>暂无</div>
      <div class="days" data-a-days>--<small>天</small></div></div>`;
  }
  return '';
}

function renderDesktop() {
  const n = pageCount();
  pagesEl.innerHTML = '';
  const pageBg = load('kiro_page_bg', []);
  for (let p = 0; p < n; p++) {
    const pg = document.createElement('div');
    pg.className = 'page';
    pg.dataset.page = p;
    if (pageBg[p]) pg.style.backgroundImage = `url('${pageBg[p]}')`;
    pagesEl.appendChild(pg);
  }
  pagesEl.style.width = (n * 100) + 'vw';

  Object.entries(layout.items).forEach(([id, it]) => {
    if (it.type === 'widget') {
      const key = it.widget;
      if ((key==='clock'&&!widgetsOn.clock)||(key==='weather'&&!widgetsOn.weather)||(key==='anniv'&&!widgetsOn.anniv)) return;
    }
    const el = document.createElement('div');
    el.className = 'item';
    el.dataset.id = id;
    el.style.left = it.x + 'px';
    el.style.top  = it.y + 'px';
    if (it.type === 'app') {
      el.innerHTML = iconTileHTML(id) + `<div class="icon-label">${appName(id)}</div>`;
    } else {
      el.innerHTML = `<div class="widget ${it.size}">${widgetHTML(it)}</div>`;
    }
    const page = pagesEl.children[it.page] || pagesEl.children[0];
    page.appendChild(el);
    attachDrag(el, id, it);
  });

  renderDots(n);
  renderDock();
  updateClock();
  updateWeather();
  updateAnniv();
  goPage(currentPage, false);
}

function renderDots(n) {
  dotsEl.innerHTML = '';
  for (let i = 0; i < n; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i === currentPage ? ' active' : '');
    dotsEl.appendChild(d);
  }
}

function renderDock() {
  dockEl.innerHTML = '';
  DOCK_IDS.forEach(id => {
    const el = document.createElement('div');
    el.className = 'dock-item';
    el.innerHTML = iconTileHTML(id);
    el.addEventListener('click', () => { if (!editing) openApp(id); });
    dockEl.appendChild(el);
  });
}

/* ---------- 翻页 ---------- */
let currentPage = 0;
function goPage(p, animate = true) {
  const n = pageCount();
  currentPage = Math.max(0, Math.min(n - 1, p));
  if (!animate) pagesEl.style.transition = 'none';
  pagesEl.style.transform = `translateX(${-currentPage * 100}vw)`;
  if (!animate) { pagesEl.offsetHeight; pagesEl.style.transition = ''; }
  Array.from(dotsEl.children).forEach((d, i) => d.classList.toggle('active', i === currentPage));
}

/* 桌面横向滑动翻页（非编辑模式、空白处） */
let swipeStartX = null, swipeStartY = null, swiping = false;
document.getElementById('desktop').addEventListener('pointerdown', e => {
  if (editing) return;
  if (e.target.closest('.item')) return;
  swipeStartX = e.clientX; swipeStartY = e.clientY; swiping = true;
});
document.getElementById('desktop').addEventListener('pointermove', e => {
  if (!swiping) return;
  const dx = e.clientX - swipeStartX;
  pagesEl.style.transition = 'none';
  pagesEl.style.transform = `translateX(calc(${-currentPage * 100}vw + ${dx}px))`;
});
document.getElementById('desktop').addEventListener('pointerup', e => {
  if (!swiping) return;
  swiping = false;
  pagesEl.style.transition = '';
  const dx = e.clientX - swipeStartX;
  if (Math.abs(dx) > 60) goPage(currentPage + (dx < 0 ? 1 : -1));
  else goPage(currentPage);
});

/* ---------- 编辑模式 ---------- */
let editing = false;
function setEditing(on) {
  editing = on;
  document.body.classList.toggle('editing', on);
}
document.getElementById('doneBtn').addEventListener('click', () => setEditing(false));
document.getElementById('desktop').addEventListener('click', e => {
  if (editing && !e.target.closest('.item')) setEditing(false);
});

/* ---------- 自由拖动 ---------- */
function attachDrag(el, id, it) {
  let longTimer = null, dragging = false, moved = false;
  let startX = 0, startY = 0, originLeft = 0, originTop = 0;
  let edgeTimer = null;

  el.addEventListener('pointerdown', e => {
    e.stopPropagation();
    startX = e.clientX; startY = e.clientY;
    originLeft = it.x; originTop = it.y;
    moved = false;
    el.setPointerCapture(e.pointerId);

    if (editing) { beginDrag(); }
    else {
      longTimer = setTimeout(() => { setEditing(true); beginDrag(); }, 500);
    }

    function beginDrag() {
      dragging = true;
      el.classList.add('dragging');
    }

    function onMove(ev) {
      const dx = ev.clientX - startX, dy = ev.clientY - startY;
      if (Math.abs(dx) > 6 || Math.abs(dy) > 6) {
        moved = true;
        if (longTimer) { clearTimeout(longTimer); longTimer = null; }
      }
      if (!dragging) return;
      it.x = originLeft + dx;
      it.y = originTop + dy;
      el.style.left = it.x + 'px';
      el.style.top = it.y + 'px';

      // 边缘热区翻页
      const w = window.innerWidth;
      if (ev.clientX > w - 30 && currentPage < pageCount() - 1) {
        if (!edgeTimer) edgeTimer = setTimeout(() => moveToPage(currentPage + 1, ev), 600);
      } else if (ev.clientX < 30 && currentPage > 0) {
        if (!edgeTimer) edgeTimer = setTimeout(() => moveToPage(currentPage - 1, ev), 600);
      } else { clearTimeout(edgeTimer); edgeTimer = null; }
    }

    function moveToPage(p, ev) {
      clearTimeout(edgeTimer); edgeTimer = null;
      it.page = p;
      it.x = ev.clientX < 30 ? window.innerWidth - 80 : 24;
      originLeft = it.x; originTop = it.y;
      startX = ev.clientX; startY = ev.clientY;
      goPage(p);
      pagesEl.children[p].appendChild(el);
      el.style.left = it.x + 'px';
      el.style.top = it.y + 'px';
    }

    function onUp(ev) {
      clearTimeout(longTimer); longTimer = null;
      clearTimeout(edgeTimer); edgeTimer = null;
      el.releasePointerCapture(ev.pointerId);
      window.removeEventListener('pointermove', onMove);
      window.removeEventListener('pointerup', onUp);

      if (dragging) {
        dragging = false;
        el.classList.remove('dragging');
        // 边界约束
        it.x = Math.max(4, Math.min(window.innerWidth - 66, it.x));
        it.y = Math.max(48, Math.min(window.innerHeight - 100, it.y));
        el.style.left = it.x + 'px';
        el.style.top = it.y + 'px';
        save('kiro_desktop_layout', layout);
      } else if (!moved && !editing && it.type === 'app') {
        openApp(id);
      } else if (!moved && !editing && it.type === 'widget') {
        if (it.widget === 'anniv') openApp('anniversary');
        else if (it.widget === 'weather') openApp('settings');
      }
    }

    window.addEventListener('pointermove', onMove);
    window.addEventListener('pointerup', onUp);
  });
}

/* ---------- 打开 / 关闭 App ---------- */
const appLayer = document.getElementById('appLayer');
const appContainer = document.getElementById('appContainer');
let currentAppModule = null;

async function openApp(id) {
  const app = APPS.find(a => a.id === id);
  if (!app) return;
  // 进入即清未读
  if (badges[id]) { delete badges[id]; save('kiro_badges', badges); refreshBadges(); }

  appContainer.innerHTML = '';
  appLayer.classList.add('open');
  try {
    const mod = await import(app.module);
    currentAppModule = mod;
    const api = { close: closeApp, openApp, container: appContainer };
    if (mod.open) mod.open(appContainer, api);
    else if (mod.default && typeof mod.default === 'function') mod.default(appContainer, api);
    else if (mod.render) mod.render(appContainer, api);
    else if (mod.mount) mod.mount(appContainer, api);
    else appContainer.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-secondary)">该应用暂未实现入口</div>';
  } catch (err) {
    console.error(err);
    appContainer.innerHTML = `<div style="padding:40px;text-align:center;color:var(--text-secondary)">加载失败：${err.message}</div>`;
  }
}

function closeApp() {
  appLayer.classList.remove('open');
  try { if (currentAppModule && currentAppModule.close) currentAppModule.close(); } catch (e) {}
  setTimeout(() => { appContainer.innerHTML = ''; currentAppModule = null; reloadDesktopState(); }, 320);
}

/* App 内可用左滑边缘返回（简易） */
appLayer.addEventListener('pointerdown', e => {
  if (e.clientX > 24) return;
  const sx = e.clientX;
  function mv(ev) {
    const dx = ev.clientX - sx;
    if (dx > 0) appLayer.style.transform = `translateX(${dx}px)`;
  }
  function up(ev) {
    window.removeEventListener('pointermove', mv);
    window.removeEventListener('pointerup', up);
    appLayer.style.transform = '';
    if (ev.clientX - sx > 90) closeApp();
  }
  window.addEventListener('pointermove', mv);
  window.addEventListener('pointerup', up);
});

/* ---------- 时钟 ---------- */
function updateClock() {
  const now = new Date();
  const hh = now.getHours();
  const mm = String(now.getMinutes()).padStart(2, '0');
  const t12 = `${hh}:${mm}`;
  document.getElementById('clockMini').textContent = t12;
  document.querySelectorAll('[data-clock]').forEach(e => e.textContent = t12);
  const wk = ['周日','周一','周二','周三','周四','周五','周六'][now.getDay()];
  const ds = `${now.getMonth()+1}月${now.getDate()}日 ${wk}`;
  document.querySelectorAll('[data-date]').forEach(e => e.textContent = ds);
}
setInterval(updateClock, 1000 * 15);

/* ---------- 天气（wttr.in 免费，无需 Key，默认温州，可自定义） ---------- */
async function updateWeather() {
  if (!widgetsOn.weather) return;
  const city = load('kiro_weather_city', '温州');
  document.querySelectorAll('[data-w-city]').forEach(e => e.textContent = city);
  try {
    const res = await fetch(`https://wttr.in/${encodeURIComponent(city)}?format=j1&lang=zh`);
    const data = await res.json();
    const cur = data.current_condition[0];
    const temp = cur.temp_C + '°';
    const desc = (cur.lang_zh && cur.lang_zh[0] && cur.lang_zh[0].value) || (cur.weatherDesc && cur.weatherDesc[0].value) || '';
    document.querySelectorAll('[data-w-temp]').forEach(e => e.textContent = temp);
    document.querySelectorAll('[data-w-desc]').forEach(e => e.textContent = desc);
  } catch (e) {
    document.querySelectorAll('[data-w-desc]').forEach(el => el.textContent = '获取失败');
  }
}

/* ---------- 纪念日 ---------- */
function updateAnniv() {
  let list = load('kiro_anniversaries', null) || load('anniversaries', []) || [];
  if (!Array.isArray(list) || list.length === 0) {
    document.querySelectorAll('[data-a-name]').forEach(e => e.textContent = '暂无');
    document.querySelectorAll('[data-a-days]').forEach(e => e.innerHTML = '--<small>天</small>');
    return;
  }
  const today = new Date(); today.setHours(0,0,0,0);
  let best = null, bestDiff = Infinity;
  list.forEach(a => {
    const d = new Date(a.date); d.setHours(0,0,0,0);
    const diff = Math.round((d - today) / 86400000);
    if (Math.abs(diff) < Math.abs(bestDiff)) { bestDiff = diff; best = a; }
  });
  if (best) {
    document.querySelectorAll('[data-a-name]').forEach(e => e.textContent = best.name || best.title || '纪念日');
    const txt = bestDiff === 0 ? '今天' : (bestDiff > 0 ? `${bestDiff}<small>天后</small>` : `${-bestDiff}<small>天前</small>`);
    document.querySelectorAll('[data-a-days]').forEach(e => e.innerHTML = txt);
  }
}

/* ---------- 角标刷新 ---------- */
function refreshBadges() {
  badges = load('kiro_badges', {});
  document.querySelectorAll('.item[data-id]').forEach(el => {
    const id = el.dataset.id;
    if (layout.items[id] && layout.items[id].type === 'app') {
      const tile = el.querySelector('.icon-tile');
      const old = tile.querySelector('.badge'); if (old) old.remove();
      const n = badges[id] || 0;
      if (n > 0) {
        const b = document.createElement('span');
        b.className = 'badge'; b.textContent = n > 99 ? '99+' : n;
        tile.appendChild(b);
      }
    }
  });
  renderDock();
}

/* ---------- 壁纸 ---------- */
function applyWallpaper() {
  const wp = load('kiro_wallpaper', null);
  document.getElementById('wallpaper').style.backgroundImage = wp ? `url('${wp}')` : '';
}

/* ---------- 从存储重载（App关闭后或设置修改后调用） ---------- */
function reloadDesktopState() {
  layout = load('kiro_desktop_layout', layout);
  appMeta = load('kiro_app_meta', {});
  widgetsOn = load('kiro_widgets', { clock:true, weather:true, anniv:true });
  applyWallpaper();
  renderDesktop();
}

/* ---------- 暴露接口给 settings.js ---------- */
window.KiroDesktop = {
  reload: reloadDesktopState,
  openApp,
  closeApp,
  setBadge(id, n) { badges[id] = n; save('kiro_badges', badges); refreshBadges(); },
  clearBadge(id) { delete badges[id]; save('kiro_badges', badges); refreshBadges(); },
  setWallpaper(b64) { save('kiro_wallpaper', b64); applyWallpaper(); },
  setPageBg(page, b64) { const a = load('kiro_page_bg', []); a[page] = b64; save('kiro_page_bg', a); renderDesktop(); },
  resetLayout() { layout = defaultLayout(); save('kiro_desktop_layout', layout); renderDesktop(); },
  addPage() { /* 新页面通过把图标拖过去自然产生，这里仅刷新 */ renderDesktop(); },
};

/* ---------- 启动 ---------- */
applyWallpaper();
renderDesktop();
updateClock();
window.addEventListener('storage', () => refreshBadges());
