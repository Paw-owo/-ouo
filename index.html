<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#FAFAFA" />
  <title>AI 手机桌面</title>
  <link rel="stylesheet" href="./style.css" />
  <style>
    html,
    body {
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      position: fixed;
      margin: 0;
      padding: 0;
      overscroll-behavior: none;
      -webkit-user-select: none;
      user-select: none;
      touch-action: none;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-main);
    }

    button,
    input,
    textarea,
    select {
      appearance: none;
      -webkit-appearance: none;
      outline: none;
      font-family: var(--font-main);
    }

    button {
      cursor: pointer;
      color: inherit;
    }

    .shell-root {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background: var(--bg-primary);
    }

    .desktop {
      position: absolute;
      inset: 0;
      overflow: hidden;
      background: var(--bg-primary);
      transition: opacity 200ms ease, transform 200ms ease;
    }

    .desktop.is-hidden {
      opacity: 0;
      transform: scale(0.98);
      pointer-events: none;
    }

    .wallpaper-layer {
      position: absolute;
      inset: 0;
      background-color: var(--bg-primary);
      background-size: cover;
      background-position: center;
      opacity: 1;
      transform: scale(1.02);
    }

    .wallpaper-layer::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(250, 250, 250, 0.48);
      backdrop-filter: blur(0.5px);
    }

    .desktop-content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .status-bar {
      height: 44px;
      padding: max(10px, env(safe-area-inset-top)) 22px 0;
      box-sizing: content-box;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
      line-height: 1;
      color: var(--text-primary);
      z-index: 20;
    }

    .status-right {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-primary);
    }

    .status-signal,
    .status-battery {
      width: 23px;
      height: 14px;
      display: block;
    }

    .desktop-widgets {
      padding: 8px 22px 12px;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 12px;
      z-index: 12;
      pointer-events: auto;
    }

    .desktop-widget {
      min-height: 96px;
      padding: 16px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.74);
      box-shadow: var(--shadow-sm);
      backdrop-filter: blur(18px);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
      color: var(--text-primary);
      transition: all 200ms ease;
    }

    .desktop-widget:active {
      transform: scale(0.98);
    }

    .desktop-widget.is-wide {
      grid-column: span 2;
      min-height: 78px;
    }

    .widget-label {
      font-size: 13px;
      line-height: 1.4;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .widget-value {
      font-size: 31px;
      line-height: 1.15;
      font-weight: 600;
      letter-spacing: -0.04em;
      color: var(--text-primary);
      white-space: nowrap;
    }

    .widget-sub {
      font-size: 13px;
      line-height: 1.5;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .desktop-pages-shell {
      position: relative;
      flex: 1;
      min-height: 0;
      overflow: hidden;
      z-index: 10;
    }

    .desktop-pages {
      position: absolute;
      inset: 0;
      display: flex;
      width: 200%;
      height: 100%;
      transition: transform 220ms ease;
      will-change: transform;
    }

    .desktop-pages.is-swiping {
      transition: none;
    }

    .desktop-page {
      position: relative;
      width: 50%;
      height: 100%;
      flex: 0 0 50%;
      overflow: hidden;
    }

    .app-icon {
      position: absolute;
      width: 74px;
      min-height: 92px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
      color: var(--text-primary);
      transform: translate3d(0, 0, 0);
      transition: transform 200ms ease, opacity 200ms ease;
      z-index: 2;
      touch-action: none;
      cursor: default;
    }

    .app-icon.is-dragging {
      z-index: 60;
      transition: none;
      opacity: 0.96;
      transform: translate3d(0, 0, 0) scale(1.06);
    }

    .desktop.is-editing .app-icon:not(.is-dragging) {
      animation: iconFloat 1100ms ease-in-out infinite;
    }

    .desktop.is-editing .app-icon:nth-child(2n) {
      animation-delay: 120ms;
    }

    .desktop.is-editing .app-icon:nth-child(3n) {
      animation-delay: 240ms;
    }

    @keyframes iconFloat {
      0%,
      100% {
        transform: translate3d(0, 0, 0) rotate(-0.7deg);
      }
      50% {
        transform: translate3d(0, -1px, 0) rotate(0.7deg);
      }
    }

    .app-icon-tile {
      width: 62px;
      height: 62px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.82);
      box-shadow: var(--shadow-md);
      display: grid;
      place-items: center;
      overflow: hidden;
      color: var(--text-primary);
      backdrop-filter: blur(18px);
      transition: all 200ms ease;
    }

    .app-icon:active .app-icon-tile {
      transform: scale(0.96);
    }

    .app-icon-tile.has-image {
      background-size: cover;
      background-position: center;
    }

    .app-icon-tile.has-image .icon-glyph {
      display: none;
    }

    .icon-glyph {
      width: 31px;
      height: 31px;
      display: grid;
      place-items: center;
      color: var(--text-primary);
      opacity: 0.88;
    }

    .icon-glyph svg {
      width: 31px;
      height: 31px;
      display: block;
    }

    .icon-glyph svg * {
      fill: none;
      stroke: currentColor;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .app-icon-name {
      max-width: 76px;
      min-height: 18px;
      padding: 0 3px;
      text-align: center;
      font-size: 12px;
      line-height: 1.35;
      color: var(--text-primary);
      text-shadow: 0 1px 12px rgba(255, 255, 255, 0.8);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .app-badge {
      position: absolute;
      top: -3px;
      right: 5px;
      min-width: 18px;
      height: 18px;
      padding: 0 5px;
      border-radius: 999px;
      background: #D95C5C;
      color: #FFFFFF;
      font-size: 11px;
      line-height: 18px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(217, 92, 92, 0.26);
      display: none;
      box-sizing: border-box;
    }

    .app-badge.is-visible {
      display: block;
    }

    .edit-pill {
      position: absolute;
      left: 50%;
      bottom: 102px;
      transform: translateX(-50%) translateY(16px);
      z-index: 30;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.86);
      box-shadow: var(--shadow-md);
      backdrop-filter: blur(18px);
      opacity: 0;
      pointer-events: none;
      transition: all 200ms ease;
      color: var(--text-primary);
      font-size: 13px;
      line-height: 1;
    }

    .desktop.is-editing .edit-pill {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(-50%) translateY(0);
    }

    .edit-done {
      height: 30px;
      padding: 0 12px;
      border-radius: 999px;
      background: var(--accent);
      color: #FFFFFF;
      font-size: 13px;
      line-height: 30px;
      box-shadow: var(--shadow-sm);
    }

    .page-dots {
      height: 22px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 7px;
      z-index: 18;
    }

    .page-dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: rgba(26, 26, 26, 0.22);
      transition: all 200ms ease;
    }

    .page-dot.is-active {
      width: 18px;
      background: var(--accent);
    }

    .dock {
      position: relative;
      height: 86px;
      padding: 9px 20px calc(11px + env(safe-area-inset-bottom));
      box-sizing: content-box;
      z-index: 18;
      pointer-events: auto;
    }

    .dock-inner {
      height: 76px;
      max-width: 390px;
      margin: 0 auto;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.78);
      box-shadow: var(--shadow-md);
      backdrop-filter: blur(20px);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      place-items: center;
    }

    .dock .app-icon {
      position: relative;
      left: auto;
      top: auto;
      width: 64px;
      min-height: 64px;
      gap: 0;
      animation: none;
    }

    .dock .app-icon-tile {
      width: 54px;
      height: 54px;
      border-radius: 18px;
      box-shadow: none;
      background: rgba(255, 255, 255, 0.74);
    }

    .dock .app-icon-name {
      display: none;
    }

    .dock .icon-glyph,
    .dock .icon-glyph svg {
      width: 28px;
      height: 28px;
    }

    .app-screen {
      position: absolute;
      inset: 0;
      overflow: hidden;
      background: var(--bg-primary);
      opacity: 0;
      transform: translateY(18px);
      pointer-events: none;
      transition: all 220ms ease;
      z-index: 100;
    }

    .app-screen.is-open {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .app-container {
      position: absolute;
      inset: 0;
      overflow: hidden;
      background: var(--bg-primary);
    }

    .app-fallback {
      position: absolute;
      inset: 0;
      padding: calc(18px + env(safe-area-inset-top)) 20px calc(20px + env(safe-area-inset-bottom));
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      gap: 18px;
      background: var(--bg-primary);
    }

    .fallback-top {
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .fallback-title {
      font-size: 18px;
      font-weight: 600;
      line-height: 1.4;
    }

    .fallback-card {
      padding: 18px;
      border-radius: 24px;
      background: var(--bg-card);
      box-shadow: var(--shadow-sm);
      font-size: 15px;
      line-height: 1.6;
      color: var(--text-secondary);
    }

    .plain-button {
      min-height: 40px;
      padding: 0 14px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--text-primary);
      font-size: 14px;
      box-shadow: var(--shadow-sm);
      transition: all 200ms ease;
    }

    .plain-button:active {
      transform: scale(0.96);
    }

    .drawer-mask {
      position: fixed;
      inset: 0;
      background: var(--bg-overlay);
      opacity: 0;
      pointer-events: none;
      z-index: 220;
      transition: all 200ms ease;
    }

    .drawer-mask.is-open {
      opacity: 1;
      pointer-events: auto;
    }

    .bottom-drawer {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      max-height: min(68vh, 520px);
      padding: 10px 20px calc(20px + env(safe-area-inset-bottom));
      border-radius: 28px 28px 0 0;
      background: var(--bg-card);
      box-shadow: var(--shadow-lg);
      z-index: 230;
      transform: translateY(105%);
      transition: all 220ms ease;
      box-sizing: border-box;
    }

    .bottom-drawer.is-open {
      transform: translateY(0);
    }

    .drawer-handle {
      width: 38px;
      height: 4px;
      border-radius: 999px;
      background: var(--bg-secondary);
      margin: 0 auto 18px;
    }

    .drawer-title {
      font-size: 17px;
      font-weight: 600;
      line-height: 1.5;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .drawer-desc {
      font-size: 13px;
      line-height: 1.6;
      color: var(--text-secondary);
      margin-bottom: 16px;
    }

    .drawer-input {
      width: 100%;
      min-height: 48px;
      padding: 0 14px;
      border-radius: 16px;
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: 15px;
      line-height: 1.4;
      box-sizing: border-box;
      box-shadow: inset 0 0 0 999px rgba(255, 255, 255, 0.05);
    }

    .drawer-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 14px;
    }

    .drawer-button {
      min-height: 46px;
      border-radius: 16px;
      font-size: 15px;
      line-height: 1;
      transition: all 200ms ease;
    }

    .drawer-button:active {
      transform: scale(0.96);
    }

    .drawer-button.secondary {
      background: var(--bg-secondary);
      color: var(--text-primary);
    }

    .drawer-button.primary {
      background: var(--accent);
      color: #FFFFFF;
      box-shadow: var(--shadow-sm);
    }

    @media (max-width: 370px) {
      .desktop-widgets {
        padding-left: 18px;
        padding-right: 18px;
        gap: 10px;
      }

      .desktop-widget {
        min-height: 86px;
        padding: 14px;
      }

      .widget-value {
        font-size: 27px;
      }

      .app-icon {
        width: 68px;
      }

      .app-icon-tile {
        width: 58px;
        height: 58px;
      }
    }
  </style>
</head>
<body>
  <div class="shell-root" id="shellRoot">
    <main class="desktop" id="desktop" aria-label="桌面">
      <div class="wallpaper-layer" id="wallpaperLayer"></div>

      <div class="desktop-content">
        <header class="status-bar">
          <div class="status-time" id="statusTime">00:00</div>
          <div class="status-right" aria-hidden="true">
            <svg class="status-signal" viewBox="0 0 28 16">
              <path d="M3 12.5h3.5M10 9.5h3.5M17 6.5h3.5M24 3.5h1" />
            </svg>
            <svg class="status-battery" viewBox="0 0 30 16">
              <path d="M4 4.5h18a3 3 0 0 1 3 3v1a3 3 0 0 1-3 3H4a3 3 0 0 1-3-3v-1a3 3 0 0 1 3-3Z" />
              <path d="M27 7v2" />
              <path d="M5 8h14" />
            </svg>
          </div>
        </header>

        <section class="desktop-widgets" id="desktopWidgets">
          <button class="desktop-widget" id="clockWidget" type="button">
            <span class="widget-label">现在</span>
            <span class="widget-value" id="clockValue">00:00</span>
            <span class="widget-sub" id="dateValue">今天</span>
          </button>

          <button class="desktop-widget" id="weatherWidget" type="button">
            <span class="widget-label" id="weatherCityLabel">温州</span>
            <span class="widget-value" id="weatherTemp">--°</span>
            <span class="widget-sub" id="weatherText">正在更新天气</span>
          </button>

          <button class="desktop-widget is-wide" id="anniversaryWidget" type="button">
            <span class="widget-label">最近纪念日</span>
            <span class="widget-value" id="anniversaryDays">--</span>
            <span class="widget-sub" id="anniversaryText">还没有添加纪念日</span>
          </button>
        </section>

        <section class="desktop-pages-shell" id="pagesShell">
          <div class="desktop-pages" id="desktopPages">
            <div class="desktop-page" id="desktopPage0" data-page="0"></div>
            <div class="desktop-page" id="desktopPage1" data-page="1"></div>
          </div>
        </section>

        <div class="edit-pill" id="editPill">
          <span>正在整理桌面</span>
          <button class="edit-done" id="editDoneButton" type="button">完成</button>
        </div>

        <nav class="page-dots" id="pageDots" aria-label="桌面分页">
          <button class="page-dot is-active" type="button" data-page="0" aria-label="第一页"></button>
          <button class="page-dot" type="button" data-page="1" aria-label="第二页"></button>
        </nav>

        <footer class="dock" id="dock">
          <div class="dock-inner" id="dockInner"></div>
        </footer>
      </div>
    </main>

    <section class="app-screen" id="appScreen" aria-label="应用窗口">
      <div class="app-container" id="appContainer"></div>
    </section>

    <div class="drawer-mask" id="drawerMask"></div>
    <section class="bottom-drawer" id="weatherDrawer" aria-label="天气地区设置">
      <div class="drawer-handle"></div>
      <div class="drawer-title">天气地区</div>
      <div class="drawer-desc">默认显示温州。你可以输入城市名称，桌面天气会记住这个地区。</div>
      <input class="drawer-input" id="weatherCityInput" type="text" placeholder="例如：温州" autocomplete="off" />
      <div class="drawer-actions">
        <button class="drawer-button secondary" id="weatherCancelButton" type="button">取消</button>
        <button class="drawer-button primary" id="weatherSaveButton" type="button">保存</button>
      </div>
    </section>
  </div>

  <script type="module">
    import { applySavedTheme } from './core/theme.js';

    const APPS = [
      { id: 'chat', name: '消息', module: './apps/chat.js' },
      { id: 'moments', name: '朋友圈', module: './apps/moments.js' },
      { id: 'characters', name: '角色管理', module: './apps/characters.js' },
      { id: 'worldbook', name: '世界书', module: './apps/worldbook.js' },
      { id: 'games', name: '小游戏', module: './apps/games.js' },
      { id: 'shop', name: '商店', module: './apps/shop.js' },
      { id: 'wallet', name: '钱包', module: './apps/wallet.js' },
      { id: 'memo', name: '备忘录', module: './apps/memo.js' },
      { id: 'anniversary', name: '纪念日', module: './apps/anniversary.js' },
      { id: 'settings', name: '设置', module: './apps/settings.js' },
    ];

    const DOCK_APP_IDS = ['chat', 'moments', 'memo', 'settings'];
    const DESKTOP_KEY = 'ai_phone_desktop_state';
    const SETTINGS_KEY = 'ai_phone_settings';
    const BADGES_KEY = 'ai_phone_badges';
    const ANNIVERSARY_KEYS = ['ai_phone_anniversaries', 'anniversaries', 'aiPhone_anniversaries'];
    const WEATHER_CACHE_KEY = 'ai_phone_weather_cache';
    const WEATHER_CITY_KEY = 'ai_phone_weather_city';

    const desktop = document.getElementById('desktop');
    const wallpaperLayer = document.getElementById('wallpaperLayer');
    const statusTime = document.getElementById('statusTime');
    const clockValue = document.getElementById('clockValue');
    const dateValue = document.getElementById('dateValue');
    const weatherWidget = document.getElementById('weatherWidget');
    const weatherCityLabel = document.getElementById('weatherCityLabel');
    const weatherTemp = document.getElementById('weatherTemp');
    const weatherText = document.getElementById('weatherText');
    const anniversaryWidget = document.getElementById('anniversaryWidget');
    const anniversaryDays = document.getElementById('anniversaryDays');
    const anniversaryText = document.getElementById('anniversaryText');
    const pagesShell = document.getElementById('pagesShell');
    const desktopPages = document.getElementById('desktopPages');
    const desktopPage0 = document.getElementById('desktopPage0');
    const desktopPage1 = document.getElementById('desktopPage1');
    const dockInner = document.getElementById('dockInner');
    const pageDots = document.getElementById('pageDots');
    const editDoneButton = document.getElementById('editDoneButton');
    const appScreen = document.getElementById('appScreen');
    const appContainer = document.getElementById('appContainer');
    const drawerMask = document.getElementById('drawerMask');
    const weatherDrawer = document.getElementById('weatherDrawer');
    const weatherCityInput = document.getElementById('weatherCityInput');
    const weatherCancelButton = document.getElementById('weatherCancelButton');
    const weatherSaveButton = document.getElementById('weatherSaveButton');

    let desktopState = loadDesktopState();
    let settingsState = readJSON(SETTINGS_KEY, {});
    let activePage = Number.isFinite(desktopState.activePage) ? desktopState.activePage : 0;
    let editMode = false;
    let longPressTimer = null;
    let dragging = null;
    let suppressNextOpen = false;
    let swipeState = null;
    let weatherAbort = null;
    let currentApp = null;

    window.APPS = APPS;
    window.PhoneShell = {
      apps: APPS,
      openApp,
      closeApp,
      backToDesktop: closeApp,
      getDesktopState: () => structuredCloneSafe(desktopState),
      setDesktopState: (nextState = {}) => {
        desktopState = normalizeDesktopState({ ...desktopState, ...nextState });
        saveDesktopState();
        renderDesktop();
      },
      refreshDesktop: () => {
        desktopState = loadDesktopState();
        settingsState = readJSON(SETTINGS_KEY, {});
        renderDesktop();
        refreshBadges();
        renderAnniversary();
        loadWeather();
      },
      setBadge: (appId, count) => {
        const badges = readJSON(BADGES_KEY, {});
        badges[appId] = Math.max(0, Number(count) || 0);
        writeJSON(BADGES_KEY, badges);
        refreshBadges();
      },
    };

    window.AppShell = window.PhoneShell;

    boot();

    function boot() {
      try {
        if (typeof applySavedTheme === 'function') {
          applySavedTheme();
        }
      } catch (error) {
        console.warn(error);
      }

      normalizeAllPositions();
      renderDesktop();
      renderDock();
      refreshClock();
      setInterval(refreshClock, 1000);
      renderAnniversary();
      loadWeather();
      bindDesktopEvents();

      window.addEventListener('storage', () => {
        desktopState = loadDesktopState();
        settingsState = readJSON(SETTINGS_KEY, {});
        renderDesktop();
        renderDock();
        refreshBadges();
        renderAnniversary();
        loadWeather();
      });

      window.addEventListener('resize', () => {
        normalizeAllPositions();
        renderDesktop();
      });

      document.addEventListener('visibilitychange', () => {
        if (!document.hidden) {
          refreshClock();
          renderAnniversary();
          loadWeather();
        }
      });
    }

    function bindDesktopEvents() {
      pageDots.addEventListener('click', (event) => {
        const dot = event.target.closest('.page-dot');
        if (!dot) return;
        setActivePage(Number(dot.dataset.page), true);
      });

      editDoneButton.addEventListener('click', () => {
        exitEditMode();
      });

      pagesShell.addEventListener('pointerdown', onPagesPointerDown);
      pagesShell.addEventListener('pointermove', onPagesPointerMove);
      pagesShell.addEventListener('pointerup', onPagesPointerUp);
      pagesShell.addEventListener('pointercancel', onPagesPointerUp);

      weatherWidget.addEventListener('click', openWeatherDrawer);
      drawerMask.addEventListener('click', closeWeatherDrawer);
      weatherCancelButton.addEventListener('click', closeWeatherDrawer);
      weatherSaveButton.addEventListener('click', saveWeatherCity);

      anniversaryWidget.addEventListener('click', () => openAppById('anniversary'));

      window.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') {
          if (weatherDrawer.classList.contains('is-open')) {
            closeWeatherDrawer();
            return;
          }
          if (appScreen.classList.contains('is-open')) {
            closeApp();
            return;
          }
          if (editMode) {
            exitEditMode();
          }
        }
      });
    }

    function renderDesktop() {
      applyWallpaper();
      applyWidgetVisibility();
      setActivePage(activePage, false);
      desktopPage0.innerHTML = '';
      desktopPage1.innerHTML = '';

      APPS.forEach((app) => {
        const icon = createAppIcon(app, false);
        const pos = getPosition(app.id);
        const page = pos.page === 1 ? desktopPage1 : desktopPage0;
        page.appendChild(icon);
        placeIconElement(icon, pos);
      });

      refreshBadges();
    }

    function renderDock() {
      dockInner.innerHTML = '';
      DOCK_APP_IDS.forEach((id) => {
        const app = APPS.find((item) => item.id === id);
        if (!app) return;
        dockInner.appendChild(createAppIcon(app, true));
      });
      refreshBadges();
    }

    function createAppIcon(app, isDock) {
      const custom = getAppCustom(app.id);
      const button = document.createElement('button');
      button.className = 'app-icon';
      button.type = 'button';
      button.dataset.appId = app.id;
      button.dataset.dock = isDock ? '1' : '0';
      button.setAttribute('aria-label', custom.name || app.name);

      const tile = document.createElement('span');
      tile.className = 'app-icon-tile';

      if (custom.image) {
        tile.classList.add('has-image');
        tile.style.backgroundImage = `url("${custom.image}")`;
      }

      const glyph = document.createElement('span');
      glyph.className = 'icon-glyph';
      glyph.innerHTML = getIconSvg(app.id);

      const badge = document.createElement('span');
      badge.className = 'app-badge';
      badge.dataset.badgeFor = app.id;

      const name = document.createElement('span');
      name.className = 'app-icon-name';
      name.textContent = custom.name || app.name;

      tile.appendChild(glyph);
      button.appendChild(tile);
      button.appendChild(badge);
      button.appendChild(name);

      if (isDock) {
        button.addEventListener('click', () => openApp(app));
      } else {
        button.addEventListener('pointerdown', onIconPointerDown);
        button.addEventListener('click', (event) => {
          event.preventDefault();
          if (editMode || suppressNextOpen) return;
          openApp(app);
        });
      }

      return button;
    }

    function onIconPointerDown(event) {
      if (event.button !== undefined && event.button !== 0) return;

      event.preventDefault();
      event.stopPropagation();

      const icon = event.currentTarget;
      const appId = icon.dataset.appId;

      clearLongPress();

      if (editMode) {
        beginDrag(event, icon, appId);
        return;
      }

      longPressTimer = window.setTimeout(() => {
        enterEditMode();
        beginDrag(event, icon, appId);
      }, 520);

      const cancelLongPress = () => clearLongPress();
      icon.addEventListener('pointerup', cancelLongPress, { once: true });
      icon.addEventListener('pointercancel', cancelLongPress, { once: true });
      icon.addEventListener('pointerleave', cancelLongPress, { once: true });
    }

    function beginDrag(event, icon, appId) {
      clearLongPress();
      suppressNextOpen = true;

      const rect = icon.getBoundingClientRect();
      const pageRect = getPageElement(activePage).getBoundingClientRect();

      dragging = {
        icon,
        appId,
        pointerId: event.pointerId,
        offsetX: event.clientX - rect.left,
        offsetY: event.clientY - rect.top,
        moved: false,
        lastSwitchAt: 0,
        width: rect.width,
        height: rect.height,
      };

      icon.classList.add('is-dragging');
      icon.setPointerCapture?.(event.pointerId);

      const currentPage = getPageElement(activePage);
      if (icon.parentElement !== currentPage) {
        currentPage.appendChild(icon);
      }

      setIconPositionFromPointer(event.clientX, event.clientY, pageRect);
      window.addEventListener('pointermove', onDragMove, { passive: false });
      window.addEventListener('pointerup', onDragEnd, { passive: false });
      window.addEventListener('pointercancel', onDragEnd, { passive: false });
    }

    function onDragMove(event) {
      if (!dragging || event.pointerId !== dragging.pointerId) return;
      event.preventDefault();

      dragging.moved = true;
      maybeSwitchPageWhileDragging(event.clientX);

      const pageRect = getPageElement(activePage).getBoundingClientRect();
      setIconPositionFromPointer(event.clientX, event.clientY, pageRect);
    }

    function onDragEnd(event) {
      if (!dragging || event.pointerId !== dragging.pointerId) return;
      event.preventDefault();

      const icon = dragging.icon;
      const appId = dragging.appId;
      const pageElement = getPageElement(activePage);
      const pageRect = pageElement.getBoundingClientRect();
      const pos = getElementPositionInPage(icon, pageRect);

      desktopState.iconPositions[appId] = normalizePosition({
        page: activePage,
        x: pos.x,
        y: pos.y,
      });

      pageElement.appendChild(icon);
      placeIconElement(icon, desktopState.iconPositions[appId]);
      icon.classList.remove('is-dragging');

      saveDesktopState();

      dragging = null;
      window.removeEventListener('pointermove', onDragMove);
      window.removeEventListener('pointerup', onDragEnd);
      window.removeEventListener('pointercancel', onDragEnd);

      window.setTimeout(() => {
        suppressNextOpen = false;
      }, 260);
    }

    function setIconPositionFromPointer(clientX, clientY, pageRect) {
      if (!dragging) return;

      const maxX = Math.max(0, pageRect.width - dragging.width);
      const maxY = Math.max(0, pageRect.height - dragging.height);
      const x = clamp(clientX - pageRect.left - dragging.offsetX, 8, maxX - 8);
      const y = clamp(clientY - pageRect.top - dragging.offsetY, 8, maxY - 8);

      dragging.icon.style.left = `${x}px`;
      dragging.icon.style.top = `${y}px`;
    }

    function maybeSwitchPageWhileDragging(clientX) {
      if (!dragging) return;

      const now = Date.now();
      if (now - dragging.lastSwitchAt < 380) return;

      const width = window.innerWidth;
      const edge = Math.max(30, Math.min(54, width * 0.12));

      if (activePage === 0 && clientX > width - edge) {
        switchDraggedIconToPage(1, 16);
        dragging.lastSwitchAt = now;
      } else if (activePage === 1 && clientX < edge) {
        switchDraggedIconToPage(0, width - dragging.width - 16);
        dragging.lastSwitchAt = now;
      }
    }

    function switchDraggedIconToPage(page, x) {
      if (!dragging) return;

      setActivePage(page, true);
      const targetPage = getPageElement(page);
      targetPage.appendChild(dragging.icon);

      const pageRect = targetPage.getBoundingClientRect();
      const y = clamp(parseFloat(dragging.icon.style.top) || 18, 8, pageRect.height - dragging.height - 8);

      dragging.icon.style.left = `${clamp(x, 8, pageRect.width - dragging.width - 8)}px`;
      dragging.icon.style.top = `${y}px`;
    }

    function onPagesPointerDown(event) {
      if (editMode || dragging || event.target.closest('.app-icon')) return;
      swipeState = {
        pointerId: event.pointerId,
        startX: event.clientX,
        startY: event.clientY,
        dx: 0,
        activeAtStart: activePage,
      };
      desktopPages.classList.add('is-swiping');
      pagesShell.setPointerCapture?.(event.pointerId);
    }

    function onPagesPointerMove(event) {
      if (!swipeState || event.pointerId !== swipeState.pointerId) return;

      const dx = event.clientX - swipeState.startX;
      const dy = event.clientY - swipeState.startY;

      if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 24) {
        return;
      }

      swipeState.dx = dx;
      const base = -swipeState.activeAtStart * window.innerWidth;
      const limited = clamp(base + dx, -window.innerWidth, 0);
      desktopPages.style.transform = `translate3d(${limited}px, 0, 0)`;
    }

    function onPagesPointerUp(event) {
      if (!swipeState || event.pointerId !== swipeState.pointerId) return;

      const dx = swipeState.dx;
      const threshold = window.innerWidth * 0.18;

      desktopPages.classList.remove('is-swiping');

      if (dx < -threshold && swipeState.activeAtStart === 0) {
        setActivePage(1, true);
      } else if (dx > threshold && swipeState.activeAtStart === 1) {
        setActivePage(0, true);
      } else {
        setActivePage(swipeState.activeAtStart, true);
      }

      swipeState = null;
    }

    function enterEditMode() {
      editMode = true;
      desktop.classList.add('is-editing');
    }

    function exitEditMode() {
      editMode = false;
      dragging = null;
      clearLongPress();
      desktop.classList.remove('is-editing');
      document.querySelectorAll('.app-icon.is-dragging').forEach((icon) => {
        icon.classList.remove('is-dragging');
      });
      saveDesktopState();
      window.setTimeout(() => {
        suppressNextOpen = false;
      }, 180);
    }

    function clearLongPress() {
      if (longPressTimer) {
        window.clearTimeout(longPressTimer);
        longPressTimer = null;
      }
    }

    function setActivePage(page, shouldSave) {
      activePage = page === 1 ? 1 : 0;
      desktopState.activePage = activePage;

      desktopPages.style.transform = `translate3d(${-activePage * 50}%, 0, 0)`;

      pageDots.querySelectorAll('.page-dot').forEach((dot) => {
        dot.classList.toggle('is-active', Number(dot.dataset.page) === activePage);
      });

      if (shouldSave) {
        saveDesktopState();
      }
    }

    function getPageElement(page) {
      return page === 1 ? desktopPage1 : desktopPage0;
    }

    function normalizeAllPositions() {
      if (!desktopState.iconPositions) {
        desktopState.iconPositions = {};
      }

      APPS.forEach((app, index) => {
        if (!desktopState.iconPositions[app.id]) {
          desktopState.iconPositions[app.id] = getDefaultPosition(index);
        } else {
          desktopState.iconPositions[app.id] = normalizePosition(desktopState.iconPositions[app.id], index);
        }
      });

      saveDesktopState();
    }

    function getDefaultPosition(index) {
      const page = index < 8 ? 0 : 1;
      const pageIndex = page === 0 ? index : index - 8;
      const width = Math.max(320, window.innerWidth);
      const colWidth = width / 4;
      const x = colWidth * (pageIndex % 4) + colWidth / 2 - 37;
      const y = 18 + Math.floor(pageIndex / 4) * 106;

      return normalizePosition({ page, x, y });
    }

    function normalizePosition(position, fallbackIndex = 0) {
      const pageElement = getPageElement(position.page === 1 ? 1 : 0);
      const pageRect = pageElement.getBoundingClientRect();
      const pageWidth = pageRect.width || window.innerWidth || 390;
      const pageHeight = pageRect.height || Math.max(360, window.innerHeight - 310);
      const fallback = getDefaultRawPosition(fallbackIndex, pageWidth);

      let x = Number(position.x);
      let y = Number(position.y);

      if (!Number.isFinite(x) && Number.isFinite(position.xPct)) {
        x = pageWidth * Number(position.xPct);
      }

      if (!Number.isFinite(y) && Number.isFinite(position.yPct)) {
        y = pageHeight * Number(position.yPct);
      }

      if (!Number.isFinite(x)) x = fallback.x;
      if (!Number.isFinite(y)) y = fallback.y;

      x = clamp(x, 8, Math.max(8, pageWidth - 82));
      y = clamp(y, 8, Math.max(8, pageHeight - 100));

      return {
        page: position.page === 1 ? 1 : 0,
        x,
        y,
        xPct: x / pageWidth,
        yPct: y / pageHeight,
      };
    }

    function getDefaultRawPosition(index, width) {
      const page = index < 8 ? 0 : 1;
      const pageIndex = page === 0 ? index : index - 8;
      const colWidth = width / 4;

      return {
        page,
        x: colWidth * (pageIndex % 4) + colWidth / 2 - 37,
        y: 18 + Math.floor(pageIndex / 4) * 106,
      };
    }

    function getPosition(appId) {
      const appIndex = APPS.findIndex((app) => app.id === appId);
      const position = desktopState.iconPositions?.[appId] || getDefaultPosition(Math.max(0, appIndex));
      const normalized = normalizePosition(position, Math.max(0, appIndex));
      desktopState.iconPositions[appId] = normalized;
      return normalized;
    }

    function placeIconElement(icon, pos) {
      const pageElement = getPageElement(pos.page);
      const rect = pageElement.getBoundingClientRect();
      const width = rect.width || window.innerWidth || 390;
      const height = rect.height || Math.max(360, window.innerHeight - 310);
      const x = Number.isFinite(pos.xPct) ? width * pos.xPct : pos.x;
      const y = Number.isFinite(pos.yPct) ? height * pos.yPct : pos.y;

      icon.style.left = `${clamp(x, 8, Math.max(8, width - 82))}px`;
      icon.style.top = `${clamp(y, 8, Math.max(8, height - 100))}px`;
    }

    function getElementPositionInPage(icon, pageRect) {
      const rect = icon.getBoundingClientRect();
      const x = clamp(rect.left - pageRect.left, 8, Math.max(8, pageRect.width - rect.width - 8));
      const y = clamp(rect.top - pageRect.top, 8, Math.max(8, pageRect.height - rect.height - 8));
      return { x, y };
    }

    function refreshClock() {
      const now = new Date();
      const hh = String(now.getHours()).padStart(2, '0');
      const mm = String(now.getMinutes()).padStart(2, '0');
      const time = `${hh}:${mm}`;

      statusTime.textContent = time;
      clockValue.textContent = time;

      const week = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'][now.getDay()];
      dateValue.textContent = `${now.getMonth() + 1}月${now.getDate()}日 ${week}`;
    }

    async function loadWeather() {
      const city = getWeatherCity();
      weatherCityLabel.textContent = city;
      weatherCityInput.value = city;

      const cache = readJSON(WEATHER_CACHE_KEY, null);
      if (cache && cache.city === city && Date.now() - Number(cache.updatedAt || 0) < 30 * 60 * 1000) {
        renderWeather(cache.data, city);
        return;
      }

      if (weatherAbort) {
        weatherAbort.abort();
      }

      weatherAbort = new AbortController();

      try {
        const queryCity = encodeURIComponent(city === '温州' ? 'Wenzhou' : city);
        const response = await fetch(`https://wttr.in/${queryCity}?format=j1&lang=zh`, {
          signal: weatherAbort.signal,
          cache: 'no-store',
        });

        if (!response.ok) {
          throw new Error('weather failed');
        }

        const json = await response.json();
        const current = json?.current_condition?.[0] || {};
        const data = {
          temp: current.temp_C || '--',
          text: current.lang_zh?.[0]?.value || current.weatherDesc?.[0]?.value || '天气已更新',
        };

        writeJSON(WEATHER_CACHE_KEY, {
          city,
          updatedAt: Date.now(),
          data,
        });

        renderWeather(data, city);
      } catch (error) {
        if (error?.name === 'AbortError') return;

        const fallback = cache?.data || {
          temp: '--',
          text: '天气暂时无法更新',
        };

        renderWeather(fallback, city);
      }
    }

    function renderWeather(data, city) {
      weatherCityLabel.textContent = city || '温州';
      weatherTemp.textContent = `${data?.temp || '--'}°`;
      weatherText.textContent = data?.text || '天气已更新';
    }

    function getWeatherCity() {
      const savedCity = localStorage.getItem(WEATHER_CITY_KEY);
      const desktopCity = desktopState.weatherCity;
      const settingsCity = settingsState?.personalization?.desktop?.weatherCity || settingsState?.desktop?.weatherCity;
      return String(savedCity || desktopCity || settingsCity || '温州').trim() || '温州';
    }

    function openWeatherDrawer() {
      weatherCityInput.value = getWeatherCity();
      drawerMask.classList.add('is-open');
      weatherDrawer.classList.add('is-open');
      window.setTimeout(() => weatherCityInput.focus(), 120);
    }

    function closeWeatherDrawer() {
      drawerMask.classList.remove('is-open');
      weatherDrawer.classList.remove('is-open');
      weatherCityInput.blur();
    }

    function saveWeatherCity() {
      const city = weatherCityInput.value.trim() || '温州';
      desktopState.weatherCity = city;
      localStorage.setItem(WEATHER_CITY_KEY, city);
      saveDesktopState();
      closeWeatherDrawer();
      loadWeather();
    }

    function renderAnniversary() {
      const list = readAnniversaries();
      const today = startOfDay(new Date());

      if (!list.length) {
        anniversaryDays.textContent = '--';
        anniversaryText.textContent = '还没有添加纪念日';
        return;
      }

      const normalized = list
        .map((item) => {
          const dateValue = item.date || item.day || item.targetDate || item.time;
          const date = new Date(dateValue);
          if (Number.isNaN(date.getTime())) return null;

          const next = getNextDate(date, today);
          const diff = Math.ceil((startOfDay(next).getTime() - today.getTime()) / 86400000);

          return {
            name: item.name || item.title || '纪念日',
            diff,
            date: next,
          };
        })
        .filter(Boolean)
        .sort((a, b) => a.diff - b.diff);

      const nearest = normalized[0];

      if (!nearest) {
        anniversaryDays.textContent = '--';
        anniversaryText.textContent = '还没有添加纪念日';
        return;
      }

      if (nearest.diff === 0) {
        anniversaryDays.textContent = '今天';
        anniversaryText.textContent = nearest.name;
      } else {
        anniversaryDays.textContent = `${nearest.diff}天`;
        anniversaryText.textContent = `${nearest.name} 即将到来`;
      }
    }

    function readAnniversaries() {
      for (const key of ANNIVERSARY_KEYS) {
        const value = readJSON(key, null);
        if (Array.isArray(value)) return value;
        if (Array.isArray(value?.items)) return value.items;
        if (Array.isArray(value?.anniversaries)) return value.anniversaries;
      }

      const allData = readJSON('ai_phone_storage', null);
      if (Array.isArray(allData?.anniversaries)) return allData.anniversaries;

      return [];
    }

    function getNextDate(date, today) {
      const next = new Date(today.getFullYear(), date.getMonth(), date.getDate());
      if (next < today) {
        next.setFullYear(today.getFullYear() + 1);
      }
      return next;
    }

    function startOfDay(date) {
      return new Date(date.getFullYear(), date.getMonth(), date.getDate());
    }

    async function openApp(app) {
      if (!app) return;

      clearLongPress();
      exitEditMode();

      currentApp = app;
      desktop.classList.add('is-hidden');
      appScreen.classList.add('is-open');
      appContainer.innerHTML = '';

      try {
        const module = await import(`${app.module}?v=${Date.now()}`);
        const context = createAppContext(app);
        const renderer = module.default || module.mount || module.render || module.init || module.open;

        if (typeof renderer === 'function') {
          const result = renderer(appContainer, context);
          if (result instanceof Promise) {
            await result;
          }
        } else if (typeof module.createApp === 'function') {
          const result = module.createApp(context);
          if (result instanceof HTMLElement) {
            appContainer.appendChild(result);
          }
        } else {
          renderFallback(app, '这个应用还没有提供可执行入口。');
        }
      } catch (error) {
        console.error(error);
        renderFallback(app, '应用加载失败，请稍后再试。');
      }
    }

    function openAppById(id) {
      const app = APPS.find((item) => item.id === id);
      if (app) {
        openApp(app);
      }
    }

    function closeApp() {
      appScreen.classList.remove('is-open');
      desktop.classList.remove('is-hidden');
      appContainer.innerHTML = '';
      currentApp = null;
      desktopState = loadDesktopState();
      settingsState = readJSON(SETTINGS_KEY, {});
      renderDesktop();
      renderDock();
      renderAnniversary();
      loadWeather();
    }

    function createAppContext(app) {
      return {
        app,
        apps: APPS,
        close: closeApp,
        back: closeApp,
        openApp,
        openAppById,
        refreshDesktop: window.PhoneShell.refreshDesktop,
        getDesktopState: window.PhoneShell.getDesktopState,
        setDesktopState: window.PhoneShell.setDesktopState,
        setBadge: window.PhoneShell.setBadge,
        storage: {
          get: readJSON,
          set: writeJSON,
          remove: (key) => localStorage.removeItem(key),
        },
      };
    }

    function renderFallback(app, message) {
      appContainer.innerHTML = `
        <div class="app-fallback">
          <div class="fallback-top">
            <div class="fallback-title">${escapeHTML(app.name)}</div>
            <button class="plain-button" type="button" data-action="back">返回</button>
          </div>
          <div class="fallback-card">${escapeHTML(message)}</div>
        </div>
      `;

      appContainer.querySelector('[data-action="back"]')?.addEventListener('click', closeApp);
    }

    function applyWallpaper() {
      const wallpaper =
        desktopState.wallpaper ||
        desktopState.personalization?.wallpaper ||
        settingsState?.personalization?.desktop?.wallpaper ||
        settingsState?.desktop?.wallpaper ||
        '';

      if (wallpaper) {
        wallpaperLayer.style.backgroundImage = `url("${wallpaper}")`;
      } else {
        wallpaperLayer.style.backgroundImage = '';
      }
    }

    function applyWidgetVisibility() {
      const widgets = {
        clock: true,
        weather: true,
        anniversary: true,
        ...(settingsState?.personalization?.desktop?.widgets || {}),
        ...(desktopState.widgets || {}),
      };

      document.getElementById('clockWidget').style.display = widgets.clock ? 'flex' : 'none';
      weatherWidget.style.display = widgets.weather ? 'flex' : 'none';
      anniversaryWidget.style.display = widgets.anniversary ? 'flex' : 'none';
    }

    function getAppCustom(appId) {
      const customFromDesktop = desktopState.appIcons?.[appId] || {};
      const customFromSettings =
        settingsState?.personalization?.appIcons?.[appId] ||
        settingsState?.appIcons?.[appId] ||
        {};

      return {
        name: customFromDesktop.name || customFromSettings.name || '',
        image: customFromDesktop.image || customFromSettings.image || customFromSettings.icon || '',
      };
    }

    function refreshBadges() {
      const badges = readJSON(BADGES_KEY, {});
      const momentsUnread = Number(localStorage.getItem('ai_phone_moments_unread') || 0);
      if (momentsUnread > 0 && !badges.moments) {
        badges.moments = momentsUnread;
      }

      document.querySelectorAll('.app-badge').forEach((badge) => {
        const appId = badge.dataset.badgeFor;
        const count = Math.max(0, Number(badges[appId] || 0));

        if (count > 0) {
          badge.textContent = count > 99 ? '99+' : String(count);
          badge.classList.add('is-visible');
        } else {
          badge.textContent = '';
          badge.classList.remove('is-visible');
        }
      });
    }

    function loadDesktopState() {
      return normalizeDesktopState(readJSON(DESKTOP_KEY, {}));
    }

    function normalizeDesktopState(raw) {
      return {
        activePage: Number.isFinite(raw.activePage) ? raw.activePage : 0,
        wallpaper: raw.wallpaper || '',
        weatherCity: raw.weatherCity || localStorage.getItem(WEATHER_CITY_KEY) || '温州',
        widgets: {
          clock: true,
          weather: true,
          anniversary: true,
          ...(raw.widgets || {}),
        },
        iconPositions: raw.iconPositions || {},
        appIcons: raw.appIcons || {},
        personalization: raw.personalization || {},
      };
    }

    function saveDesktopState() {
      writeJSON(DESKTOP_KEY, desktopState);
    }

    function readJSON(key, fallback) {
      try {
        const raw = localStorage.getItem(key);
        if (!raw) return fallback;
        return JSON.parse(raw);
      } catch (error) {
        return fallback;
      }
    }
