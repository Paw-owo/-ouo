<!-- index.html -->
<!-- imports:
  from './core/storage.js': initDB, getData, setData, removeData, getDB, setDB, deleteDB, getAllDB, generateId, getNow
  from './core/theme.js': loadTheme
  from './core/ui.js': createIcon, showToast
-->
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#FAF8F5">
  <meta name="format-detection" content="telephone=no">
  <title>小手机</title>
  <link rel="stylesheet" href="./style.css">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="https://i.postimg.cc/sDhhgcFL/IMG-6643.png">

  <style>
    :root {
      --desktop-icon-scale: 1;
      --desktop-widget-scale: 1;
      --desktop-dock-scale: 1;
      --desktop-wallpaper-soft: 0.14;
    }

    html,
    body {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    button,
    input,
    textarea,
    select {
      border: 0;
      outline: 0;
      font-family: inherit;
      color: inherit;
    }

    input,
    textarea,
    select {
      font-size: 16px;
      line-height: 1.6;
      background: transparent;
      transform: translateZ(0);
    }

    input:focus,
    textarea:focus,
    select:focus {
      font-size: 16px;
    }

    @supports (-webkit-touch-callout: none) {
      input,
      textarea,
      select {
        font-size: 16px !important;
      }
    }

    button {
      padding: 0;
      background: transparent;
      color: inherit;
      cursor: pointer;
    }

    .phone-desktop {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-main);
    }

    .has-image {
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .desktop-soft-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background: var(--bg-primary);
      opacity: var(--desktop-wallpaper-soft);
      transition: all 200ms ease;
    }

    .status-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 8;
      height: calc(34px + env(safe-area-inset-top));
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: env(safe-area-inset-top) 24px 6px;
      color: var(--text-primary);
      font-size: 13px;
      font-weight: 600;
      line-height: 1;
      pointer-events: none;
    }

    .status-right,
    .signal-bars,
    .dock,
    .page-dots,
    .desktop-icon,
    .desktop-icon-art,
    .widget-mark,
    .lock-dots,
    .lock-key,
    .app-back,
    .placeholder-icon {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .status-right {
      gap: 7px;
    }

    .signal-bars {
      align-items: flex-end;
      gap: 2px;
      height: 12px;
    }

    .signal-bars span {
      width: 3px;
      border-radius: 99px;
      background: currentColor;
      opacity: .82;
    }

    .signal-bars span:nth-child(1) { height: 4px; }
    .signal-bars span:nth-child(2) { height: 7px; }
    .signal-bars span:nth-child(3) { height: 10px; }

    .battery-mark {
      width: 24px;
      height: 12px;
      display: inline-flex;
      align-items: center;
      padding: 2px;
      border-radius: 5px;
      background: color-mix(in srgb, currentColor 14%, transparent);
    }

    .battery-mark::before {
      content: "";
      width: 15px;
      height: 8px;
      border-radius: 3px;
      background: currentColor;
      opacity: .82;
    }

    .desktop-pages {
      position: fixed;
      inset: calc(38px + env(safe-area-inset-top)) 0 calc(102px + env(safe-area-inset-bottom));
      z-index: 1;
      display: flex;
      overflow-x: auto;
      overflow-y: hidden;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-x;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .desktop-pages::-webkit-scrollbar {
      display: none;
    }

    .desktop-pages.dragging {
      scroll-snap-type: none;
      scroll-behavior: auto;
      touch-action: none;
    }

    .desktop-page {
      position: relative;
      flex: 0 0 100%;
      width: 100%;
      height: 100%;
      overflow: hidden;
      scroll-snap-align: start;
    }

    .desktop-widget-area,
    .desktop-free-layer {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .desktop-widget-area {
      height: calc(432px * var(--desktop-widget-scale));
      pointer-events: none;
      border-radius: 0 0 28px 28px;
    }

    .desktop-item {
      position: absolute;
      z-index: 2;
      touch-action: none;
      transition: transform 200ms ease, opacity 200ms ease;
    }

    .desktop-item.dragging {
      z-index: 20;
      opacity: .94;
      transform: scale(1.04);
      transition: none;
    }

    .desktop-icon {
      width: calc(72px * var(--desktop-icon-scale));
      flex-direction: column;
      gap: calc(8px * var(--desktop-icon-scale));
      color: var(--text-primary);
      transition: all 200ms ease;
    }

    .desktop-icon:active,
    .desktop-widget:active,
    .app-back:active,
    .lock-key:active {
      transform: scale(.96);
    }

    .desktop-icon.editing {
      animation: icon-wiggle 180ms ease-in-out infinite;
    }

    .desktop-icon-art {
      width: calc(58px * var(--desktop-icon-scale));
      height: calc(58px * var(--desktop-icon-scale));
      overflow: hidden;
      border-radius: calc(20px * var(--desktop-icon-scale));
      background: var(--bg-card);
      color: var(--accent-light);
      box-shadow: var(--shadow-sm);
    }

    .desktop-icon-art svg {
      width: calc(28px * var(--desktop-icon-scale));
      height: calc(28px * var(--desktop-icon-scale));
    }

    .desktop-icon-image,
    .placeholder-icon img,
    .lock-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: inherit;
    }

    .desktop-icon-name {
      width: calc(82px * var(--desktop-icon-scale));
      color: var(--text-primary);
      font-size: calc(12px * var(--desktop-icon-scale));
      line-height: 1.25;
      text-align: center;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-shadow: 0 1px 10px color-mix(in srgb, var(--bg-primary) 78%, transparent);
    }

    .desktop-delete-dot {
      position: absolute;
      top: -5px;
      right: 4px;
      width: 18px;
      height: 18px;
      display: none;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: var(--accent-light);
      color: var(--bubble-user-text);
      box-shadow: var(--shadow-sm);
    }

    .desktop-icon.editing .desktop-delete-dot {
      display: flex;
    }

    .badge {
      position: absolute;
      top: -4px;
      right: 6px;
      min-width: 18px;
      height: 18px;
      padding: 0 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: var(--accent-light);
      color: var(--bubble-user-text);
      font-size: 11px;
      font-weight: 600;
      line-height: 1;
      box-shadow: var(--shadow-sm);
    }

    .badge.hidden {
      display: none;
    }

    .desktop-widget {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: calc(14px * var(--desktop-widget-scale));
      overflow: hidden;
      border-radius: calc(24px * var(--desktop-widget-scale));
      background: var(--surface-soft);
      color: var(--text-primary);
      box-shadow: var(--shadow-sm);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      transition: all 200ms ease;
    }

    .desktop-widget.square,
    .desktop-widget.circle {
      width: calc(132px * var(--desktop-widget-scale));
      height: calc(132px * var(--desktop-widget-scale));
    }

    .desktop-widget.rectangle {
      width: calc(214px * var(--desktop-widget-scale));
      height: calc(112px * var(--desktop-widget-scale));
    }

    .desktop-widget.wide {
      width: min(calc(300px * var(--desktop-widget-scale)), calc(100vw - 40px));
      height: calc(104px * var(--desktop-widget-scale));
    }

    .desktop-widget.circle {
      border-radius: 999px;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .widget-label,
    .time-widget-sub,
    .focus-text {
      color: var(--text-secondary);
      font-size: calc(var(--font-size-small) * var(--desktop-widget-scale));
      line-height: 1.45;
    }

    .widget-label {
      font-size: calc(12px * var(--desktop-widget-scale));
      line-height: 1.3;
    }

    .widget-value {
      color: var(--text-primary);
      font-size: calc(16px * var(--desktop-widget-scale));
      font-weight: 600;
      line-height: 1.35;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      text-shadow: 0 1px 10px color-mix(in srgb, var(--bg-primary) 68%, transparent);
    }

    .time-widget-main {
      color: var(--text-primary);
      font-size: calc(42px * var(--desktop-widget-scale));
      font-weight: 600;
      line-height: 1;
      letter-spacing: -.05em;
      text-shadow: 0 1px 10px color-mix(in srgb, var(--bg-primary) 68%, transparent);
    }

    .focus-title {
      color: var(--text-primary);
      font-size: calc(var(--font-size-title) * var(--desktop-widget-scale));
      font-weight: 600;
      line-height: 1.35;
    }

    .focus-text {
      margin-top: calc(4px * var(--desktop-widget-scale));
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .widget-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: calc(10px * var(--desktop-widget-scale));
    }

    .widget-mark {
      width: calc(34px * var(--desktop-widget-scale));
      height: calc(34px * var(--desktop-widget-scale));
      flex: 0 0 calc(34px * var(--desktop-widget-scale));
      border-radius: calc(14px * var(--desktop-widget-scale));
      background: var(--accent-light);
      color: var(--accent-light);
    }

    .custom-widget-content {
      position: relative;
      z-index: 1;
      width: 100%;
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: calc(10px * var(--desktop-widget-scale));
      color: var(--text-primary);
      font-size: calc(14px * var(--desktop-widget-scale));
      font-weight: 600;
      line-height: 1.35;
      text-align: center;
      word-break: break-word;
      text-shadow: 0 1px 10px color-mix(in srgb, var(--bg-primary) 70%, transparent);
    }

    .page-dots {
      position: fixed;
      left: 0;
      right: 0;
      bottom: calc(98px + env(safe-area-inset-bottom));
      z-index: 4;
      gap: 7px;
      pointer-events: none;
    }

    .page-dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: var(--text-hint);
      opacity: .7;
      transition: all 200ms ease;
    }

    .page-dot.active {
      width: 18px;
      background: var(--accent-light);
      opacity: 1;
    }

    .dock {
      position: fixed;
      left: 20px;
      right: 20px;
      bottom: calc(18px + env(safe-area-inset-bottom));
      z-index: 8;
      min-height: 74px;
      justify-content: space-around;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 30px;
      background: var(--surface-soft);
      box-shadow: var(--shadow-sm);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      transform: scale(var(--desktop-dock-scale));
      transform-origin: center bottom;
    }

    .dock .desktop-icon {
      position: relative;
      left: auto !important;
      top: auto !important;
      width: 64px;
      animation: none;
      touch-action: manipulation;
    }

    .dock .desktop-icon-art {
      width: 58px;
      height: 58px;
      border-radius: 20px;
    }

    .dock .desktop-icon-name,
    .dock .desktop-delete-dot {
      display: none !important;
    }

    .hidden-hint {
      position: absolute;
      left: 20px;
      right: 20px;
      bottom: 16px;
      padding: 12px 14px;
      border-radius: 20px;
      background: var(--surface-soft);
      color: var(--text-secondary);
      box-shadow: var(--shadow-sm);
      font-size: var(--font-size-small);
      line-height: 1.5;
      text-align: center;
      pointer-events: none;
    }

    #app-layer {
      position: fixed;
      inset: 0;
      z-index: 30;
      pointer-events: none;
    }

    #app-layer.has-app {
      pointer-events: auto;
    }

    .placeholder-app {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg-primary);
      color: var(--text-primary);
    }

    .app-topbar {
      min-height: calc(58px + env(safe-area-inset-top));
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      padding: env(safe-area-inset-top) 20px 12px;
      background: color-mix(in srgb, var(--bg-primary) 88%, transparent);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .app-back {
      width: 38px;
      height: 38px;
      border-radius: 16px;
      background: var(--bg-card);
      color: var(--text-primary);
      box-shadow: var(--shadow-sm);
      transition: all 200ms ease;
    }

    .app-title {
      flex: 1;
      color: var(--text-primary);
      font-size: 17px;
      font-weight: 600;
      line-height: 1.3;
      text-align: center;
    }

    .app-topbar-spacer {
      width: 38px;
      height: 38px;
      flex: 0 0 38px;
    }

    .placeholder-body {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 24px calc(42px + env(safe-area-inset-bottom));
    }

    .placeholder-card {
      width: min(100%, 420px);
      padding: 26px;
      border-radius: 28px;
      background: var(--bg-card);
      box-shadow: var(--shadow-md);
    }

    .placeholder-icon {
      width: 58px;
      height: 58px;
      overflow: hidden;
      margin-bottom: 18px;
      border-radius: 22px;
      background: var(--accent-light);
      color: var(--accent-light);
    }

    .placeholder-title {
      margin: 0;
      color: var(--text-primary);
      font-size: 22px;
      font-weight: 600;
      line-height: 1.3;
    }

    .placeholder-text {
      margin: 10px 0 0;
      color: var(--text-secondary);
      font-size: var(--font-size-base);
      line-height: 1.7;
    }

    .lock-screen {
      position: fixed;
      inset: 0;
      z-index: 900;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
      padding: calc(68px + env(safe-area-inset-top)) 24px calc(36px + env(safe-area-inset-bottom));
      background: var(--bg-primary);
      color: var(--text-primary);
      transition: all 200ms ease;
    }

    .lock-screen.hidden {
      opacity: 0;
      pointer-events: none;
      transform: scale(1.02);
    }

    .lock-soft-layer {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background: var(--bg-primary);
      opacity: .28;
    }

    .lock-top,
    .lock-pad {
      position: relative;
      z-index: 1;
    }

    .lock-top {
      text-align: center;
    }

    .lock-avatar {
      width: 84px;
      height: 84px;
      margin: 0 auto 20px;
      overflow: hidden;
      border-radius: 28px;
      box-shadow: var(--shadow-md);
      background: var(--bg-card);
    }

    .lock-title {
      margin: 0;
      color: var(--text-primary);
      font-size: 24px;
      font-weight: 600;
      line-height: 1.3;
      letter-spacing: -.02em;
      text-shadow: 0 1px 10px color-mix(in srgb, var(--bg-primary) 70%, transparent);
    }

    .lock-subtitle {
      margin-top: 8px;
      color: var(--text-secondary);
      font-size: var(--font-size-base);
      line-height: 1.6;
    }

    .lock-dots {
      gap: 12px;
      margin-top: 26px;
    }

    .lock-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--text-hint) 48%, transparent);
      transition: all 200ms ease;
    }

    .lock-dot.filled {
      background: var(--accent-light);
      transform: scale(1.08);
    }

    .lock-error {
      min-height: 22px;
      margin-top: 18px;
      color: var(--accent-light);
      font-size: var(--font-size-small);
      line-height: 1.5;
      text-align: center;
    }

    .lock-pad {
      width: min(100%, 320px);
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .lock-key {
      height: 64px;
      border-radius: 24px;
      background: var(--bg-card);
      color: var(--text-primary);
      box-shadow: var(--shadow-sm);
      font-size: 22px;
      font-weight: 500;
      transition: all 200ms ease;
    }

    .lock-key.secondary {
      color: var(--text-secondary);
      font-size: 14px;
    }

    .desktop-loading {
      position: fixed;
      inset: 0;
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-primary);
      color: var(--text-secondary);
      transition: all 200ms ease;
    }

    .desktop-loading.hide {
      opacity: 0;
      pointer-events: none;
    }

    .loading-card {
      min-width: 156px;
      padding: 20px;
      border-radius: 26px;
      background: var(--bg-card);
      box-shadow: var(--shadow-sm);
      text-align: center;
    }

    .loading-mark {
      width: 36px;
      height: 36px;
      margin: 0 auto 12px;
      border-radius: 14px;
      background: var(--accent-light);
      animation: soft-pulse 1400ms ease-in-out infinite;
    }

    .loading-text {
      color: var(--text-secondary);
      font-size: var(--font-size-small);
    }

    @keyframes icon-wiggle {
      0% { transform: rotate(-1deg); }
      50% { transform: rotate(1deg); }
      100% { transform: rotate(-1deg); }
    }

    @keyframes soft-pulse {
      0% { transform: scale(.92); opacity: .55; }
      50% { transform: scale(1); opacity: 1; }
      100% { transform: scale(.92); opacity: .55; }
    }
  </style>
</head>

<body>
  <main id="desktop" class="phone-desktop" data-image-key="app_wallpaper">
    <div class="desktop-soft-layer"></div>

    <div class="status-bar" aria-hidden="true">
      <div id="status-time">--:--</div>
      <div class="status-right">
        <span class="signal-bars"><span></span><span></span><span></span></span>
        <span>5G</span>
        <span class="battery-mark"></span>
      </div>
    </div>

    <section id="desktop-pages" class="desktop-pages" aria-label="桌面页面">
      <div class="desktop-page" data-page="0">
        <div class="desktop-widget-area" data-widget-area="0" data-image-key="app_widget_area_bg"></div>
        <div class="desktop-free-layer" data-layer="0"></div>
      </div>
      <div class="desktop-page" data-page="1">
        <div class="desktop-widget-area" data-widget-area="1" data-image-key="app_widget_area_bg"></div>
        <div class="desktop-free-layer" data-layer="1"></div>
      </div>
    </section>

    <div class="page-dots" aria-hidden="true">
      <span class="page-dot active" data-dot="0"></span>
      <span class="page-dot" data-dot="1"></span>
    </div>

    <nav id="dock" class="dock" aria-label="固定栏"></nav>
  </main>

  <section id="app-layer" aria-live="polite"></section>

  <section id="lock-screen" class="lock-screen hidden" aria-label="密码锁屏" data-image-key="app_lock_background">
    <div class="lock-soft-layer"></div>

    <div class="lock-top">
      <div class="lock-avatar" data-image-key="app_lock_avatar">
        <img id="lock-avatar-img" src="https://i.postimg.cc/sDhhgcFL/IMG-6643.png" alt="">
      </div>
      <h1 class="lock-title">输入密码</h1>
      <div class="lock-subtitle">解锁后进入小手机</div>
      <div id="lock-dots" class="lock-dots" aria-hidden="true">
        <span class="lock-dot"></span>
        <span class="lock-dot"></span>
        <span class="lock-dot"></span>
        <span class="lock-dot"></span>
      </div>
      <div id="lock-error" class="lock-error"></div>
    </div>

    <div id="lock-pad" class="lock-pad">
      <button class="lock-key" type="button" data-key="1">1</button>
      <button class="lock-key" type="button" data-key="2">2</button>
      <button class="lock-key" type="button" data-key="3">3</button>
      <button class="lock-key" type="button" data-key="4">4</button>
      <button class="lock-key" type="button" data-key="5">5</button>
      <button class="lock-key" type="button" data-key="6">6</button>
      <button class="lock-key" type="button" data-key="7">7</button>
      <button class="lock-key" type="button" data-key="8">8</button>
      <button class="lock-key" type="button" data-key="9">9</button>
      <button class="lock-key secondary" type="button" data-key="clear">清空</button>
      <button class="lock-key" type="button" data-key="0">0</button>

    async function applyImageToElement(element, key, options = {}) {
      if (!element || !key) return '';

      const record = await readImageRecord(key);
      const value = getImageFromRecord(record);

      element.dataset.imageKey = key;

      if (!value) {
        if (options.clear !== false) {
          element.classList.remove('has-image');
          element.style.backgroundImage = '';
          element.style.backgroundSize = '';
          element.style.backgroundPosition = '';
          element.style.backgroundRepeat = '';
          element.style.opacity = '';
        }
        return '';
      }

      if (options.mode === 'img') {
        element.src = value;
        element.style.opacity = '';
      } else {
        element.classList.add('has-image');
        element.style.backgroundImage = `url("${value}")`;
        element.style.backgroundSize = 'cover';
        element.style.backgroundPosition = 'center';
        element.style.backgroundRepeat = 'no-repeat';
        element.style.opacity = '';
      }

      return value;
    }

    async function applyWallpaperImage() {
      const record = await readImageRecord('app_wallpaper');
      const value = getImageFromRecord(record);

      document.documentElement.style.setProperty('--desktop-wallpaper-soft', value ? '0' : '0.14');

      if (value) {
        desktopEl.classList.add('has-image');
        desktopEl.style.backgroundImage = `url("${value}")`;

      } else {

    }

    async function applyAppIconImages() {
      await Promise.all([...document.querySelectorAll('.desktop-icon[data-app-id]')].map(async (iconEl) => {
        const appId = iconEl.dataset.appId;
        const app = APPS.find((item) => item.id === appId);
        const artEl = iconEl.querySelector('.desktop-icon-art');
        if (!app || !artEl) return;

        const custom = await readIconRecord(app);
        const customImage = getImageFromRecord(custom);
        const customName = custom?.name || app.name;

        iconEl.setAttribute('aria-label', customName);

        const nameEl = iconEl.querySelector('.desktop-icon-name');
        if (nameEl) nameEl.textContent = customName;

        artEl.innerHTML = '';

        if (customImage) {
          const image = document.createElement('img');
          image.className = 'desktop-icon-image';
          image.alt = '';
          image.src = customImage;
          image.style.opacity = '';
          image.addEventListener('error', () => {
            artEl.innerHTML = '';
            artEl.appendChild(createIcon(app.icon, 28));
          });
          artEl.appendChild(image);
        } else {
          artEl.appendChild(createIcon(app.icon, 28));
        }
      }));
    }

    async function readIconRecord(app) {
      const icons = getCustomIcons();
      const localCustom = icons[app.id] || icons[app.name] || null;

      let blobRecord = null;

      for (const key of [`app_icon_${app.id}`, `app_${app.id}_icon`]) {
        const record = await readImageRecord(key);
        if (getImageFromRecord(record) || record?.name) {
          blobRecord = record;
          break;
        }
      }

      if (blobRecord || localCustom) {
        const blobImage = getImageFromRecord(blobRecord);
        const localImage = getImageFromRecord(localCustom);
        const image = blobImage || localImage;

        return normalizeImageRecord({
          ...(blobRecord || {}),
          ...(localCustom || {}),
          value: image,
          image,
          iconImage: image,
          backgroundImage: image,
          imageBase64: image,
          name: localCustom?.name || blobRecord?.name || app.name,
          opacity: 100
        }, `app_icon_${app.id}`);
      }

      const aliasMap = {
        memo: ['memo', 'memos', 'note', 'notes', '备忘录'],
        anniversary: ['anniversary', 'anniversaries', 'calendar', 'date', '纪念日'],
        games: ['games', 'game', 'play', '小游戏', '游戏']
      };

      const iconCandidates = [
        app.id,
        app.name,
        app.module,
        `app_icon_${app.id}`,
        `app_${app.id}_icon`,
        ...(aliasMap[app.id] || []),
        ...(app.id === 'memo' ? ['备忘录', '备忘录图标', 'memo_icon'] : []),
        ...(app.id === 'anniversary' ? ['纪念日', '纪念日图标', 'anniversary_icon'] : []),
        ...(app.id === 'games' ? ['游戏', '游戏图标', 'games_icon'] : [])
      ].filter(Boolean);

      for (const key of iconCandidates) {
        if (icons[key]) {
          const record = normalizeImageRecord(icons[key], `app_icon_${app.id}`);
          record.opacity = 100;
          return record;
        }
      }

      const found = Object.values(icons).find((item) => {
        if (!item || typeof item !== 'object') return false;
        const itemName = String(item.name || '').trim();
        const itemAppId = String(item.appId || item.id || '').trim();
        return itemAppId === app.id || itemName === app.name || itemName === app.id;
      });

      if (found) {
        const record = normalizeImageRecord(found, `app_icon_${app.id}`);
        record.opacity = 100;
        return record;
      }

      return null;
    }

    function createCustomWidget(widget) {
      const widgetEl = document.createElement('section');
      widgetEl.className = `desktop-item desktop-widget desktop-custom-widget ${widget.shape}`;
      widgetEl.dataset.kind = 'widget';
      widgetEl.dataset.widgetId = `custom_${widget.id}`;
      widgetEl.dataset.customWidgetId = widget.id;
      widgetEl.dataset.imageKey = `custom_widget_${widget.id}`;
      widgetEl.setAttribute('aria-label', widget.name || '自定义小组件');

      if (widget.image) {
        widgetEl.classList.add('has-image');
        widgetEl.style.backgroundImage = `url("${widget.image}")`;
      }

      widgetEl.style.opacity = '';

      const content = document.createElement('div');
      content.className = 'custom-widget-content';

      if (widget.text) {
        content.textContent = widget.text;
      } else if (!widget.image) {
        content.appendChild(createIcon('star', 28));
      }

      widgetEl.appendChild(content);
      widgetEl.addEventListener('pointerdown', (event) => handleDesktopItemPointerDown(event, widgetEl));

      return widgetEl;
    }

    async function applyPlaceholderImages(app, root, icon) {

        img.src = image;
        img.style.opacity = '';
        img.addEventListener('error', () => {
          icon.innerHTML = '';
          icon.appendChild(createIcon(app.icon, 28));
        });

        icon.appendChild(img);
      }
    }
