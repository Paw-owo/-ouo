<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">

  <!-- ===== 基础 meta ===== -->
  <title>小手机</title>
  <meta name="description" content="小手机 —— 一个运行在浏览器里的拟物手机模拟器，包含桌面、APP、聊天与 AI 能力。">
  <meta name="keywords" content="小手机,手机模拟器,拟物,桌面,聊天,AI,web app">
  <meta name="author" content="Paw-owo">

  <!-- ===== 主题 / PWA ===== -->
  <meta name="theme-color" content="#FFF4F5">
  <meta name="color-scheme" content="light dark">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="小手机">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

  <!-- ===== Open Graph / 分享卡片 ===== -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="小手机">
  <meta property="og:description" content="一个运行在浏览器里的拟物手机模拟器，包含桌面、APP、聊天与 AI 能力。">
  <meta property="og:image" content="icons/icon-512.png">
  <meta name="twitter:card" content="summary">

  <!-- CSS层：先加载变量槽位，再加载基础样式，最后加载启动壳样式 -->
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/app-surfaces.css">
  <link rel="stylesheet" href="css/desktop.css">
  <link rel="stylesheet" href="css/boot.css">
</head>
<body>
  <!-- 启动闪屏：JS 引导完成后淡出。图标为线条 SVG（遵循 UI 审美规范） -->
  <div id="boot-splash">
    <div class="boot-splash__logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="6" y="2.5" width="12" height="19" rx="3.5"/>
        <line x1="10.5" y1="18.5" x2="13.5" y2="18.5"/>
      </svg>
    </div>
    <div class="boot-splash__title">小手机</div>
    <div class="boot-splash__loader" role="status" aria-label="加载中">
      <span></span><span></span><span></span>
    </div>
  </div>

  <!-- 加载失败兜底 UI：默认隐藏，boot() 出错时显示 -->
  <div id="boot-error" hidden>
    <div class="boot-error__icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="9.5"/>
        <path d="M8.5 9.5h.01M15.5 9.5h.01"/>
        <path d="M8.5 15.5c1-1.4 2.2-2.1 3.5-2.1s2.5.7 3.5 2.1"/>
      </svg>
    </div>
    <div class="boot-error__title">小手机启动失败</div>
    <div class="boot-error__desc">部分模块没能加载成功，检查一下网络再试试吧～</div>
    <div class="boot-error__detail"></div>
    <button class="boot-error__retry" onclick="location.reload()">重新加载</button>
  </div>

  <!-- JS 关闭时的提示 -->
  <noscript>
    <div class="boot-noscript">
      <div class="boot-noscript__icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M9 8.5 5.5 12 9 15.5"/>
          <path d="M15 8.5 18.5 12 15 15.5"/>
        </svg>
      </div>
      <div class="boot-noscript__title">需要启用 JavaScript</div>
      <div class="boot-noscript__desc">
        小手机依赖 JavaScript 运行，请在浏览器设置里开启后重新打开本页面。
      </div>
    </div>
  </noscript>

  <!-- 手机外壳 -->
  <div id="phone-frame">
    <!-- 桌面容器 -->
    <div id="desktop"></div>
    <!-- APP页面容器（由 ui.js 管理） -->
    <div id="app-container" class="app-container"></div>
  </div>

  <!-- 系统启动脚本 -->
  <script type="module">
    // 用动态 import 逐个加载，任一模块失败都能被捕获并显示兜底 UI
    function hideSplash() {
      const splash = document.getElementById('boot-splash');
      if (!splash) return;
      splash.classList.add('boot-splash--hidden');
      setTimeout(() => splash.remove(), 320);
    }
    function showBootError(err) {
      console.error('[Boot] 启动失败:', err);
      const splash = document.getElementById('boot-splash');
      if (splash) splash.style.display = 'none';
      const box = document.getElementById('boot-error');
      if (box) {
        box.hidden = false;
        const detail = box.querySelector('.boot-error__detail');
        if (detail) detail.textContent = (err && (err.message || err)) + '';
      }
    }

    // 启动顺序：主题 → 背景 → 锁屏 → UI → APP宿主 → 桌面
    (async function boot() {
      try {
        // 先按源码顺序加载全部模块（含副作用模块）
        const { initTheme }       = await import('./core/theme.js');
        const { initBackgrounds } = await import('./core/app-bg.js');
        const { initLock }        = await import('./core/lock.js');
        const { initUI }          = await import('./core/ui.js');
        const { initAppHost }     = await import('./core/app-host.js');
        await import('./core/notifications.js');
        await import('./core/inbox.js');
        const { initDesktop }     = await import('./desktop/desktop.js');
        const { loadAllSpecs }    = await import('./js/ai/ai-spec.js');

        initTheme();
        initBackgrounds();
        initLock();
        initUI();
        initAppHost();
        console.log('[Boot] 底座层启动完成');

        // 预加载各APP的AI能力描述（不阻塞桌面启动）
        loadAllSpecs().catch(err => console.warn('[Boot] AI spec预加载失败:', err?.message || err));

        // 启动桌面壳层
        await initDesktop();
        console.log('[Boot] 桌面壳层启动完成');

        // 一切就绪，淡出闪屏
        hideSplash();
      } catch (err) {
        showBootError(err);
      }
    })();

    // 兜底：捕获未处理的异常与 Promise 拒绝
    window.addEventListener('error', (e) => {
      if (document.getElementById('boot-splash')?.isConnected) showBootError(e.error || e.message);
    });
    window.addEventListener('unhandledrejection', (e) => {
      if (document.getElementById('boot-splash')?.isConnected) showBootError(e.reason);
    });
  </script>
</body>
</html>
