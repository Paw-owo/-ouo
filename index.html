<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#F7F0E6">
  <meta name="format-detection" content="telephone=no">
  <title>泡泡 · 小手机</title>
  <link rel="stylesheet" href="./style.css">
  <link rel="manifest" href="./manifest.json">
</head>
<body>
  <!-- 启动加载 -->
  <div id="boot-screen" class="boot-screen">
    <div class="boot-logo">
      <svg viewBox="0 0 24 24" width="44" height="44" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9"/>
        <circle cx="12" cy="12" r="4"/>
      </svg>
    </div>
    <div class="boot-title">泡泡</div>
    <div class="boot-sub">小手机正在醒来</div>
  </div>

  <!-- 锁屏 -->
  <section id="lock-screen" class="lock-screen" aria-label="密码锁屏">
    <div class="lock-avatar" id="lock-avatar">
      <svg viewBox="0 0 24 24" width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4"/>
      </svg>
    </div>
    <div class="lock-title" id="lock-title">嘘，输入密码</div>
    <div class="lock-hint" id="lock-hint">解锁就能见到我啦</div>
    <div class="lock-dots" id="lock-dots" aria-hidden="true"></div>
    <div class="lock-error" id="lock-error"></div>
    <div class="lock-keypad" id="lock-keypad">
      <button class="lock-key" type="button" data-key="1">1</button>
      <button class="lock-key" type="button" data-key="2">2</button>
      <button class="lock-key" type="button" data-key="3">3</button>
      <button class="lock-key" type="button" data-key="4">4</button>
      <button class="lock-key" type="button" data-key="5">5</button>
      <button class="lock-key" type="button" data-key="6">6</button>
      <button class="lock-key" type="button" data-key="7">7</button>
      <button class="lock-key" type="button" data-key="8">8</button>
      <button class="lock-key" type="button" data-key="9">9</button>
      <button class="lock-key secondary" type="button" data-key="clear">清空</button>
      <button class="lock-key" type="button" data-key="0">0</button>
      <button class="lock-key secondary" type="button" data-key="delete">删除</button>
    </div>
  </section>

  <!-- 桌面 -->
  <main id="desktop" class="desktop" aria-label="桌面">
    <div class="status-bar">
      <div class="status-bar-capsule" id="status-capsule" aria-hidden="true"></div>
    </div>

    <section class="desktop-pages" id="desktop-pages" aria-label="桌面页面">
      <div class="desktop-page" data-page="0">
        <div class="widget-area" data-widget-area="0"></div>
        <div class="icon-grid" data-icon-grid="0"></div>
      </div>
      <div class="desktop-page" data-page="1">
        <div class="widget-area" data-widget-area="1"></div>
        <div class="icon-grid" data-icon-grid="1"></div>
      </div>
    </section>

    <div class="page-dots" id="page-dots" aria-hidden="true">
      <span class="page-dot active" data-dot="0"></span>
      <span class="page-dot" data-dot="1"></span>
    </div>

    <nav class="dock" id="dock" aria-label="固定栏"></nav>
  </main>

  <!-- App 容器（router 接管） -->
  <div id="app-root"></div>

  <script type="module" src="./desktop.js"></script>
</body>
</html>
