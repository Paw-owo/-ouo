<!-- index.html -->
<!-- imports:
  from './core/storage.js': initDB, getData, setData, getDB, getAllDB, generateId, getNow
  from './core/theme.js': loadTheme
  from './core/ui.js': createIcon, showToast
-->
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#FAF8F5">
  <meta name="format-detection" content="telephone=no">
  <title>小手机</title>
  <link rel="stylesheet" href="./style.css">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="https://i.postimg.cc/sDhhgcFL/IMG-6643.png">

  <style>
    :root {
      --desktop-icon-scale: 1;
      --desktop-widget-scale: 1;
      --desktop-dock-scale: 1;
    }

    .phone-desktop {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background: var(--bg-primary);
      color: var(--text-primary);
    }

    .phone-desktop.has-wallpaper {
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .desktop-soft-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background: color-mix(in srgb, var(--bg-primary) 72%, transparent);
    }

    .status-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 8;
      height: calc(34px + env(safe-area-inset-top));
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: env(safe-area-inset-top) 24px 6px;
      color: var(--text-primary);
      font-size: 13px;
      font-weight: 600;
      line-height: 1;
      pointer-events: none;
    }

    .status-right {
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }

    .signal-bars {
      display: inline-flex;
      align-items: flex-end;
      gap: 2px;
      height: 12px;
    }

    .signal-bars span {
      width: 3px;
      border-radius: 99px;
      background: currentColor;
      opacity: .82;
    }

    .signal-bars span:nth-child(1) { height: 4px; }
    .signal-bars span:nth-child(2) { height: 7px; }
    .signal-bars span:nth-child(3) { height: 10px; }

    .battery-mark {
      width: 24px;
      height: 12px;
      display: inline-flex;
      align-items: center;
      padding: 2px;
      border-radius: 5px;
      background: color-mix(in srgb, currentColor 14%, transparent);
    }

    .battery-mark::before {
      content: "";
      width: 15px;
      height: 8px;
      border-radius: 3px;
      background: currentColor;
      opacity: .82;
    }

    .desktop-pages {
      position: fixed;
      inset: calc(38px + env(safe-area-inset-top)) 0 calc(100px + env(safe-area-inset-bottom));
      z-index: 1;
      display: flex;
      overflow-x: auto;
      overflow-y: hidden;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-x;
    }

    .desktop-pages.dragging {
      scroll-snap-type: none;
      scroll-behavior: auto;
      touch-action: none;
    }

    .desktop-page {
      position: relative;
      flex: 0 0 100%;
      width: 100%;
      height: 100%;
      overflow: hidden;
      scroll-snap-align: start;
    }

    .desktop-widget-area {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: calc(430px * var(--desktop-widget-scale));
      pointer-events: none;
      border-radius: 0 0 28px 28px;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .desktop-free-layer {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .desktop-item {
      position: absolute;
      z-index: 2;
      touch-action: none;
      transition: transform 200ms ease, opacity 200ms ease;
    }

    .desktop-item.dragging {
      z-index: 20;
      opacity: .92;
      transform: scale(1.04);
      transition: none;
    }

    .desktop-icon {
      width: calc(72px * var(--desktop-icon-scale));
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: calc(var(--spacing-sm) * var(--desktop-icon-scale));
      color: var(--text-primary);
    }

    .desktop-icon.editing {
      animation: icon-wiggle 180ms ease-in-out infinite;
    }

    .desktop-icon-art {
      width: calc(58px * var(--desktop-icon-scale));
      height: calc(58px * var(--desktop-icon-scale));
      border-radius: calc(20px * var(--desktop-icon-scale));
    }

    .desktop-icon-art svg {
      width: calc(28px * var(--desktop-icon-scale));
      height: calc(28px * var(--desktop-icon-scale));
    }

    .desktop-icon-image {
      width: 100%;
      height: 100%;
      border-radius: calc(18px * var(--desktop-icon-scale));
      object-fit: cover;
    }

    .desktop-icon-name {
      width: calc(82px * var(--desktop-icon-scale));
      color: var(--text-primary);
      font-size: calc(12px * var(--desktop-icon-scale));
      line-height: 1.25;
      text-align: center;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-shadow: 0 1px 10px color-mix(in srgb, var(--bg-primary) 78%, transparent);
    }

    .desktop-widget {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: calc(14px * var(--desktop-widget-scale));
      border-radius: calc(24px * var(--desktop-widget-scale));
      background: var(--surface-soft);
      color: var(--text-primary);
      box-shadow: var(--shadow-sm);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .desktop-widget.square {
      width: calc(132px * var(--desktop-widget-scale));
      height: calc(132px * var(--desktop-widget-scale));
    }

    .desktop-widget.rectangle {
      width: calc(214px * var(--desktop-widget-scale));
      height: calc(112px * var(--desktop-widget-scale));
    }

    .desktop-widget.wide {
      width: min(calc(300px * var(--desktop-widget-scale)), calc(100vw - 40px));
      height: calc(104px * var(--desktop-widget-scale));
    }

    .widget-label {
      color: var(--text-secondary);
      font-size: calc(12px * var(--desktop-widget-scale));
      line-height: 1.3;
    }

    .widget-value {
      color: var(--text-primary);
      font-size: calc(16px * var(--desktop-widget-scale));
      font-weight: 600;
      line-height: 1.35;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .time-widget-main {
      color: var(--text-primary);
      font-size: calc(42px * var(--desktop-widget-scale));
      font-weight: 600;
      line-height: 1;
      letter-spacing: -.05em;
    }

    .time-widget-sub,
    .focus-text {
      color: var(--text-secondary);
      font-size: calc(var(--font-size-small) * var(--desktop-widget-scale));
      line-height: 1.45;
    }

    .focus-title {
      color: var(--text-primary);
      font-size: calc(var(--font-size-title) * var(--desktop-widget-scale));
      font-weight: 600;
      line-height: 1.35;
    }

    .focus-text {
      margin-top: calc(4px * var(--desktop-widget-scale));
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .widget-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: calc(10px * var(--desktop-widget-scale));
    }

    .widget-mark {
      width: calc(34px * var(--desktop-widget-scale));
      height: calc(34px * var(--desktop-widget-scale));
      flex: 0 0 calc(34px * var(--desktop-widget-scale));
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: calc(14px * var(--desktop-widget-scale));
      background: var(--accent-light);
      color: var(--accent-dark);
    }

    .widget-mark svg {
      width: calc(18px * var(--desktop-widget-scale));
      height: calc(18px * var(--desktop-widget-scale));
    }

    .desktop-delete-dot {
      position: absolute;
      top: -5px;
      right: 4px;
      width: 18px;
      height: 18px;
      display: none;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: var(--accent-dark);
      color: var(--bubble-user-text);
      box-shadow: var(--shadow-sm);
    }

    .desktop-icon.editing .desktop-delete-dot {
      display: flex;
    }

    .page-dots {
      position: fixed;
      left: 0;
      right: 0;
      bottom: calc(98px + env(safe-area-inset-bottom));
      z-index: 4;
      pointer-events: none;
    }

    .dock {
      z-index: 8;
      transform: scale(var(--desktop-dock-scale));
      transform-origin: center bottom;
    }

    .dock .desktop-icon {
      position: relative;
      left: auto !important;
      top: auto !important;
      width: 64px;
      animation: none;
      touch-action: manipulation;
    }

    .dock .desktop-icon-art {
      width: 58px;
      height: 58px;
      border-radius: 20px;
    }

    .dock .desktop-icon-art svg {
      width: 28px;
      height: 28px;
    }

    .dock .desktop-icon-name,
    .dock .desktop-delete-dot {
      display: none !important;
    }

    .hidden-hint {
      position: absolute;
      left: 20px;
      right: 20px;
      bottom: 16px;
      padding: 12px 14px;
      border-radius: 20px;
      background: var(--surface-soft);
      color: var(--text-secondary);
      box-shadow: var(--shadow-sm);
      font-size: var(--font-size-small);
      line-height: 1.5;
      text-align: center;
      pointer-events: none;
    }

    #app-layer {
      position: fixed;
      inset: 0;
      z-index: 30;
      pointer-events: none;
    }

    #app-layer.has-app {
      pointer-events: auto;
    }

    .placeholder-app {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg-primary);
    }

    .placeholder-body {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: calc(76px + env(safe-area-inset-top)) 24px calc(42px + env(safe-area-inset-bottom));
    }

    .placeholder-card {
      width: min(100%, 420px);
      padding: 26px;
      border-radius: 28px;
      background: var(--bg-card);
      box-shadow: var(--shadow-md);
      text-align: left;
    }

    .placeholder-icon {
      width: 58px;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 18px;
      border-radius: 22px;
      background: var(--accent-light);
      color: var(--accent-dark);
    }

    .placeholder-title {
      margin: 0;
      color: var(--text-primary);
      font-size: 22px;
      font-weight: 600;
      line-height: 1.3;
      letter-spacing: -.01em;
    }

    .placeholder-text {
      margin: 10px 0 0;
      color: var(--text-secondary);
      font-size: var(--font-size-base);
      line-height: 1.7;
    }

    .lock-screen {
      position: fixed;
      inset: 0;
      z-index: 900;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: calc(68px + env(safe-area-inset-top)) 24px calc(36px + env(safe-area-inset-bottom));
      background: var(--bg-primary);
      color: var(--text-primary);
      transition: var(--motion);
    }

    .lock-screen.hidden {
      opacity: 0;
      pointer-events: none;
      transform: scale(1.02);
    }

    .lock-top {
      text-align: center;
    }

    .lock-avatar {
      width: 84px;
      height: 84px;
      margin: 0 auto 20px;
      border-radius: 28px;
      object-fit: cover;
      box-shadow: var(--shadow-md);
      background: var(--bg-card);
    }

    .lock-title {
      margin: 0;
      color: var(--text-primary);
      font-size: 24px;
      font-weight: 600;
      line-height: 1.3;
      letter-spacing: -.02em;
    }

    .lock-subtitle {
      margin-top: 8px;
      color: var(--text-secondary);
      font-size: var(--font-size-base);
      line-height: 1.6;
    }

    .lock-dots {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 26px;
    }

    .lock-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--text-hint) 48%, transparent);
      transition: var(--motion);
    }

    .lock-dot.filled {
      background: var(--accent);
      transform: scale(1.08);
    }

    .lock-error {
      min-height: 22px;
      margin-top: 18px;
      color: var(--accent-dark);
      font-size: var(--font-size-small);
      line-height: 1.5;
      text-align: center;
    }

    .lock-pad {
      width: min(100%, 320px);
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .lock-key {
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 24px;
      background: var(--bg-card);
      color: var(--text-primary);
      box-shadow: var(--shadow-sm);
      font-size: 22px;
      font-weight: 500;
      transition: var(--motion);
    }

    .lock-key:active {
      transform: scale(.96);
    }

    .lock-key.secondary {
      color: var(--text-secondary);
      font-size: 14px;
    }

    .desktop-loading {
      position: fixed;
      inset: 0;
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-primary);
      color: var(--text-secondary);
      transition: var(--motion);
    }

    .desktop-loading.hide {
      opacity: 0;
      pointer-events: none;
    }

    .loading-card {
      min-width: 156px;
      padding: 20px;
      border-radius: 26px;
      background: var(--bg-card);
      box-shadow: var(--shadow-sm);
      text-align: center;
    }

    .loading-mark {
      width: 36px;
      height: 36px;
      margin: 0 auto 12px;
      border-radius: 14px;
      background: var(--accent-light);
      animation: soft-pulse 1400ms ease-in-out infinite;
    }

    .loading-text {
      color: var(--text-secondary);
      font-size: var(--font-size-small);
    }

    .guide-steps {
      display: flex;
      gap: 6px;
      margin: 0 0 18px;
    }

    .guide-step-dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: var(--text-hint);
      transition: var(--motion);
    }

    .guide-step-dot.active {
      width: 18px;
      background: var(--accent);
    }

    .guide-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }
  </style>
</head>

<body>
  <main id="desktop" class="phone-desktop">
    <div class="desktop-soft-layer"></div>

    <div class="status-bar" aria-hidden="true">
      <div id="status-time">--:--</div>
      <div class="status-right">
        <span class="signal-bars"><span></span><span></span><span></span></span>
        <span>5G</span>
        <span class="battery-mark"></span>
      </div>
    </div>

    <section id="desktop-pages" class="desktop-pages" aria-label="桌面页面">
      <div class="desktop-page" data-page="0">
        <div class="desktop-widget-area" data-widget-area="0"></div>
        <div class="desktop-free-layer" data-layer="0"></div>
      </div>
      <div class="desktop-page" data-page="1">
        <div class="desktop-widget-area" data-widget-area="1"></div>
        <div class="desktop-free-layer" data-layer="1"></div>
      </div>
    </section>

    <div class="page-dots" aria-hidden="true">
      <span class="page-dot active" data-dot="0"></span>
      <span class="page-dot" data-dot="1"></span>
    </div>

    <nav id="dock" class="dock" aria-label="固定栏"></nav>
  </main>

  <section id="app-layer" aria-live="polite"></section>

  <section id="lock-screen" class="lock-screen hidden" aria-label="密码锁屏">
    <div class="lock-top">
      <img class="lock-avatar" src="https://i.postimg.cc/sDhhgcFL/IMG-6643.png" alt="">
      <h1 class="lock-title">输入密码</h1>
      <div class="lock-subtitle">解锁后进入小手机</div>
      <div id="lock-dots" class="lock-dots" aria-hidden="true">
        <span class="lock-dot"></span>
        <span class="lock-dot"></span>
        <span class="lock-dot"></span>
        <span class="lock-dot"></span>
      </div>
      <div id="lock-error" class="lock-error"></div>
    </div>

    <div id="lock-pad" class="lock-pad">
      <button class="lock-key" type="button" data-key="1">1</button>
      <button class="lock-key" type="button" data-key="2">2</button>
      <button class="lock-key" type="button" data-key="3">3</button>
      <button class="lock-key" type="button" data-key="4">4</button>
      <button class="lock-key" type="button" data-key="5">5</button>
      <button class="lock-key" type="button" data-key="6">6</button>
      <button class="lock-key" type="button" data-key="7">7</button>
      <button class="lock-key" type="button" data-key="8">8</button>
      <button class="lock-key" type="button" data-key="9">9</button>
      <button class="lock-key secondary" type="button" data-key="clear">清空</button>
      <button class="lock-key" type="button" data-key="0">0</button>
      <button class="lock-key secondary" type="button" data-key="delete">删除</button>
    </div>
  </section>

  <div id="desktop-loading" class="desktop-loading">
    <div class="loading-card">
      <div class="loading-mark"></div>
      <div class="loading-text">正在打开小手机</div>
    </div>
  </div>

  <script type="module">
    import { initDB, getData, setData, getDB, getAllDB, generateId, getNow } from './core/storage.js';
    import { loadTheme } from './core/theme.js';
    import { createIcon, showToast } from './core/ui.js';

    const LOCK_PASSWORD = '0326';

    const APPS = [
      { id: 'chat', name: '聊天', module: './apps/chat.js', icon: 'heart', dock: true, page: 0, ready: true },
      { id: 'moments', name: '朋友圈', module: './apps/moments.js', icon: 'camera', dock: true, page: 0, ready: false },
      { id: 'settings', name: '设置', module: './apps/settings.js', icon: 'settings', dock: true, page: 0, ready: true },
      { id: 'gallery', name: '相册', module: '', icon: 'image', dock: true, page: 0, ready: false },
      { id: 'characters', name: '角色', module: './apps/characters.js', icon: 'smile', dock: false, page: 0, ready: true },
      { id: 'worldbook', name: '世界书', module: './apps/worldbook.js', icon: 'memory', dock: false, page: 0, ready: false },
      { id: 'wallet', name: '钱包', module: './apps/wallet.js', icon: 'transfer', dock: false, page: 0, ready: false },
      { id: 'shop', name: '商店', module: './apps/shop.js', icon: 'star', dock: false, page: 0, ready: false },
      { id: 'memo', name: '备忘录', module: './apps/memo.js', icon: 'edit', dock: false, page: 0, ready: false },
      { id: 'anniversary', name: '纪念日', module: './apps/anniversary.js', icon: 'check', dock: false, page: 0, ready: false },
      { id: 'games', name: '游戏', module: './apps/games.js', icon: 'play', dock: false, page: 0, ready: false }
    ];

    const WIDGETS = [
      { id: 'time', label: '时间', shape: 'rectangle', defaultPage: 0, defaultX: 20, defaultY: 24 },
      { id: 'weather', label: '天气', shape: 'square', defaultPage: 0, defaultX: 20, defaultY: 154 },
      { id: 'anniversary', label: '纪念日', shape: 'square', defaultPage: 0, defaultX: 168, defaultY: 154 },
      { id: 'focus', label: '今日提示', shape: 'wide', defaultPage: 0, defaultX: 20, defaultY: 304 }
    ];

    const WIDGET_BACKGROUND_TARGETS = [
      { key: 'app_widget_bg_time', selector: '#time-widget' },
      { key: 'app_widget_bg_weather', selector: '#weather-widget' },
      { key: 'app_widget_bg_anniversary', selector: '#anniversary-widget' },
      { key: 'app_widget_bg_focus', selector: '.focus-card' }
    ];

    const DEFAULT_SETTINGS = {
      defaultApiEndpointId: '',
      defaultModel: '',
      ttsGlobal: { provider: 'openai', apiKey: '', endpoint: '' },
      mcpServers: [],
      bubbleMode: 'bubble',
      fontSize: 15,
      user: { name: '', avatar: '' },
      widgets: { time: true, weather: true, anniversary: true },
      apiEndpoints: []
    };

    const desktopEl = document.getElementById('desktop');
    const pagesEl = document.getElementById('desktop-pages');
    const appLayerEl = document.getElementById('app-layer');
    const dockEl = document.getElementById('dock');
    const loadingEl = document.getElementById('desktop-loading');
    const statusTimeEl = document.getElementById('status-time');
    const lockScreenEl = document.getElementById('lock-screen');
    const lockPadEl = document.getElementById('lock-pad');
    const lockErrorEl = document.getElementById('lock-error');
    const lockDotsEl = document.getElementById('lock-dots');

    let currentAppModule = null;
    let currentAppId = '';
    let currentPage = 0;
    let editing = false;
    let longPressTimer = null;
    let dragState = null;
    let clockTimer = null;
    let weatherTimer = null;
    let lockInput = '';

    window.AppEvents = {
      emit(event, data) {
        window.dispatchEvent(new CustomEvent(event, { detail: data }));
      },
      on(event, fn) {
        window.addEventListener(event, (e) => fn(e.detail));
      }
    };

    window.closeCurrentApp = closeCurrentApp;
    window.refreshDesktopBadges = refreshBadges;

    boot();

    async function boot() {
      try {
        await initDB();
        loadTheme();
        applyDesktopScale();
        ensureDefaultSettings();
        await applyWallpaper();
        await applyWidgetBackgrounds();
        ensureFirstOpenSeed();
        renderDesktop();
        await applyWidgetBackgrounds();
        bindDesktopEvents();
        bindLockScreen();
        initWidgets();
        refreshBadges();
        setupAppEvents();
        showInstallTipIfNeeded();
        showOnboardingIfNeeded();
        updateLockState();
      } catch (error) {
        showToast('启动失败，请刷新页面');
        console.error(error);
      } finally {
        window.setTimeout(() => {
          loadingEl.classList.add('hide');
          window.setTimeout(() => loadingEl.remove(), 240);
        }, 260);
      }
    }

    function applyDesktopScale() {
      const saved = getData('desktop_layout_scale');
      const isAndroid = /Android/i.test(navigator.userAgent);
      const fallback = isAndroid
        ? { iconScale: .82, widgetScale: .78, dockScale: .82 }
        : { iconScale: 1, widgetScale: 1, dockScale: 1 };

      const iconScale = normalizeScale(saved?.iconScale, fallback.iconScale);
      const widgetScale = normalizeScale(saved?.widgetScale, fallback.widgetScale);
      const dockScale = normalizeScale(saved?.dockScale, fallback.dockScale);

      document.documentElement.style.setProperty('--desktop-icon-scale', String(iconScale));
      document.documentElement.style.setProperty('--desktop-widget-scale', String(widgetScale));
      document.documentElement.style.setProperty('--desktop-dock-scale', String(dockScale));
    }

    function normalizeScale(value, fallback) {
      const number = Number(value);
      if (!Number.isFinite(number)) return fallback;
      return Math.max(.62, Math.min(1.28, number));
    }

    function bindLockScreen() {
      lockPadEl.addEventListener('click', (event) => {
        const key = event.target.closest('[data-key]')?.dataset.key;
        if (!key) return;

        if (key === 'clear') {
          lockInput = '';
          lockErrorEl.textContent = '';
          renderLockDots();
          return;
        }

        if (key === 'delete') {
          lockInput = lockInput.slice(0, -1);
          lockErrorEl.textContent = '';
          renderLockDots();
          return;
        }

        if (lockInput.length >= LOCK_PASSWORD.length) return;

        lockInput += key;
        lockErrorEl.textContent = '';
        renderLockDots();

        if (lockInput.length === LOCK_PASSWORD.length) {
          window.setTimeout(checkLockPassword, 120);
        }
      });
    }

    function updateLockState() {
      const unlocked = getData('app_lock_unlocked') === true;
      lockScreenEl.classList.toggle('hidden', unlocked);

      if (!unlocked) {
        lockInput = '';
        lockErrorEl.textContent = '';
        renderLockDots();
      }
    }

    function renderLockDots() {
      [...lockDotsEl.querySelectorAll('.lock-dot')].forEach((dot, index) => {
        dot.classList.toggle('filled', index < lockInput.length);
      });
    }

    function checkLockPassword() {
      if (lockInput === LOCK_PASSWORD) {
        setData('app_lock_unlocked', true);
        lockScreenEl.classList.add('hidden');
        showToast('已解锁');
        return;
      }

      lockInput = '';
      lockErrorEl.textContent = '密码不正确';
      renderLockDots();
    }

    function ensureDefaultSettings() {
      const saved = getData('app_settings') || {};
      const nextSettings = {
        ...DEFAULT_SETTINGS,
        ...saved,
        ttsGlobal: { ...DEFAULT_SETTINGS.ttsGlobal, ...(saved.ttsGlobal || {}) },
        user: { ...DEFAULT_SETTINGS.user, ...(saved.user || {}) },
        widgets: { ...DEFAULT_SETTINGS.widgets, ...(saved.widgets || {}) },
        mcpServers: Array.isArray(saved.mcpServers) ? saved.mcpServers : [],
        apiEndpoints: Array.isArray(saved.apiEndpoints) ? saved.apiEndpoints : []
      };

      setData('app_settings', nextSettings);
      return nextSettings;
    }

    function ensureFirstOpenSeed() {
      if (getData('app_first_open_seed')) return;
      setData('app_first_open_seed', { id: generateId(), createdAt: getNow() });
    }

    async function applyWallpaper() {
      let wallpaper = '';

      try {
        const record = await getDB('blobs', 'app_wallpaper');
        wallpaper = record?.value || record?.data || '';
      } catch (_) {
        wallpaper = '';
      }

      if (!wallpaper) {
        const legacyWallpaper = getData('app_wallpaper');
        wallpaper = typeof legacyWallpaper === 'string' ? legacyWallpaper : '';
      }

      if (wallpaper) {
        desktopEl.classList.add('has-wallpaper');
        desktopEl.style.backgroundImage = `url("${wallpaper}")`;
      } else {
        desktopEl.classList.remove('has-wallpaper');
        desktopEl.style.backgroundImage = '';
      }
    }

    async function applyWidgetBackgrounds() {
      await applyWidgetAreaBackground();
      await Promise.all(WIDGET_BACKGROUND_TARGETS.map(async (target) => {
        const value = await readBlobValue(target.key);
        document.querySelectorAll(target.selector).forEach((element) => {
          applyBackgroundToElement(element, value);
        });
      }));
    }

    async function applyWidgetAreaBackground() {
      const value = await readBlobValue('app_widget_area_bg');
      const widgetPages = new Set(
        [...document.querySelectorAll('.desktop-widget')]
          .map((widgetEl) => widgetEl.closest('.desktop-page')?.dataset.page)
          .filter((page) => page === '0' || page === '1')
      );

      document.querySelectorAll('.desktop-widget-area').forEach((areaEl) => {
        applyBackgroundToElement(areaEl, widgetPages.has(areaEl.dataset.widgetArea) ? value : '');
      });
    }

    async function readBlobValue(key) {
      try {
        const record = await getDB('blobs', key);
        return record?.value || '';
      } catch (_) {
        return '';
      }
    }

    function applyBackgroundToElement(element, value) {
      if (!element) return;

      if (value) {
        element.style.backgroundImage = `url("${value}")`;
        element.style.backgroundSize = 'cover';
        element.style.backgroundPosition = 'center';
        element.style.backgroundRepeat = 'no-repeat';
      } else {
        element.style.backgroundImage = '';
        element.style.backgroundSize = '';
        element.style.backgroundPosition = '';
        element.style.backgroundRepeat = '';
      }
    }

    function getCustomIcons() {
      const icons = getData('app_icons');
      return icons && typeof icons === 'object' ? icons : {};
    }

    function getHiddenIcons() {
      const hidden = getData('app_hidden_icons');
      return Array.isArray(hidden) ? hidden : [];
    }

    function saveHiddenIcons(hiddenIcons) {
      setData('app_hidden_icons', [...new Set(hiddenIcons)]);
    }

    function getIconPositions() {
      const positions = getData('app_icon_positions');
      return positions && typeof positions === 'object' ? positions : {};
    }

    function saveIconPositions(positions) {
      setData('app_icon_positions', positions);
    }

    function getWidgetPositions() {
      const positions = getData('app_widget_positions');
      return positions && typeof positions === 'object' ? positions : {};
    }

    function saveWidgetPositions(positions) {
      setData('app_widget_positions', positions);
    }

    function renderDesktop() {
      document.querySelectorAll('.desktop-free-layer').forEach((layer) => {
        layer.innerHTML = '';
      });

      dockEl.innerHTML = '';

      const hiddenIcons = getHiddenIcons();

      APPS.filter((app) => app.dock).forEach((app) => {
        dockEl.appendChild(createDesktopIcon(app));
      });

      renderWidgets();

      APPS.filter((app) => !app.dock && !hiddenIcons.includes(app.id)).forEach((app, index) => {
        const iconEl = createDesktopIcon(app);
        const position = getResolvedIconPosition(app, index);
        getLayer(position.page).appendChild(iconEl);
        placeDesktopItem(iconEl, position.x, position.y);
      });

      if (hiddenIcons.length) {
        const hint = document.createElement('div');
        hint.className = 'hidden-hint';
        hint.textContent = '有隐藏的桌面图标，可稍后在设置里恢复';
        getLayer(1).appendChild(hint);
      }

      updateEditingClass();
      updatePageDots();
      refreshBadges();
    }

    function renderWidgets() {
      const settings = ensureDefaultSettings();
      const enabled = settings.widgets || DEFAULT_SETTINGS.widgets;

      WIDGETS.forEach((widget) => {
        if (widget.id === 'time' && enabled.time === false) return;
        if (widget.id === 'weather' && enabled.weather === false) return;
        if (widget.id === 'anniversary' && enabled.anniversary === false) return;

        const widgetEl = createWidget(widget);
        const position = getResolvedWidgetPosition(widget);
        getLayer(position.page).appendChild(widgetEl);
        placeDesktopItem(widgetEl, position.x, position.y);
      });
    }

    function createWidget(widget) {
      const widgetEl = document.createElement('section');
      widgetEl.className = `desktop-item desktop-widget ${widget.shape}`;
      widgetEl.dataset.kind = 'widget';
      widgetEl.dataset.widgetId = widget.id;
      widgetEl.setAttribute('aria-label', widget.label);

      if (widget.id === 'time') {
        widgetEl.id = 'time-widget';
        widgetEl.innerHTML = `
          <div>
            <div id="clock-large" class="time-widget-main">--:--</div>
            <div id="date-line" class="time-widget-sub">正在准备桌面</div>
          </div>
          <div class="widget-label">当前时间</div>
        `;
      }

      if (widget.id === 'weather') {
        widgetEl.id = 'weather-widget';
        widgetEl.innerHTML = `
          <div class="widget-top">
            <div class="widget-label">天气</div>
            <div class="widget-mark" data-widget-icon="weather"></div>
          </div>
          <div id="weather-value" class="widget-value">自动获取中</div>
        `;
      }

      if (widget.id === 'anniversary') {
        widgetEl.id = 'anniversary-widget';
        widgetEl.innerHTML = `
          <div class="widget-top">
            <div class="widget-label">纪念日</div>
            <div class="widget-mark" data-widget-icon="anniversary"></div>
          </div>
          <div id="anniversary-value" class="widget-value">暂无提醒</div>
        `;
      }

      if (widget.id === 'focus') {
        widgetEl.classList.add('focus-card');
        widgetEl.innerHTML = `
          <div class="widget-top">
            <div>
              <div id="focus-title" class="focus-title">今天也要好好休息</div>
              <div id="focus-text" class="focus-text">打开聊天，看看谁在想你</div>
            </div>
            <div class="widget-mark" data-widget-icon="focus"></div>
          </div>
        `;
      }

      widgetEl.querySelectorAll('[data-widget-icon]').forEach((iconEl) => {
        const type = iconEl.dataset.widgetIcon;
        iconEl.appendChild(createIcon(type === 'weather' ? 'refresh' : type === 'anniversary' ? 'check' : 'star', 18));
      });

      widgetEl.addEventListener('pointerdown', (event) => handleDesktopItemPointerDown(event, widgetEl));
      return widgetEl;
    }

    function createDesktopIcon(app) {
      const customIcons = getCustomIcons();
      const custom = customIcons[app.id] || {};
      const iconEl = document.createElement('button');
      const artEl = document.createElement('span');
      const nameEl = document.createElement('span');
      const deleteEl = document.createElement('span');
      const badgeEl = document.createElement('span');

      iconEl.type = 'button';
      iconEl.className = app.dock ? 'desktop-icon' : 'desktop-item desktop-icon';
      iconEl.dataset.kind = app.dock ? 'dock' : 'icon';
      iconEl.dataset.appId = app.id;
      iconEl.setAttribute('aria-label', custom.name || app.name);

      artEl.className = 'desktop-icon-art';

      if (custom.image) {
        const image = document.createElement('img');
        image.className = 'desktop-icon-image';
        image.alt = '';
        image.src = custom.image;
        artEl.appendChild(image);
      } else {
        artEl.appendChild(createIcon(app.icon, 28));
      }

      nameEl.className = 'desktop-icon-name';
      nameEl.textContent = custom.name || app.name;

      deleteEl.className = 'desktop-delete-dot';
      deleteEl.setAttribute('aria-hidden', 'true');
      deleteEl.appendChild(createIcon('close', 12));

      badgeEl.className = 'badge hidden';
      badgeEl.dataset.badge = app.id;

      iconEl.append(artEl, nameEl, deleteEl, badgeEl);

      deleteEl.addEventListener('click', (event) => {
        event.preventDefault();
        event.stopPropagation();

        if (!editing || app.dock) return;

        const hiddenIcons = getHiddenIcons();
        hiddenIcons.push(app.id);
        saveHiddenIcons(hiddenIcons);

        const positions = getIconPositions();
        delete positions[app.id];
        saveIconPositions(positions);

        renderDesktop();
        applyWidgetBackgrounds();
        showToast('已隐藏，可在设置中恢复');
      });

      iconEl.addEventListener('click', (event) => {
        if (editing || dragState) {
          event.preventDefault();
          event.stopPropagation();
          return;
        }

        openApp(app.id);
      });

      if (!app.dock) {
        iconEl.addEventListener('pointerdown', (event) => handleDesktopItemPointerDown(event, iconEl));
      }

      return iconEl;
    }

    function handleDesktopItemPointerDown(event, itemEl) {
      if (event.button !== undefined && event.button !== 0) return;

      clearLongPressTimer();

      longPressTimer = window.setTimeout(() => {
        enterEditing();
        startFreeDrag(event, itemEl);
      }, 420);

      const cancel = () => {
        clearLongPressTimer();
        window.removeEventListener('pointerup', cancel);
        window.removeEventListener('pointercancel', cancel);
      };

      window.addEventListener('pointerup', cancel, { once: true });
      window.addEventListener('pointercancel', cancel, { once: true });

      if (editing) {
        clearLongPressTimer();
        startFreeDrag(event, itemEl);
      }
    }

    function startFreeDrag(event, itemEl) {
      event.preventDefault();
      event.stopPropagation();

      const rect = itemEl.getBoundingClientRect();
      const page = Number(itemEl.closest('.desktop-page')?.dataset.page || currentPage);

      itemEl.classList.add('dragging');
      pagesEl.classList.add('dragging');
      itemEl.setPointerCapture?.(event.pointerId);

      dragState = {
        itemEl,
        kind: itemEl.dataset.kind,
        id: itemEl.dataset.appId || itemEl.dataset.widgetId,
        pointerId: event.pointerId,
        offsetX: event.clientX - rect.left,
        offsetY: event.clientY - rect.top,
        page: normalizePage(page)
      };

      itemEl.addEventListener('pointermove', handleFreeDragMove);
      itemEl.addEventListener('pointerup', handleFreeDragEnd, { once: true });
      itemEl.addEventListener('pointercancel', handleFreeDragEnd, { once: true });
    }

    function handleFreeDragMove(event) {
      if (!dragState) return;

      if (event.clientX < 28 && currentPage > 0) moveDraggingItemToPage(0);
      if (event.clientX > window.innerWidth - 28 && currentPage < 1) moveDraggingItemToPage(1);

      const layer = getLayer(dragState.page);
      const layerRect = layer.getBoundingClientRect();
      const x = clamp(event.clientX - layerRect.left - dragState.offsetX, 8, layerRect.width - dragState.itemEl.offsetWidth - 8);
      const y = clamp(event.clientY - layerRect.top - dragState.offsetY, 8, layerRect.height - dragState.itemEl.offsetHeight - 8);

      placeDesktopItem(dragState.itemEl, x, y);
    }

    function handleFreeDragEnd() {
      if (!dragState) return;

      const { itemEl, kind, id, page } = dragState;
      itemEl.releasePointerCapture?.(dragState.pointerId);
      itemEl.classList.remove('dragging');
      itemEl.removeEventListener('pointermove', handleFreeDragMove);
      pagesEl.classList.remove('dragging');

      const x = parseFloat(itemEl.style.left) || 0;
      const y = parseFloat(itemEl.style.top) || 0;

      if (kind === 'icon') {
        const positions = getIconPositions();
        positions[id] = { page, x, y };
        saveIconPositions(positions);
      }

      if (kind === 'widget') {
        const positions = getWidgetPositions();
        const widget = WIDGETS.find((item) => item.id === id);
        positions[id] = { page, x, y, shape: widget?.shape || 'square' };
        saveWidgetPositions(positions);
        applyWidgetBackgrounds();
      }

      dragState = null;
    }

    function moveDraggingItemToPage(page) {
      if (!dragState) return;

      const nextPage = normalizePage(page);
      getLayer(nextPage).appendChild(dragState.itemEl);
      dragState.page = nextPage;
      scrollToPage(nextPage);
      placeDesktopItem(dragState.itemEl, 24, 24);
      applyWidgetBackgrounds();
    }

    function getResolvedIconPosition(app, index) {
      const saved = getIconPositions()[app.id];
      const fallback = getDefaultIconPosition(index);

      if (!saved || typeof saved !== 'object') return fallback;

      return {
        page: normalizePage(saved.page),
        x: Number.isFinite(Number(saved.x)) ? Number(saved.x) : fallback.x,
        y: Number.isFinite(Number(saved.y)) ? Number(saved.y) : fallback.y
      };
    }

    function getResolvedWidgetPosition(widget) {
      const saved = getWidgetPositions()[widget.id];

      if (!saved || typeof saved !== 'object') {
        return { page: widget.defaultPage, x: widget.defaultX, y: widget.defaultY };
      }

      return {
        page: normalizePage(saved.page),
        x: Number.isFinite(Number(saved.x)) ? Number(saved.x) : widget.defaultX,
        y: Number.isFinite(Number(saved.y)) ? Number(saved.y) : widget.defaultY
      };
    }

    function getDefaultIconPosition(index) {
      const column = index % 4;
      const row = Math.floor(index / 4);
      return {
        page: 0,
        x: 24 + column * 86 * getCurrentIconScale(),
        y: 454 * getCurrentWidgetScale() + row * 96 * getCurrentIconScale()
      };
    }

    function getCurrentIconScale() {
      const value = getComputedStyle(document.documentElement).getPropertyValue('--desktop-icon-scale');
      const number = Number(value);
      return Number.isFinite(number) ? number : 1;
    }

    function getCurrentWidgetScale() {
      const value = getComputedStyle(document.documentElement).getPropertyValue('--desktop-widget-scale');
      const number = Number(value);
      return Number.isFinite(number) ? number : 1;
    }

    function placeDesktopItem(itemEl, x, y) {
      itemEl.style.left = `${x}px`;
      itemEl.style.top = `${y}px`;
    }

    function getLayer(page) {
      return document.querySelector(`[data-layer="${normalizePage(page)}"]`);
    }

    function enterEditing() {
      if (editing) return;
      editing = true;
      updateEditingClass();
      showToast('可以自由摆放桌面了');
    }

    function exitEditing() {
      if (!editing || dragState) return;
      editing = false;
      updateEditingClass();
    }

    function updateEditingClass() {
      document.querySelectorAll('.desktop-icon').forEach((iconEl) => {
        const app = APPS.find((item) => item.id === iconEl.dataset.appId);
        iconEl.classList.toggle('editing', editing && !app?.dock);
      });
    }

    function clearLongPressTimer() {
      if (longPressTimer) {
        window.clearTimeout(longPressTimer);
        longPressTimer = null;
      }
    }

    function bindDesktopEvents() {
      pagesEl.addEventListener('scroll', () => {
        const nextPage = Math.round(pagesEl.scrollLeft / Math.max(1, pagesEl.clientWidth));
        if (nextPage !== currentPage) {
          currentPage = normalizePage(nextPage);
          updatePageDots();
        }
      }, { passive: true });

      desktopEl.addEventListener('click', (event) => {
        if (!editing) return;
        if (event.target.closest('.desktop-item')) return;
        exitEditing();
      });

      window.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') {
          if (currentAppId) closeCurrentApp();
          else exitEditing();
        }
      });
    }

    function scrollToPage(page) {
      currentPage = normalizePage(page);
      pagesEl.scrollTo({ left: pagesEl.clientWidth * currentPage, behavior: 'smooth' });
      updatePageDots();
    }

    function updatePageDots() {
      document.querySelectorAll('.page-dot').forEach((dot) => {
        dot.classList.toggle('active', Number(dot.dataset.dot) === currentPage);
      });
    }

    async function openApp(appId) {
      const app = APPS.find((item) => item.id === appId);
      if (!app) return;

      exitEditing();
      await closeCurrentApp();

      appLayerEl.innerHTML = '';
      appLayerEl.classList.add('has-app');
      currentAppId = appId;

      if (!app.ready || !app.module) {
        mountPlaceholderApp(app);
        return;
      }

      try {
        const module = await import(app.module);
        currentAppModule = module;

        if (typeof module.mount === 'function') {
          await module.mount(appLayerEl);
          return;
        }

        mountPlaceholderApp(app);
      } catch (error) {
        console.warn(`[desktop] ${app.module} 未就绪`, error);
        mountPlaceholderApp(app);
      }
    }

    async function closeCurrentApp() {
      if (currentAppModule && typeof currentAppModule.unmount === 'function') {
        try {
          await currentAppModule.unmount();
        } catch (error) {
          console.warn('[desktop] app unmount failed', error);
        }
      }

      currentAppModule = null;
      currentAppId = '';
      appLayerEl.innerHTML = '';
      appLayerEl.classList.remove('has-app');
      refreshBadges();
    }

    function mountPlaceholderApp(app) {
      const screen = document.createElement('section');
      screen.className = 'placeholder-app';

      const nav = document.createElement('div');
      nav.className = 'nav-bar';

      const backButton = document.createElement('button');
      backButton.type = 'button';
      backButton.className = 'icon-button';
      backButton.setAttribute('aria-label', '返回');
      backButton.appendChild(createIcon('back', 24));
      backButton.addEventListener('click', closeCurrentApp);

      const title = document.createElement('div');
      title.className = 'nav-title';
      title.textContent = app.name;

      const body = document.createElement('div');
      body.className = 'placeholder-body';

      const card = document.createElement('div');
      card.className = 'placeholder-card';

      const iconWrap = document.createElement('div');
      iconWrap.className = 'placeholder-icon';
      iconWrap.appendChild(createIcon(app.icon, 28));

      const heading = document.createElement('h1');
      heading.className = 'placeholder-title';
      heading.textContent = app.name;

      const text = document.createElement('p');
      text.className = 'placeholder-text';
      text.textContent = app.module ? '这个应用入口已经准备好，写到对应文件后会自动接入完整功能。' : '这里会作为相册入口，用来集中查看你保存的图片和回忆。';

      nav.append(backButton, title);
      card.append(iconWrap, heading, text);
      body.appendChild(card);
      screen.append(nav, body);
      appLayerEl.appendChild(screen);
    }

    function initWidgets() {
      updateClock();
      clockTimer = window.setInterval(updateClock, 1000);
      updateWeather();
      updateAnniversary();
      updateFocusCard();
      weatherTimer = window.setInterval(updateWeather, 30 * 60 * 1000);

      document.addEventListener('visibilitychange', () => {
        if (!document.hidden) {
          updateClock();
          updateWeather();
          updateAnniversary();
          updateFocusCard();
          refreshBadges();
        }
      });
    }

    function updateClock() {
      const now = new Date();
      const time = new Intl.DateTimeFormat('zh-CN', { hour: '2-digit', minute: '2-digit', hour12: false }).format(now);
      const date = new Intl.DateTimeFormat('zh-CN', { month: 'long', day: 'numeric', weekday: 'long' }).format(now);

      statusTimeEl.textContent = time;

      const clockLargeEl = document.getElementById('clock-large');
      const dateLineEl = document.getElementById('date-line');

      if (clockLargeEl) clockLargeEl.textContent = time;
      if (dateLineEl) dateLineEl.textContent = date;

      updateFocusCard();
    }

    function updateFocusCard() {
      const focusTitleEl = document.getElementById('focus-title');
      const focusTextEl = document.getElementById('focus-text');
      if (!focusTitleEl || !focusTextEl) return;

      const hour = new Date().getHours();
      const hiddenCount = getHiddenIcons().length;
      const unreadCounts = getData('chat_unread_counts') || {};
      const chatUnread = Object.values(unreadCounts).reduce((sum, value) => sum + normalizeCount(value), 0);

      if (hour < 5) focusTitleEl.textContent = '夜深了，慢一点';
      else if (hour < 11) focusTitleEl.textContent = '早上好';
      else if (hour < 18) focusTitleEl.textContent = '今天也很适合聊天';
      else focusTitleEl.textContent = '晚上好';

      if (chatUnread > 0) {
        focusTextEl.textContent = `有 ${chatUnread} 条聊天消息等你查看`;
      } else if (hiddenCount > 0) {
        focusTextEl.textContent = `有 ${hiddenCount} 个图标被隐藏，可在设置里恢复`;
      } else {
        const weatherText = document.getElementById('weather-value')?.textContent || '';
        const anniversaryText = document.getElementById('anniversary-value')?.textContent || '';

        if (weatherText && weatherText !== '自动获取中' && weatherText !== '稍后再看') focusTextEl.textContent = weatherText;
        else if (anniversaryText && anniversaryText !== '暂无提醒') focusTextEl.textContent = anniversaryText;
        else focusTextEl.textContent = '打开聊天，看看谁在想你';
      }
    }

    async function updateWeather() {
      const cache = getData('weather_cache');
      const now = Date.now();
      const weatherValueEl = document.getElementById('weather-value');
      if (!weatherValueEl) return;

      if (cache?.data?.text && cache?.timestamp && now - cache.timestamp < 30 * 60 * 1000) {
        weatherValueEl.textContent = cache.data.text;
        updateFocusCard();
        return;
      }

      if (cache?.text && cache?.timestamp && now - cache.timestamp < 30 * 60 * 1000) {
        weatherValueEl.textContent = cache.text;
        updateFocusCard();
        return;
      }

      try {
        const response = await fetch('https://wttr.in/?format=j1', { method: 'GET', cache: 'no-store' });
        if (!response.ok) return;

        const data = await response.json();
        const current = data.current_condition?.[0] || {};
        const area = data.nearest_area?.[0] || {};
        const city = area.areaName?.[0]?.value || area.region?.[0]?.value || '当前位置';
        const temp = current.temp_C ? `${current.temp_C}℃` : '';
        const desc = current.lang_zh?.[0]?.value || current.weatherDesc?.[0]?.value || '';
        const text = [city, temp, desc].filter(Boolean).join(' · ');

        if (text) {
          weatherValueEl.textContent = text;
          setData('weather_cache', { data: { city, temp, desc, text }, timestamp: now });
          updateFocusCard();
        }
      } catch (_) {
        if (!cache?.data?.text && !cache?.text) weatherValueEl.textContent = '稍后再看';
        updateFocusCard();
      }
    }

    async function updateAnniversary() {
      let next = null;
      const anniversaryApp = APPS.find((app) => app.id === 'anniversary');
      const anniversaryValueEl = document.getElementById('anniversary-value');
      if (!anniversaryValueEl) return;

      if (anniversaryApp?.ready && anniversaryApp.module) {
        try {
          const module = await import(anniversaryApp.module);
          if (typeof module.getNextAnniversary === 'function') next = await module.getNextAnniversary();
        } catch (_) {
          next = null;
        }
      }

      if (!next) next = getNextAnniversaryFallback();

      if (!next) {
        anniversaryValueEl.textContent = '暂无提醒';
        updateFocusCard();
        return;
      }

      const days = Number(next.days);
      if (days === 0) anniversaryValueEl.textContent = `${next.name} · 就是今天`;
      else if (days > 0) anniversaryValueEl.textContent = `${next.name} · 还有 ${days} 天`;
      else anniversaryValueEl.textContent = `${next.name} · 已过 ${Math.abs(days)} 天`;

      updateFocusCard();
    }

    function getNextAnniversaryFallback() {
      const list = getData('anniversaries');
      if (!Array.isArray(list) || !list.length) return null;

      const today = new Date();
      today.setHours(0, 0, 0, 0);

      return list
        .filter((item) => item?.name && item?.date)
        .map((item) => {
          const target = new Date(item.date);
          target.setHours(0, 0, 0, 0);
          return { name: item.name, days: Math.ceil((target.getTime() - today.getTime()) / 86400000) };
        })
        .sort((a, b) => Math.abs(a.days) - Math.abs(b.days))[0] || null;
    }

    function setupAppEvents() {
      window.AppEvents.on('badge:moments', (count) => setBadge('moments', normalizeCount(count)));

      window.AppEvents.on('badge:chat', async (payload) => {
        if (payload && typeof payload === 'object' && Number.isFinite(Number(payload.count))) {
          const unreadCounts = getData('chat_unread_counts') || {};
          unreadCounts[payload.characterId || 'chat'] = normalizeCount(payload.count);
          setData('chat_unread_counts', unreadCounts);
        }

        await refreshBadges();
      });

      window.AppEvents.on('desktop:refresh', async () => {
        applyDesktopScale();
        await applyWallpaper();
        renderDesktop();
        await applyWidgetBackgrounds();
        updateClock();
        updateWeather();
        updateAnniversary();
        refreshBadges();
      });
    }

    async function refreshBadges() {
      await Promise.all([refreshMomentsBadge(), refreshChatBadge()]);
      updateFocusCard();
    }

    async function refreshMomentsBadge() {
      try {
        const moments = await getAllDB('moments');
        setBadge('moments', moments.filter((item) => item && item.isRead === false).length);
      } catch (_) {
        setBadge('moments', 0);
      }
    }

    async function refreshChatBadge() {
      const unreadCounts = getData('chat_unread_counts') || {};
      const total = Object.values(unreadCounts).reduce((sum, value) => sum + normalizeCount(value), 0);
      setBadge('chat', total);
    }

    function setBadge(appId, count) {
      document.querySelectorAll(`[data-badge="${appId}"]`).forEach((badge) => {
        const value = normalizeCount(count);

        if (value <= 0) {
          badge.classList.add('hidden');
          badge.textContent = '';
          return;
        }

        badge.classList.remove('hidden');
        badge.textContent = value > 99 ? '99+' : String(value);
      });
    }

    function showInstallTipIfNeeded() {
      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
      const isStandalone = window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches;
      const closed = getData('app_install_tip_closed') === true;

      if (!isIOS || isStandalone || closed) return;

      const tip = document.createElement('div');
      tip.className = 'install-tip';

      const text = document.createElement('p');
      text.textContent = '添加到主屏幕可减少数据丢失风险。点击 Safari 分享按钮，再选择添加到主屏幕。';

      const closeButton = document.createElement('button');
      closeButton.type = 'button';
      closeButton.className = 'icon-button';
      closeButton.setAttribute('aria-label', '关闭');
      closeButton.appendChild(createIcon('close', 20));
      closeButton.addEventListener('click', () => {
        setData('app_install_tip_closed', true);
        tip.remove();
      });

      tip.append(text, closeButton);
      document.body.appendChild(tip);
    }

    function showOnboardingIfNeeded() {
      if (getData('app_onboarding_done') === true) return;

      const steps = [
        { title: '欢迎来到小手机', text: '这里是你的纯静态 AI 手机桌面。聊天、角色、朋友圈、备忘录和小游戏都会慢慢装进来。' },
        { title: '先去设置', text: '使用 AI 前，需要在设置里填写 API 地址、Key 和模型。所有数据只保存在你的浏览器里。' },
        { title: '创建第一个角色', text: '接着去角色应用创建一个 AI 角色，写好人设后就可以开始聊天。' }
      ];

      let index = 0;
      const overlay = document.createElement('div');
      const card = document.createElement('div');
      const dots = document.createElement('div');
      const title = document.createElement('h2');
      const text = document.createElement('p');
      const actions = document.createElement('div');
      const skipButton = document.createElement('button');
      const nextButton = document.createElement('button');

      overlay.className = 'guide-overlay';
      card.className = 'guide-card';
      dots.className = 'guide-steps';
      title.className = 'guide-title';
      text.className = 'guide-text';
      actions.className = 'guide-actions';
      skipButton.type = 'button';
      skipButton.className = 'btn-ghost';
      skipButton.textContent = '跳过';
      nextButton.type = 'button';
      nextButton.className = 'btn-primary';

      steps.forEach((_, stepIndex) => {
        const dot = document.createElement('span');
        dot.className = 'guide-step-dot';
        dot.dataset.step = String(stepIndex);
        dots.appendChild(dot);
      });

      function renderStep() {
        const step = steps[index];
        title.textContent = step.title;
        text.textContent = step.text;
        nextButton.textContent = index === steps.length - 1 ? '开始使用' : '下一步';
        dots.querySelectorAll('.guide-step-dot').forEach((dot) => {
          dot.classList.toggle('active', Number(dot.dataset.step) === index);
        });
      }

      function closeGuide() {
        setData('app_onboarding_done', true);
        overlay.remove();
      }

      skipButton.addEventListener('click', closeGuide);
      nextButton.addEventListener('click', () => {
        if (index >= steps.length - 1) {
          closeGuide();
          return;
        }

        index += 1;
        renderStep();
      });

      actions.append(skipButton, nextButton);
      card.append(dots, title, text, actions);
      overlay.appendChild(card);
      document.body.appendChild(overlay);
      renderStep();
    }

    function normalizePage(page) {
      return page === 1 ? 1 : 0;
    }

    function normalizeCount(value) {
      const number = Number(value);
      return Number.isFinite(number) && number > 0 ? Math.floor(number) : 0;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    window.addEventListener('beforeunload', () => {
      if (clockTimer) window.clearInterval(clockTimer);
      if (weatherTimer) window.clearInterval(weatherTimer);
    });
  </script>
</body>
