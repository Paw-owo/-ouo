<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="format-detection" content="telephone=no">
  <meta name="theme-color" content="#FAFAFA">
  <title>AI手机桌面</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div id="app" class="app-root"></div>

  <script type="module">
    import './core/theme.js';

    import {
      getData,
      getApps,
      updateData,
      onStorageChange,
      setLastOpenedApp
    } from './core/storage.js';

    import {
      h,
      qs,
      icon,
      createEmptyState,
      createSwipe,
      formatTime,
      nearestAnniversary,
      mountApp,
      toast
    } from './core/ui.js';

    const APPS = [
      { id: 'chat', name: '消息', module: '/apps/chat.js' },
      { id: 'moments', name: '朋友圈', module: '/apps/moments.js' },
      { id: 'characters', name: '角色管理', module: '/apps/characters.js' },
      { id: 'worldbook', name: '世界书', module: '/apps/worldbook.js' },
      { id: 'games', name: '小游戏', module: '/apps/games.js' },
      { id: 'shop', name: '商店', module: '/apps/shop.js' },
      { id: 'wallet', name: '钱包', module: '/apps/wallet.js' },
      { id: 'memo', name: '备忘录', module: '/apps/memo.js' },
      { id: 'anniversary', name: '纪念日', module: '/apps/anniversary.js' },
      { id: 'settings', name: '设置', module: '/apps/settings.js' }
    ];

    const WEATHER_CODES = {
      0: '晴朗',
      1: '大致晴朗',
      2: '少云',
      3: '多云',
      45: '有雾',
      48: '雾凇',
      51: '小毛毛雨',
      53: '毛毛雨',
      55: '较强毛毛雨',
      56: '冻毛毛雨',
      57: '较强冻毛毛雨',
      61: '小雨',
      63: '中雨',
      65: '大雨',
      66: '冻雨',
      67: '较强冻雨',
      71: '小雪',
      73: '中雪',
      75: '大雪',
      77: '雪粒',
      80: '阵雨',
      81: '较强阵雨',
      82: '强阵雨',
      85: '阵雪',
      86: '强阵雪',
      95: '雷雨',
      96: '雷雨伴冰雹',
      99: '强雷雨伴冰雹'
    };

    const state = {
      currentPage: 0,
      appView: null,
      appCleanup: null,
      timeTimer: null,
      weatherTimer: null,
      weather: {
        city: '北京',
        temperature: '',
        text: '天气加载中'
      },
      draggingAppId: ''
    };

    const root = document.getElementById('app');

    function init() {
      renderShell();
      bindGlobalEvents();
      updateClock();
      loadWeather();
      state.timeTimer = window.setInterval(updateClock, 1000);
      state.weatherTimer = window.setInterval(loadWeather, 1000 * 60 * 30);
    }

    function renderShell() {
      const data = getData();
      const wallpaper = data.settings.personalization.wallpaper || '';

      root.replaceChildren(
        h('div', {
          className: 'wallpaper-layer',
          style: {
            backgroundImage: wallpaper ? `url("${wallpaper}")` : ''
          }
        }),
        h('div', { className: 'wallpaper-softener' }),
        createStatusBar(),
        createDesktop(data),
        createDock(data)
      );

      updatePagePosition();
      updateClockText();
    }

    function createStatusBar() {
      return h('div', { className: 'status-bar' }, [
        h('div', { id: 'statusTime', className: 'status-time', text: '--:--' }),
        h('div', { className: 'status-right' }, [
          h('div', { className: 'signal-bars' }, [
            h('span'),
            h('span'),
            h('span'),
            h('span')
          ]),
          h('div', { className: 'battery-mark' }, h('div', { className: 'battery-fill' }))
        ])
      ]);
    }

    function createDesktop(data) {
      const desktop = h('main', { className: 'desktop' });
      const main = h('div', { className: 'desktop-main' });
      const pages = h('div', { className: 'desktop-pages', id: 'desktopPages' });

      for (let index = 0; index < 2; index += 1) {
        pages.appendChild(createDesktopPage(index, data));
      }

      main.append(
        pages,
        createPageIndicators()
      );

      desktop.appendChild(main);

      createSwipe(desktop, {
        onLeft: () => setDesktopPage(1),
        onRight: () => setDesktopPage(0)
      });

      return desktop;
    }

    function createDesktopPage(pageIndex, data) {
      const page = h('section', {
        className: 'desktop-page',
        dataset: { page: pageIndex },
        onDragover: (event) => event.preventDefault(),
        onDrop: (event) => {
          event.preventDefault();

          const appId = event.dataTransfer.getData('text/plain') || state.draggingAppId;

          if (appId) {
            moveAppToPage(appId, pageIndex);
          }
        }
      });

      if (pageIndex === 0) {
        page.appendChild(createWidgets(data));
      }

      page.appendChild(createAppGrid(pageIndex, data));
      return page;
    }

    function createWidgets(data) {
      const widgets = data.settings.personalization.widgets || {};
      const stack = h('div', { className: 'widget-stack' });
      const row = h('div', { className: 'widget-row' });

      if (widgets.time !== false) {
        stack.appendChild(
          h('section', { className: 'widget-card large time-widget' }, [
            h('div', { className: 'widget-label', text: '现在' }),
            h('div', { id: 'desktopBigTime', className: 'widget-value', text: '--:--' }),
            h('div', { id: 'desktopDateText', className: 'widget-sub', text: '' })
          ])
        );
      }

      if (widgets.weather !== false) {
        row.appendChild(
          h('section', { className: 'widget-card' }, [
            h('div', { className: 'widget-label', text: '天气' }),
            h('div', { id: 'weatherTemp', className: 'widget-value', text: state.weather.temperature || '--' }),
            h('div', { id: 'weatherText', className: 'widget-sub', text: `${state.weather.city} · ${state.weather.text}` })
          ])
        );
      }

      if (widgets.anniversary !== false) {
        row.appendChild(createAnniversaryWidget(data));
      }

      if (row.childElementCount) {
        stack.appendChild(row);
      }

      return stack;
    }

    function createAnniversaryWidget(data) {
      const item = nearestAnniversary(data.anniversaries || []);

      if (!item) {
        return h('section', { className: 'widget-card' }, [
          h('div', { className: 'widget-label', text: '纪念日' }),
          h('div', { className: 'widget-value', text: '--' }),
          h('div', { className: 'widget-sub', text: '还没有添加纪念日' })
        ]);
      }

      return h('section', { className: 'widget-card' }, [
        h('div', { className: 'widget-label', text: item.title }),
        h('div', { className: 'widget-value', text: item.days === 0 ? '今天' : `${item.days}天` }),
        h('div', { className: 'widget-sub', text: item.days === 0 ? '就是今天' : '距离最近一次' })
      ]);
    }

    function createAppGrid(pageIndex, data) {
      const apps = getApps()
        .filter((app) => Number(app.page || 0) === pageIndex)
        .sort((a, b) => Number(a.order || 0) - Number(b.order || 0));

      const grid = h('div', { className: 'app-grid', dataset: { pageGrid: pageIndex } });

      apps.forEach((app) => {
        grid.appendChild(createAppIcon(app));
      });

      return grid;
    }

    function createAppIcon(app, inDock = false) {
      const name = app.customName || app.name || '应用';
      const appButton = h('button', {
        type: 'button',
        className: 'app-icon',
        draggable: !inDock,
        dataset: {
          appId: app.id,
          module: app.module || ''
        },
        onClick: () => openApp(app.id),
        onDragstart: (event) => {
          state.draggingAppId = app.id;
          event.dataTransfer.setData('text/plain', app.id);
          appButton.classList.add('dragging');
        },
        onDragend: () => {
          state.draggingAppId = '';
          appButton.classList.remove('dragging');
        }
      });

      const art = h('div', { className: 'app-icon-art' });

      if (app.icon) {
        art.appendChild(h('img', {
          src: app.icon,
          alt: name
        }));
      } else {
        art.appendChild(icon(app.id));
      }

      appButton.append(
        art,
        h('div', { className: 'app-icon-name', text: name })
      );

      return appButton;
    }

    function createPageIndicators() {
      return h('div', { className: 'desktop-indicators' }, [
        h('span', { className: 'page-dot active', dataset: { dot: 0 } }),
        h('span', { className: 'page-dot', dataset: { dot: 1 } })
      ]);
    }

    function createDock(data) {
      const apps = getApps();
      const dockApps = apps
        .filter((app) => app.dock)
        .slice(0, 4);

      while (dockApps.length < 4) {
        const candidate = apps.find((app) => !dockApps.some((item) => item.id === app.id));

        if (!candidate) {
          break;
        }

        dockApps.push(candidate);
      }

      return h('nav', { className: 'dock' }, dockApps.map((app) => createAppIcon(app, true)));
    }

    function setDesktopPage(pageIndex) {
      state.currentPage = Math.max(0, Math.min(1, pageIndex));
      updatePagePosition();
    }

    function updatePagePosition() {
      const pages = qs('#desktopPages');

      if (pages) {
        pages.style.transform = `translateX(${-state.currentPage * 100}vw)`;
      }

      document.querySelectorAll('.page-dot').forEach((dot) => {
        dot.classList.toggle('active', Number(dot.dataset.dot) === state.currentPage);
      });
    }

    function moveAppToPage(appId, pageIndex) {
      updateData((data) => {
        const maxOrder = data.apps
          .filter((app) => Number(app.page || 0) === pageIndex)
          .reduce((max, app) => Math.max(max, Number(app.order || 0)), -1);

        data.apps = data.apps.map((app) => {
          if (app.id !== appId) {
            return app;
          }

          return {
            ...app,
            page: pageIndex,
            order: maxOrder + 1
          };
        });

        return data;
      });

      renderShell();
      setDesktopPage(pageIndex);
    }

    async function openApp(appId) {
      const data = getData();
      const app = data.apps.find((item) => item.id === appId) || APPS.find((item) => item.id === appId);

      if (!app) {
        toast('找不到应用');
        return;
      }

      await closeOpenedApp(false);

      const view = h('section', {
        className: 'app-view',
        dataset: { currentApp: appId }
      });

      root.appendChild(view);
      state.appView = view;
      setLastOpenedApp(appId);

      requestAnimationFrame(() => {
        view.classList.add('active');
      });

      try {
        const module = await import(resolveModulePath(app.module));
        const cleanup = mountApp(module, view, {
          app,
          data: getData(),
          close: () => closeOpenedApp(true),
          refreshDesktop: renderShell,
          openApp
        });

        state.appCleanup = typeof cleanup === 'function' ? cleanup : null;
      } catch (error) {
        view.replaceChildren(
          createEmptyState({
            iconName: app.id,
            title: `${app.customName || app.name}暂不可用`,
            description: '这个应用文件还没有准备好'
          })
        );
      }
    }

    function resolveModulePath(modulePath = '') {
      if (!modulePath) {
        return '';
      }

      if (modulePath.startsWith('/')) {
        return `.${modulePath}`;
      }

      return modulePath;
    }

    async function closeOpenedApp(animated = true) {
      if (!state.appView) {
        return;
      }

      if (typeof state.appCleanup === 'function') {
        try {
          state.appCleanup();
        } catch {}
      }

      const closingView = state.appView;

      state.appView = null;
      state.appCleanup = null;

      if (!animated) {
        closingView.remove();
        return;
      }

      closingView.classList.add('closing');
      closingView.classList.remove('active');

      window.setTimeout(() => {
        closingView.remove();
      }, 240);
    }

    function bindGlobalEvents() {
      window.addEventListener('ai-phone-close-app', () => closeOpenedApp(true));

      window.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') {
          closeOpenedApp(true);
        }
      });

      onStorageChange(() => {
        if (!state.appView) {
          renderShell();
        } else {
          updateWidgetOnly();
        }
      });

      document.addEventListener('contextmenu', (event) => {
        event.preventDefault();
      });
    }

    function updateClock() {
      updateClockText();
    }

    function updateClockText() {
      const now = new Date();
      const timeText = formatTime(now);
      const dateText = now.toLocaleDateString('zh-CN', {
        month: 'long',
        day: 'numeric',
        weekday: 'long'
      });

      const statusTime = qs('#statusTime');
      const desktopBigTime = qs('#desktopBigTime');
      const desktopDateText = qs('#desktopDateText');

      if (statusTime) {
        statusTime.textContent = timeText;
      }

      if (desktopBigTime) {
        desktopBigTime.textContent = timeText;
      }

      if (desktopDateText) {
        desktopDateText.textContent = dateText;
      }
    }

    function updateWidgetOnly() {
      updateClockText();

      const data = getData();
      const nearest = nearestAnniversary(data.anniversaries || []);
      const weatherTemp = qs('#weatherTemp');
      const weatherText = qs('#weatherText');

      if (weatherTemp) {
        weatherTemp.textContent = state.weather.temperature || '--';
      }

      if (weatherText) {
        weatherText.textContent = `${state.weather.city} · ${state.weather.text}`;
      }

      const anniversaryCards = document.querySelectorAll('.widget-card');
      if (nearest && anniversaryCards.length) {}
    }

    async function loadWeather() {
      const settings = getData().settings;
      const weatherSettings = settings.personalization.weather || {};
      let city = weatherSettings.city || '北京';
      let latitude = Number(weatherSettings.latitude || 39.9042);
      let longitude = Number(weatherSettings.longitude || 116.4074);

      try {
        if (weatherSettings.city && (!weatherSettings.latitude || !weatherSettings.longitude)) {
          const geoUrl = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(weatherSettings.city)}&count=1&language=zh&format=json`;
          const geoResponse = await fetch(geoUrl);
          const geoData = await geoResponse.json();
          const first = geoData.results?.[0];

          if (first) {
            city = first.name || city;
            latitude = first.latitude;
            longitude = first.longitude;
          }
        }

        const url = `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,weather_code&timezone=auto`;
        const response = await fetch(url);
        const data = await response.json();
        const current = data.current || {};
        const temperature = Number.isFinite(Number(current.temperature_2m)) ? `${Math.round(Number(current.temperature_2m))}°` : '--';
        const text = WEATHER_CODES[current.weather_code] || '天气更新中';

        state.weather = {
          city,
          temperature,
          text
        };

        updateWidgetOnly();
      } catch {
        state.weather = {
          city,
          temperature: '--',
          text: '天气暂不可用'
        };

        updateWidgetOnly();
      }
    }

    window.AIPhoneDesktop = {
      APPS,
      openApp,
      closeApp: () => closeOpenedApp(true),
      refresh: renderShell,
      setDesktopPage
    };

    init();
  </script>
</body>
</html>
